<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>독한녀들 Book Club - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container-fluid max-width-xl">
        <div class="dashboard-header d-flex justify-content-between align-items-center flex-wrap">
            <div>
                <h1><i class="fa-solid fa-crown me-2" style="color: #FFD700;"></i>독한녀들 <span>DASHBOARD</span></h1>
                <p class="text-muted m-0">
                    <i class="fa-solid fa-sparkles me-1" style="color: var(--bp-pink);"></i> 
                    우아한 독한녀 공주님들의 고결한 독서 취향과 눈부신 발자취가 실시간으로 반짝이는 럭셔리 핑크 라운지-★
                </p>
            </div>
            <div class="d-flex align-items-center mt-3 mt-sm-0">
                <span class="me-3 fw-bold" style="color: var(--bp-pink);">
                    <i class="fa-solid fa-user-heart me-1" style="color: var(--neon-pink);"></i>
                    <span id="currentUserLabel">접속자</span>님 로그인 중
                </span>
                <button class="btn btn-outline-light btn-sm me-2" onclick="fetchAllDashboardData()">
                    <i class="fa-solid fa-rotate me-1"></i>새로고침
                </button>
                <button class="btn btn-outline-danger btn-sm" onclick="handleLogout()">
                    <i class="fa-solid fa-arrow-right-from-bracket me-1"></i>로그아웃
                </button>
            </div>
        </div>

        <div class="row g-4">
            
            <div class="col-xl-6 col-lg-12">
                <div class="stat-card">
                    <div class="card-header-custom">
                        <i class="fa-solid fa-users"></i> 게녀별 평균 별점
                    </div>
                    <div class="card-body-custom scrollable-panel">
                        <table class="table table-custom text-center" id="memberStatsTable">
                            <thead>
                                <tr>
                                    <th>독한녀</th>
                                    <th class="text-start">최근 읽은 책</th>
                                    <th>최근 별점</th>
                                    <th>평균 별점</th>
                                </tr>
                            </thead>
                            <tbody id="memberStatsBody">
                                <tr>
                                    <td colspan="4" class="text-center py-4">
                                        <div class="spinner-border spinner-pink" role="status"></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-xl-6 col-lg-12">
                <div class="stat-card">
                    <div class="card-header-custom">
                        <i class="fa-solid fa-book-open"></i> 도서별 평균 별점
                    </div>
                    <div class="card-body-custom scrollable-panel">
                        <table class="table table-custom text-center" id="bookStatsTable">
                            <thead>
                                <tr>
                                    <th>차수</th>
                                    <th class="text-start">책 이름</th>
                                    <th>평균 별점</th>
                                </tr>
                            </thead>
                            <tbody id="bookStatsBody">
                                <tr>
                                    <td colspan="3" class="text-center py-4">
                                        <div class="spinner-border spinner-pink" role="status"></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-xl-6 col-lg-12">
                <div class="stat-card">
                    <div class="card-header-custom">
                        <i class="fa-solid fa-tags"></i> 도서 카테고리별(대분류) 평균 평점
                    </div>
                    <div class="card-body-custom">
                        <table class="table table-custom text-center" id="mainCatStatsTable">
                            <thead>
                                <tr>
                                    <th class="text-start">대분류</th>
                                    <th>선정 도서 권수</th>
                                    <th>평균 평점</th>
                                </tr>
                            </thead>
                            <tbody id="mainCatStatsBody">
                                <tr>
                                    <td colspan="3" class="text-center py-4">
                                        <div class="spinner-border spinner-pink" role="status"></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-xl-6 col-lg-12">
                <div class="stat-card">
                    <div class="card-header-custom">
                        <i class="fa-solid fa-heart-pulse"></i> 목적형 분류별 평균 평점
                    </div>
                    <div class="card-body-custom">
                        <table class="table table-custom text-center" id="customCatStatsTable">
                            <thead>
                                <tr>
                                    <th class="text-start">맞춤 분류</th>
                                    <th>선정 도서 권수</th>
                                    <th>평균 평점</th>
                                </tr>
                            </thead>
                            <tbody id="customCatStatsBody">
                                <tr>
                                    <td colspan="3" class="text-center py-4">
                                        <div class="spinner-border spinner-pink" role="status"></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        checkAuth();

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("currentUserLabel").textContent = getLoggedInMember();
            fetchAllDashboardData();
        });

        async function fetchAllDashboardData() {
            await Promise.all([
                fetchMemberStats(),
                fetchBookStats(),
                fetchMainCategoryStats(),
                fetchCustomCategoryStats()
            ]);
        }

        async function fetchMemberStats() {
            try {
                const { data, error } = await _db.from('v_member_stats').select('*');
                if (error) throw error;
                const tbody = document.getElementById("memberStatsBody");
                tbody.innerHTML = "";
                if (!data || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="text-muted py-3">데이터가 존재하지 않습니다.</td></tr>`;
                    return;
                }
                data.forEach(row => {
                    const recentRatingHtml = row.recent_rating > 0 ? `<span class="text-warning">★</span> ${row.recent_rating.toFixed(1)}` : `<span class="text-muted">-</span>`;
                    tbody.innerHTML += `
                        <tr>
                            <td class="fw-bold">${row.member_name}</td>
                            <td class="text-start text-truncate" style="max-width: 200px;">${row.recent_book}</td>
                            <td>${recentRatingHtml}</td>
                            <td><div class="rating-badge">★ ${row.avg_rating.toFixed(2)}</div></td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error("Member Stats Error:", err);
                document.getElementById("memberStatsBody").innerHTML = `<tr><td colspan="4" class="text-danger">데이터 로드 실패</td></tr>`;
            }
        }

        async function fetchBookStats() {
            try {
                const { data, error } = await _db.from('v_book_stats').select('*');
                if (error) throw error;
                const tbody = document.getElementById("bookStatsBody");
                tbody.innerHTML = "";
                if (!data || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" class="text-muted py-3">데이터가 존재하지 않습니다.</td></tr>`;
                    return;
                }
                data.forEach(row => {
                    const ratingHtml = row.avg_rating > 0 ? `<div class="rating-badge" style="background: transparent; border: 1px solid var(--neon-pink); color: var(--neon-pink); box-shadow: none;">★ ${row.avg_rating.toFixed(2)}</div>` : `<span class="text-muted">평가 없음</span>`;
                    tbody.innerHTML += `
                        <tr>
                            <td><span class="badge bg-secondary">${row.round_no}회차</span></td>
                            <td class="text-start text-truncate" style="max-width: 250px;">${row.title}</td>
                            <td>${ratingHtml}</td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error("Book Stats Error:", err);
                document.getElementById("bookStatsBody").innerHTML = `<tr><td colspan="3" class="text-danger">데이터 로드 실패</td></tr>`;
            }
        }

        async function fetchMainCategoryStats() {
            try {
                const { data, error } = await _db.from('v_main_category_stats').select('*');
                if (error) throw error;
                const tbody = document.getElementById("mainCatStatsBody");
                tbody.innerHTML = "";
                if (!data || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" class="text-muted py-3">데이터가 존재하지 않습니다.</td></tr>`;
                    return;
                }
                data.forEach(row => {
                    tbody.innerHTML += `
                        <tr>
                            <td class="text-start fw-medium"><i class="fa-regular fa-circle-dot text-pink me-2" style="color:var(--bp-pink);"></i>${row.main_category}</td>
                            <td><span class="count-badge">${row.book_count}권</span></td>
                            <td><span class="rating-badge">★ ${row.avg_rating.toFixed(2)}</span></td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error("Main Category Stats Error:", err);
                document.getElementById("mainCatStatsBody").innerHTML = `<tr><td colspan="3" class="text-danger">데이터 로드 실패</td></tr>`;
            }
        }

        async function fetchCustomCategoryStats() {
            try {
                const { data, error } = await _db.from('v_custom_category_stats').select('*');
                if (error) throw error;
                const tbody = document.getElementById("customCatStatsBody");
                tbody.innerHTML = "";
                if (!data || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" class="text-muted py-3">데이터가 존재하지 않습니다.</td></tr>`;
                    return;
                }
                data.forEach(row => {
                    tbody.innerHTML += `
                        <tr>
                            <td class="text-start fw-medium"><i class="fa-regular fa-heart text-pink me-2" style="color:var(--neon-pink);"></i>${row.custom_category}</td>
                            <td><span class="count-badge">${row.book_count}권</span></td>
                            <td><span class="rating-badge">★ ${row.avg_rating.toFixed(2)}</span></td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error("Custom Category Stats Error:", err);
                document.getElementById("customCatStatsBody").innerHTML = `<tr><td colspan="3" class="text-danger">데이터 로드 실패</td></tr>`;
            }
        }
    </script>
</body>
</html>

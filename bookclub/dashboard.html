<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>독한녀들 Book Club - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container-fluid">
        <div class="dashboard-header">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <h1><i class="fa-solid fa-crown" style="color: var(--royal-gold);"></i> 독한녀들 <span>Lounge</span></h1>
                <button class="btn btn-outline-danger btn-sm px-2 py-1" style="font-size: 0.75rem;" onclick="handleLogout()">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>
            <p class="text-muted m-0">
                <i class="fa-solid fa-sparkles me-1" style="color: var(--bp-pink);"></i> 
                우아한 공주님들의 고결한 독서 취향과 눈부신 발자취가 실시간으로 반짝이는 럭셔리 핑크 라운지-★
            </p>
            <div class="mt-3 pt-2 border-top border-secondary d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <img id="myDashAvatar" src="images/default_princess.png" class="princess-avatar-sm" onerror="this.src='images/default_princess.png'">
                    <span style="color: var(--bp-pink); font-weight: 700; font-size: 0.85rem;">
                        <span id="currentUserLabel">공주</span>님 납시오
                    </span>
                </div>
                <button class="btn btn-princess btn-sm" onclick="fetchAllDashboardData()">
                    <i class="fa-solid fa-rotate"></i> 동기화
                </button>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="stat-card">
                    <div class="card-header-custom">
                        <i class="fa-solid fa-heart-window me-1"></i> 공주별 티타임 평점 순위
                    </div>
                    <div class="card-body-custom scrollable-panel">
                        <table class="table table-custom text-center" id="memberStatsTable">
                            <thead>
                                <tr>
                                    <th style="width: 35%;">공주 프로필</th>
                                    <th class="text-start" style="width: 35%;">최근 픽</th>
                                    <th style="width: 15%;">최근</th>
                                    <th style="width: 15%;">평균</th>
                                </tr>
                            </thead>
                            <tbody id="memberStatsBody">
                                <tr>
                                    <td colspan="4" class="text-center py-4">
                                        <div class="spinner-border spinner-pink" role="status"></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-12">
                <div class="stat-card">
                    <div class="card-header-custom">
                        <i class="fa-solid fa-star me-1"></i> 명예의 도서별 별점 로그
                    </div>
                    <div class="card-body-custom scrollable-panel">
                        <table class="table table-custom text-center" id="bookStatsTable">
                            <thead>
                                <tr>
                                    <th style="width: 25%;">차수</th>
                                    <th class="text-start" style="width: 50%;">도서명</th>
                                    <th style="width: 25%;">평균 별점</th>
                                </tr>
                            </thead>
                            <tbody id="bookStatsBody">
                                <tr>
                                    <td colspan="3" class="text-center py-4">
                                        <div class="spinner-border spinner-pink" role="status"></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-12">
                <div class="stat-card">
                    <div class="card-header-custom">
                        <i class="fa-solid fa-tags me-1"></i> 취향 컬렉션별 분석 (대분류)
                    </div>
                    <div class="card-body-custom">
                        <table class="table table-custom text-center" id="mainCatStatsTable">
                            <thead>
                                <tr>
                                    <th class="text-start" style="width: 50%;">대분류 장르</th>
                                    <th style="width: 25%;">수집 권수</th>
                                    <th style="width: 25%;">평균 평점</th>
                                </tr>
                            </thead>
                            <tbody id="mainCatStatsBody">
                                <tr>
                                    <td colspan="3" class="text-center py-4">
                                        <div class="spinner-border spinner-pink" role="status"></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-12">
                <div class="stat-card">
                    <div class="card-header-custom">
                        <i class="fa-solid fa-wand-magic me-1"></i> 시크릿 목적별 분석 (맞춤)
                    </div>
                    <div class="card-body-custom">
                        <table class="table table-custom text-center" id="customCatStatsTable">
                            <thead>
                                <tr>
                                    <th class="text-start" style="width: 50%;">비밀 맞춤 분류</th>
                                    <th style="width: 25%;">수집 권수</th>
                                    <th style="width: 25%;">평균 평점</th>
                                </tr>
                            </thead>
                            <tbody id="customCatStatsBody">
                                <tr>
                                    <td colspan="3" class="text-center py-4">
                                        <div class="spinner-border spinner-pink" role="status"></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="feed.html" class="bottom-nav-item">
            <i class="fa-solid fa-rss"></i>
            <span>소통 피드</span>
        </a>
        <a href="write.html" class="bottom-nav-item">
            <i class="fa-solid fa-pen-to-square"></i>
            <span>비밀 기록</span>
        </a>
        <a href="dashboard.html" class="bottom-nav-item active">
            <i class="fa-solid fa-crown"></i>
            <span>핑크 라운지</span>
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        checkAuth();

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("currentUserLabel").textContent = getLoggedInMember();
            document.getElementById("myDashAvatar").src = `images/${localStorage.getItem("login_member_image") || 'default_princess.png'}`;
            fetchAllDashboardData();
        });

        async function fetchAllDashboardData() {
            await Promise.all([
                fetchMemberStats(),
                fetchBookStats(),
                fetchMainCategoryStats(),
                fetchCustomCategoryStats()
            ]);
        }

        async function fetchMemberStats() {
            try {
                const { data, error } = await _db.from('v_member_stats').select('*');
                if (error) throw error;
                const tbody = document.getElementById("memberStatsBody");
                tbody.innerHTML = "";
                if (!data || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="text-muted py-3">공주 데이터 없음</td></tr>`;
                    return;
                }
                data.forEach(row => {
                    const recentRatingHtml = row.recent_rating > 0 ? `<span class="text-warning">★</span>${row.recent_rating.toFixed(1)}` : `<span class="text-muted">-</span>`;
                    tbody.innerHTML += `
                        <tr>
                            <td class="fw-bold text-pink text-start">
                                <img src="images/${row.image_name}" class="princess-avatar-sm" onerror="this.src='images/default_princess.png'">
                                ${row.member_name}
                            </td>
                            <td class="text-start text-wrap" style="word-break: break-all; font-size:0.85rem;">${row.recent_book}</td>
                            <td>${recentRatingHtml}</td>
                            <td><div class="rating-badge">★${row.avg_rating.toFixed(1)}</div></td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error(err);
                document.getElementById("memberStatsBody").innerHTML = `<tr><td colspan="4" class="text-danger">로드 실패</td></tr>`;
            }
        }

        async function fetchBookStats() {
            try {
                const { data, error } = await _db.from('v_book_stats').select('*');
                if (error) throw error;
                const tbody = document.getElementById("bookStatsBody");
                tbody.innerHTML = "";
                if (!data || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" class="text-muted py-3">비어있음</td></tr>`;
                    return;
                }
                data.forEach(row => {
                    const ratingHtml = row.avg_rating > 0 ? `<div class="rating-badge" style="background: transparent; border: 1px solid var(--neon-pink); color: var(--neon-pink); box-shadow: none;">★${row.avg_rating.toFixed(1)}</div>` : `<span class="text-muted">평가전</span>`;
                    tbody.innerHTML += `
                        <tr>
                            <td><span class="badge bg-dark border border-secondary">${row.round_no} 픽</span></td>
                            <td class="text-start text-wrap" style="word-break: break-all;">${row.title}</td>
                            <td>${ratingHtml}</td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error(err);
                document.getElementById("bookStatsBody").innerHTML = `<tr><td colspan="3" class="text-danger">로드 실패</td></tr>`;
            }
        }

        async function fetchMainCategoryStats() {
            try {
                const { data, error } = await _db.from('v_main_category_stats').select('*');
                if (error) throw error;
                const tbody = document.getElementById("mainCatStatsBody");
                tbody.innerHTML = "";
                if (!data || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" class="text-muted py-3">컬렉션 없음</td></tr>`;
                    return;
                }
                data.forEach(row => {
                    tbody.innerHTML += `
                        <tr>
                            <td class="text-start fw-medium" style="color: #fff !important;"><i class="fa-regular fa-star text-pink me-1" style="color:var(--bp-pink);"></i>${row.main_category}</td>
                            <td><span class="count-badge">${row.book_count}권</span></td>
                            <td><span class="rating-badge">★${row.avg_rating.toFixed(1)}</span></td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error(err);
                document.getElementById("mainCatStatsBody").innerHTML = `<tr><td colspan="3" class="text-danger">로드 실패</td></tr>`;
            }
        }

        async function fetchCustomCategoryStats() {
            try {
                const { data, error } = await _db.from('v_custom_category_stats').select('*');
                if (error) throw error;
                const tbody = document.getElementById("customCatStatsBody");
                tbody.innerHTML = "";
                if (!data || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" class="text-muted py-3">데이터 없음</td></tr>`;
                    return;
                }
                data.forEach(row => {
                    tbody.innerHTML += `
                        <tr>
                            <td class="text-start fw-medium" style="color: #fff !important;"><i class="fa-solid fa-sparkles me-1" style="color:var(--neon-pink);"></i>${row.custom_category}</td>
                            <td><span class="count-badge">${row.book_count}권</span></td>
                            <td><span class="rating-badge">★${row.avg_rating.toFixed(1)}</span></td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error(err);
                document.getElementById("customCatStatsBody").innerHTML = `<tr><td colspan="3" class="text-danger">로드 실패</td></tr>`;
            }
        }
    </script>
</body>
</html>

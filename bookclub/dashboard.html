<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>독한녀들 Book Club - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container-fluid">
        <div class="dashboard-header">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <h1><i class="fa-solid fa-crown" style="color: var(--royal-gold);"></i> 독한녀들 <span>Lounge</span></h1>
                <button class="btn btn-outline-danger btn-sm px-2 py-1" style="font-size: 0.75rem;" onclick="handleLogout()">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>
            <p class="text-muted m-0">
                <i class="fa-solid fa-sparkles me-1" style="color: var(--bp-pink);"></i> 
                우아한 공주님들의 고결한 독서 취향과 눈부신 발자취가 실시간으로 반짝이는 럭셔리 핑크 라운지-★
            </p>
            <div class="mt-3 pt-2 border-top border-secondary d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <img id="myDashAvatar" src="images/default_princess.png" class="princess-avatar-sm" onerror="this.src='images/default_princess.png'">
                    <span style="color: var(--bp-pink); font-weight: 700; font-size: 0.85rem;">
                        <span id="currentUserLabel">공주</span>님 납시오
                    </span>
                </div>
                <button class="btn btn-princess btn-sm" onclick="fetchAllDashboardData()">
                    <i class="fa-solid fa-rotate"></i> 동기화
                </button>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="stat-card">
                    <div class="card-header-custom">
                        <i class="fa-solid fa-heart-window me-1"></i> 공주별 티타임 평점 순위
                    </div>
                    <div class="card-body-custom scrollable-panel">
                        <table class="table table-custom text-center" id="memberStatsTable">
                            <thead>
                                <tr>
                                    <th style="width: 35%;">공주 프로필</th>
                                    <th class="text-start" style="width: 35%;">최근 픽</th>
                                    <th style="width: 15%;">최근</th>
                                    <th style="width: 15%;">평균</th>
                                </tr>
                            </thead>
                            <tbody id="memberStatsBody">
                                <tr>
                                    <td colspan="4" class="text-center py-4">
                                        <div class="spinner-border spinner-pink" role="status"></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-12">
                <div class="stat-card">
                    <div class="card-header-custom" style="color: var(--royal-gold) !important;">
                        <i class="fa-solid fa-trophy me-1" style="color: var(--royal-gold) !important;"></i> 공주별 추천 도서 왕좌 (선정 횟수)
                    </div>
                    <div class="card-body-custom p-3" id="recommendationCrownContainer">
                        <div class="text-center py-3"><div class="spinner-border spinner-pink" role="status"></div></div>
                    </div>
                </div>
            </div>

            <div class="col-12">
                <div class="stat-card">
                    <div class="card-header-custom">
                        <i class="fa-solid fa-star me-1"></i> 명예의 도서별 별점 로그
                    </div>
                    <div class="card-body-custom scrollable-panel">
                        <table class="table table-custom text-center" id="bookStatsTable">
                            <thead>
                                <tr>
                                    <th style="width: 25%;">차수</th>
                                    <th class="text-start" style="width: 50%;">도서명</th>
                                    <th style="width: 25%;">평균 별점</th>
                                </tr>
                            </thead>
                            <tbody id="bookStatsBody">
                                <tr>
                                    <td colspan="3" class="text-center py-4">
                                        <div class="spinner-border spinner-pink" role="status"></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-12">
                <div class="stat-card">
                    <div class="card-header-custom">
                        <i class="fa-solid fa-tags me-1"></i> 취향 컬렉션별 분석 (대분류)
                    </div>
                    <div class="card-body-custom">
                        <table class="table table-custom text-center" id="mainCatStatsTable" style="table-layout: fixed; width: 100%;">
                            <thead>
                                <tr>
                                    <th class="text-start" style="width: 50%;">대분류 장르</th>
                                    <th style="width: 25%;">수집 권수</th>
                                    <th style="width: 25%;">평균 평점</th>
                                </tr>
                            </thead>
                            <tbody id="mainCatStatsBody">
                                <tr>
                                    <td colspan="3" class="text-center py-4">
                                        <div class="spinner-border spinner-pink" role="status"></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-12">
                <div class="stat-card">
                    <div class="card-header-custom">
                        <i class="fa-solid fa-wand-magic me-1"></i> 시크릿 목적별 분석 (맞춤)
                    </div>
                    <div class="card-body-custom">
                        <table class="table table-custom text-center" id="customCatStatsTable" style="table-layout: fixed; width: 100%;">
                            <thead>
                                <tr>
                                    <th class="text-start" style="width: 50%;">비밀 맞춤 분류</th>
                                    <th style="width: 25%;">수집 권수</th>
                                    <th style="width: 25%;">평균 평점</th>
                                </tr>
                            </thead>
                            <tbody id="customCatStatsBody">
                                <tr>
                                    <td colspan="3" class="text-center py-4">
                                        <div class="spinner-border spinner-pink" role="status"></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="global-nav" data-active="dashboard"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        checkAuth();

        let globalBooksData = [];
        let globalBookRatings = {};

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("currentUserLabel").textContent = getLoggedInMember();
            document.getElementById("myDashAvatar").src = `images/${localStorage.getItem("login_member_image") || 'default_princess.png'}`;
            fetchAllDashboardData();
        });

        async function fetchAllDashboardData() {
            try {
                const { data: bData } = await _db
                    .from('books')
                    .select('round_no, title, main_category, custom_category')
                    .eq('is_closed', true)
                    .order('round_no', { ascending: false }); 
                
                globalBooksData = bData || [];
                
                const { data: rData } = await _db.from('v_book_stats').select('*');
                globalBookRatings = {};
                if (rData) {
                    rData.forEach(row => {
                        globalBookRatings[`${row.round_no}-${row.title}`] = row.avg_rating;
                    });
                }
            } catch(e) { console.error("선행 데이터 스캔 실패:", e); }

            await Promise.all([
                fetchMemberStats(),
                fetchRecommendationCrownStats(),
                fetchBookStats(),
                fetchMainCategoryStats(),
                fetchCustomCategoryStats()
            ]);
        }

        async function fetchMemberStats() {
            try {
                const { data, error } = await _db.from('v_member_stats').select('*');
                if (error) throw error;
                const tbody = document.getElementById("memberStatsBody");
                tbody.innerHTML = "";
                if (!data || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="text-muted py-3">공주 데이터 없음</td></tr>`;
                    return;
                }
                data.forEach(row => {
                    const recentRatingHtml = row.recent_rating > 0 ? `<span class="text-warning">★</span>${row.recent_rating.toFixed(1)}` : `<span class="text-muted">-</span>`;
                    const avgScoreDisplay = row.avg_rating ? row.avg_rating.toFixed(1) : '0.0';
                    tbody.innerHTML += `
                        <tr>
                            <td class="fw-bold text-pink text-start text-truncate" style="max-width:0;">
                                <img src="images/${row.image_name}" class="princess-avatar-sm" onerror="this.src='images/default_princess.png'">
                                ${row.member_name}
                            </td>
                            <td class="text-start text-wrap" style="word-break: break-all; font-size:0.85rem;">${row.recent_book}</td>
                            <td>${recentRatingHtml}</td>
                            <td><div class="rating-badge">★${avgScoreDisplay}</div></td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error(err);
                document.getElementById("memberStatsBody").innerHTML = `<tr><td colspan="4" class="text-danger">로드 실패</td></tr>`;
            }
        }

        // 👑 [Golden Schema 변환]: books.recommended_by가 숫자 ID로 변환되었으므로 매칭 필터 엔진 교정!
        async function fetchRecommendationCrownStats() {
            const container = document.getElementById("recommendationCrownContainer");
            try {
                const { data: activeMembers, error: memErr } = await _db
                    .from('members')
                    .select('id, member_name, image_name') // id 확보 사수!
                    .eq('is_active', true)
                    .order('member_name', { ascending: true });

                if (memErr) throw memErr;

                const { data: selectedBooks, error: bkErr } = await _db
                    .from('books')
                    .select('round_no, title, recommended_by') // recommended_by는 이제 숫자형 고유 ID!
                    .order('round_no', { ascending: false });

                if (bkErr) throw bkErr;

                container.innerHTML = "";

                if (!activeMembers || activeMembers.length === 0) {
                    container.innerHTML = `<div class="text-center text-muted small py-2">활성 명단 공백</div>`;
                    return;
                }

                activeMembers.forEach(member => {
                    const name = member.member_name;
                    
                    // 👑 문자열 대조(b.recommended_by === name)에서 고유 숫자 ID 대조 직격 변경!
                    const matchingBooks = selectedBooks.filter(b => b.recommended_by === member.id);
                    const count = matchingBooks.length;
                    const safeId = name.replace(/\s+/g, '_');

                    container.innerHTML += `
                        <div class="mb-2 border-bottom border-secondary pb-2" style="border-color: rgba(255,0,127,0.1) !important;">
                            <div class="d-flex justify-content-between align-items-center p-2 rounded bg-black" 
                                 style="cursor: pointer; border: 1px solid rgba(255,0,127,0.15);" 
                                 onclick="toggleAccordion('panel_${safeId}', 'arrow_panel_${safeId}')">
                                <div class="fw-bold text-pink" style="font-size:0.9rem;">
                                    <img src="images/${member.image_name}" class="princess-avatar-sm" onerror="this.src='images/default_princess.png'">
                                    ${name} 공주
                                </div>
                                <div class="d-flex align-items-center">
                                    <span class="badge" style="background: linear-gradient(135deg, var(--royal-gold), #DAA520); color:#000; font-weight:800; font-size:0.75rem;">
                                        🏆 총 ${count}권 선정
                                    </span>
                                    <i class="fa-solid fa-chevron-down ms-2 text-muted" id="arrow_panel_${safeId}" style="font-size:0.8rem; transition: transform 0.2s;"></i>
                                </div>
                            </div>
                            
                            <div id="panel_${safeId}" class="d-none mt-2 px-3 py-2 rounded-3" style="background-color: #150910; border: 1px dashed rgba(255,105,180,0.25);">
                                ${count > 0 ? matchingBooks.map(b => `
                                    <div class="small py-1 text-white d-flex align-items-center" style="font-size:0.82rem; font-weight:400; width:100%; min-width:0;">
                                        <span class="text-warning fw-bold me-2 flex-shrink-0">[제 ${b.round_no}회차]</span>
                                        <span class="text-truncate" style="flex-grow:1; min-width:0; text-align:left;">${b.title}</span>
                                    </div>
                                `).join('') : `<div class="small text-muted py-1 text-center">선정 히스토리가 없사옵니다. 🥀</div>`}
                            </div>
                        </div>
                    `;
                });
            } catch (err) { console.error(err); }
        }

        async function fetchBookStats() {
            try {
                const { data, error } = await _db
                    .from('v_book_stats')
                    .select('*')
                    .order('round_no', { ascending: false }); 

                if (error) throw error;
                const tbody = document.getElementById("bookStatsBody");
                tbody.innerHTML = "";
                if (!data || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" class="text-muted py-3">비어있음</td></tr>`;
                    return;
                }
                data.forEach(row => {
                    const scoreVal = row.avg_rating ? row.avg_rating.toFixed(1) : '0.0';
                    const ratingHtml = row.avg_rating > 0 ? `<div class="rating-badge" style="background: transparent; border: 1px solid var(--neon-pink); color: var(--neon-pink); box-shadow: none;">★${scoreVal}</div>` : `<span class="text-muted">평가전</span>`;
                    tbody.innerHTML += `
                        <tr>
                            <td><span class="badge bg-dark border border-secondary">제 ${row.round_no}회차</span></td>
                            <td class="text-start text-wrap" style="word-break: break-all;">${row.title}</td>
                            <td>${ratingHtml}</td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error(err);
                document.getElementById("bookStatsBody").innerHTML = `<tr><td colspan="3" class="text-danger">로드 실패</td></tr>`;
            }
        }

        async function fetchMainCategoryStats() {
            try {
                const { data, error } = await _db
                    .from('v_main_category_stats')
                    .select('*')
                    .order('book_count', { ascending: false }); 

                if (error) throw error;
                const tbody = document.getElementById("mainCatStatsBody");
                tbody.innerHTML = "";
                if (!data || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" class="text-muted py-3">컬렉션 없음</td></tr>`;
                    return;
                }
                data.forEach((row, index) => {
                    const safeId = `main_cat_${index}`;
                    const targetBooks = globalBooksData.filter(b => b.main_category === row.main_category);
                    const avgScoreDisplay = row.avg_rating ? '★' + Number(row.avg_rating).toFixed(1) : '평가전';

                    tbody.innerHTML += `
                        <tr onclick="toggleAccordion('panel_${safeId}', 'arrow_panel_${safeId}')" style="cursor: pointer; transition: background 0.2s;">
                            <td class="text-start fw-medium text-truncate" style="color: #fff !important; max-width:0;">
                                <i class="fa-regular fa-star text-pink me-1" style="color:var(--bp-pink);"></i>${row.main_category}
                                <i class="fa-solid fa-chevron-down ms-1 text-muted" id="arrow_panel_${safeId}" style="font-size:0.7rem; transition: transform 0.2s;"></i>
                            </td>
                            <td><span class="count-badge">${row.book_count}권</span></td>
                            <td><span class="rating-badge">${avgScoreDisplay}</span></td>
                        </tr>
                        <tr id="panel_${safeId}" class="d-none" style="background-color: #190B13;">
                            <td colspan="3" class="text-start px-3 py-2" style="border-bottom: 1px solid rgba(255,0,127,0.15) !important; max-width:0;">
                                ${targetBooks.length > 0 ? targetBooks.map(b => {
                                    const score = globalBookRatings[`${b.round_no}-${b.title}`];
                                    const scoreStr = score > 0 ? `★${Number(score).toFixed(1)}` : '평가전';
                                    return `
                                        <div class="d-flex justify-content-between align-items-center small py-1" style="border-bottom: 1px solid rgba(255,255,255,0.04); font-size:0.82rem; width:100%; min-width:0;">
                                            <div class="text-white text-truncate me-2" style="flex-grow:1; min-width:0; text-align:left;">
                                                <span class="text-warning fw-bold me-1">[제 ${b.round_no}회차]</span>${b.title}
                                            </div>
                                            <span class="badge bg-dark border border-pink text-pink flex-shrink-0" style="font-size: 0.68rem;">${scoreStr}</span>
                                        </div>
                                    `;
                                }).join('') : `<div class="small text-muted text-center py-1">소속 도서 정보 가공전</div>`}
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error(err);
                document.getElementById("mainCatStatsBody").innerHTML = `<tr><td colspan="3" class="text-danger">로드 실패</td></tr>`;
            }
        }

        async function fetchCustomCategoryStats() {
            try {
                const { data, error } = await _db
                    .from('v_custom_category_stats')
                    .select('*')
                    .order('book_count', { ascending: false }); 

                if (error) throw error;
                const tbody = document.getElementById("customCatStatsBody");
                tbody.innerHTML = "";
                if (!data || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" class="text-muted py-3">데이터 없음</td></tr>`;
                    return;
                }
                data.forEach((row, index) => {
                    const safeId = `custom_cat_${index}`;
                    const targetBooks = globalBooksData.filter(b => b.custom_category === row.custom_category);
                    const avgScoreDisplay = row.avg_rating ? '★' + Number(row.avg_rating).toFixed(1) : '평가전';

                    tbody.innerHTML += `
                        <tr onclick="toggleAccordion('panel_${safeId}', 'arrow_panel_${safeId}')" style="cursor: pointer; transition: background 0.2s;">
                            <td class="text-start fw-medium text-truncate" style="color: #fff !important; max-width:0;"><i class="fa-solid fa-sparkles me-1" style="color:var(--neon-pink);"></i>${row.custom_category}
                                <i class="fa-solid fa-chevron-down ms-1 text-muted" id="arrow_panel_${safeId}" style="font-size:0.7rem; transition: transform 0.2s;"></i>
                            </td>
                            <td><span class="count-badge">${row.book_count}권</span></td>
                            <td><span class="rating-badge">${avgScoreDisplay}</span></td>
                        </tr>
                        <tr id="panel_${safeId}" class="d-none" style="background-color: #190B13;">
                            <td colspan="3" class="text-start px-3 py-2" style="border-bottom: 1px solid rgba(255,0,127,0.15) !important; max-width:0;">
                                ${targetBooks.length > 0 ? targetBooks.map(b => {
                                    const score = globalBookRatings[`${b.round_no}-${b.title}`];
                                    const scoreStr = score > 0 ? `★${Number(score).toFixed(1)}` : '평가전';
                                    return `
                                        <div class="d-flex justify-content-between align-items-center small py-1" style="border-bottom: 1px solid rgba(255,255,255,0.04); font-size:0.82rem; width:100%; min-width:0;">
                                            <div class="text-white text-truncate me-2" style="flex-grow:1; min-width:0; text-align:left;">
                                                <span class="text-warning fw-bold me-1">[제 ${b.round_no}회차]</span>${b.title}
                                            </div>
                                            <span class="badge bg-dark border border-pink text-pink flex-shrink-0" style="font-size: 0.68rem;">${scoreStr}</span>
                                        </div>
                                    `;
                                }).join('') : `<div class="small text-muted text-center py-1">소속 도서 정보 가공전</div>`}
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error(err);
                document.getElementById("customCatStatsBody").innerHTML = `<tr><td colspan="3" class="text-danger">로드 실패</td></tr>`;
            }
        }

        function toggleAccordion(panelId, arrowId) {
            const panel = document.getElementById(panelId);
            const arrow = document.getElementById(arrowId);
            
            if (panel.classList.contains("d-none")) {
                panel.classList.remove("d-none");
                if(arrow) {
                    arrow.style.transform = "rotate(180deg)";
                    arrow.classList.remove("text-muted");
                    arrow.classList.add("text-pink");
                }
            } else {
                panel.classList.add("d-none");
                if(arrow) {
                    arrow.style.transform = "rotate(0deg)";
                    arrow.classList.remove("text-pink");
                    arrow.classList.add("text-muted");
                }
            }
        }

        function handleLogout() {
            if(confirm("핑크 라운지에서 퇴장하시겠사옵니다?")) {
                localStorage.removeItem("login_member");
                localStorage.removeItem("login_member_image");
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>

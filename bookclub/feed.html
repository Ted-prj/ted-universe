<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>독한녀들 Book Club - Feed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container-fluid">
        <div class="dashboard-header">
            <div class="d-flex justify-content-between align-items-start">
                <h1><i class="fa-solid fa-heart-pulse text-pink" style="color: var(--neon-pink);"></i> 소통 <span>FEED</span></h1>
                <span class="badge bg-dark border border-pink text-pink p-2" id="userBadge" style="color: var(--bp-pink) !important;">공주님</span>
            </div>
            <p class="text-muted m-0">실시간 추천 릴레이와 공주님들의 생생한 한줄평 피드룸</p>
        </div>

        <div class="stat-card">
            <div class="card-header-custom">
                <i class="fa-solid fa-paper-plane"></i> 다음 달(M+1) 추천 릴레이 현황
            </div>
            <div class="card-body-custom">
                <div id="recommendationFeedList">
                    <div class="text-center py-3"><div class="spinner-border spinner-pink" role="status"></div></div>
                </div>
            </div>
        </div>

        <div class="stat-card mt-3">
            <div class="card-header-custom">
                <i class="fa-solid fa-gossip"><i class="fa-solid fa-comments me-1"></i></i> 공주님들의 생생 별점 & 총평 피드
            </div>
            <div class="card-body-custom">
                <div id="reviewFeedList">
                    <div class="text-center py-3"><div class="spinner-border spinner-pink" role="status"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="feed.html" class="bottom-nav-item active">
            <i class="fa-solid fa-house-heart"><i class="fa-solid fa-rss"></i></i>
            <span>소통 피드</span>
        </a>
        <a href="write.html" class="bottom-nav-item">
            <i class="fa-solid fa-pen-to-square"></i>
            <span>비밀 기록</span>
        </a>
        <a href="dashboard.html" class="bottom-nav-item">
            <i class="fa-solid fa-crown"></i>
            <span>핑크 라운지</span>
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>
    <script>
        checkAuth();

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("userBadge").textContent = `👸 ${getLoggedInMember()} 공주`;
            loadRecommendationFeed();
            loadReviewFeed();
        });

        // 1. 추천 도서 피드 로드
        async function loadRecommendationFeed() {
            try {
                const { data, error } = await _db
                    .from('recommendations')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                const container = document.getElementById("recommendationFeedList");
                container.innerHTML = "";

                if (!data || data.length === 0) {
                    container.innerHTML = `<p class="text-center text-muted m-0 py-3">아직 등록된 추천 도서가 없사옵니다.</p>`;
                    return;
                }

                data.forEach(item => {
                    container.innerHTML += `
                        <div class="p-3 mb-2 border-bottom border-secondary bg-dark rounded-3" style="border-color: rgba(255,0,127,0.1) !important;">
                            <div class="d-flex justify-content-between align-items-center mb-1">
                                <span class="fw-bold text-pink" style="color: var(--bp-pink) !important;">👸 ${item.member_name} 공주님 픽</span>
                                <span class="badge bg-secondary style" style="font-size:0.75rem;">타겟월: ${item.target_month}</span>
                            </div>
                            <h6 class="text-white fw-bold mb-1"><i class="fa-solid fa-book-sparkles me-1 text-warning"></i> ${item.title}</h6>
                            <p class="text-muted small m-0">별칭/한줄요약: ${item.nickname || '없음'}</p>
                        </div>
                    `;
                });
            } catch (err) {
                console.error(err);
                document.getElementById("recommendationFeedList").innerHTML = `<p class="text-danger">피드 로드 실패</p>`;
            }
        }

        // 2. 총평 및 별점 피드 로드
        async function loadReviewFeed() {
            try {
                const { data, error } = await _db
                    .from('reviews_ratings')
                    .select('*')
                    .order('round_no', { ascending: false })
                    .order('created_at', { ascending: false });

                if (error) throw error;
                const container = document.getElementById("reviewFeedList");
                container.innerHTML = "";

                if (!data || data.length === 0) {
                    container.innerHTML = `<p class="text-center text-muted m-0 py-3">아직 남겨진 총평이 없사옵니다.</p>`;
                    return;
                }

                data.forEach(item => {
                    const stars = item.rating ? '★'.repeat(Math.floor(item.rating)) + (item.rating % 1 !== 0 ? '½' : '') : '평가없음';
                    container.innerHTML += `
                        <div class="p-3 mb-2 rounded-3" style="background-color: #22101A; border: 1px dashed rgba(255,105,180,0.2);">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="fw-bold text-white"><span class="badge bg-danger me-1" style="background-color: var(--neon-pink) !important;">${item.round_no}회차</span> ${item.member_name}</span>
                                <span class="text-warning fw-bold" style="color: var(--royal-gold) !important;">${stars} (${item.rating || '0'})</span>
                            </div>
                            <p class="text-white m-0 small" style="line-height:1.5; word-break: break-all;">
                                <i class="fa-solid fa-quote-left me-1 text-pink" style="color: var(--bp-pink);"></i>
                                ${item.review_text || '별점만 조용히 남겨주셨사옵니다.'}
                            </p>
                        </div>
                    `;
                });
            } catch (err) {
                console.error(err);
                document.getElementById("reviewFeedList").innerHTML = `<p class="text-danger">리뷰 피드 로드 실패</p>`;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>독한녀들 Book Club - Gate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: var(--bp-black); overflow: hidden;"> <div class="login-container container-fluid px-3">
        <div class="login-box p-3" style="max-width: 350px; border-radius: 24px;">
            
            <h2 class="brand-logo mb-1" style="font-size: 1.9rem;">독한녀들 <span>👑</span></h2>
            <p class="text-muted mb-3" style="font-size: 0.78rem;">러블리 공주님들의 시크릿 티타임 관문</p>

            <div class="p-2 mb-3 rounded text-start" id="upcomingNoticeBox"
                 style="background: rgba(255, 0, 127, 0.04); border: 1px dashed var(--neon-pink); font-size: 0.78rem;">
                <div class="fw-bold text-pink mb-1" style="font-size: 0.8rem;">
                    <i class="fa-solid fa-mug-hot me-1 text-warning"></i> 다음 티타임 예정 스펙 예고
                </div>
                <div id="upcomingContent" class="text-white" style="line-height: 1.4;">
                    <span class="text-muted">실시간 예고장을 수색 중이옵니다...</span>
                </div>
            </div>

            <div class="mb-3 text-start">
                <label class="form-label text-pink small fw-bold mb-1"><i class="fa-solid fa-wand-magic-sparkles"></i> 오늘 수다 떨 공주님은 누구? 💕</label>
                <select class="form-select form-select-custom py-2" id="memberSelect" style="font-size:0.9rem;">
                    <option value="">정예 공주님을 선택하셔요 🎀</option>
                </select>
            </div>

            <div class="mb-3 text-start">
                <label class="form-label text-pink small fw-bold mb-1"><i class="fa-solid fa-key"></i> 시크릿 시그널 (숫자 4자리) 🤫</label>
                <input type="password" class="form-control form-control-custom password-box-princess text-center py-2 text-white fw-bold" 
                       id="passwordInput" maxlength="4" placeholder="••••" inputmode="numeric" pattern="[0-9]*" onkeyup="handlePasswordAutoSubmit()">
            </div>

            <p class="text-muted m-0 px-1" style="font-size: 0.72rem; line-height: 1.3;">
                ※ 공주님 선택 후 패스워드 4자리를 입력하시면 <br>시크릿 아지트로 자동 입장되옵니다.
            </p>
            
            <div id="errorMessageArea" class="text-danger fw-bold mt-2 d-none" style="font-size: 0.75rem;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>

    <script>
        // 로그인 상태라면 문지기 패스하고 바로 피드로 대피
        if (localStorage.getItem("login_member")) {
            window.location.href = "feed.html";
        }

        document.addEventListener("DOMContentLoaded", () => {
            fetchGateActiveMembers();
            fetchUpcomingTeatimeSpec();
        });

        // 1. 드롭다운 바인딩을 위한 활성 공주 명단 로드
        async function fetchGateActiveMembers() {
            const select = document.getElementById("memberSelect");
            try {
                const { data, error } = await _db
                    .from('members')
                    .select('member_name')
                    .eq('is_active', true)
                    .order('member_name', { ascending: true });

                if (error) throw error;
                
                data.forEach(m => {
                    select.innerHTML += `<option value="${m.member_name}">${m.member_name} 공주님</option>`;
                });
            } catch (err) {
                console.error(err);
                document.getElementById("errorMessageArea").textContent = "⚠️ 공주님 명단을 불러오지 못했사옵니다.";
                document.getElementById("errorMessageArea").classList.remove("d-none");
            }
        }

        // 👑 [Zoro's Gate Spec Scanner] is_closed가 false인 차기 지정도서 완벽 스캔 및 제로스크롤 배치 빌더
        async function fetchUpcomingTeatimeSpec() {
            const contentZone = document.getElementById("upcomingContent");
            try {
                const { data, error } = await _db
                    .from('books')
                    .select('round_no, title, discussion_date, location')
                    .eq('is_closed', false) // 👑 선장의 핵심 필터링 명세 조건
                    .order('round_no', { ascending: true });

                if (error) throw error;

                if (!data || data.length === 0) {
                    contentZone.innerHTML = `<div class="text-muted" style="font-size:0.72rem;">현재 예정된 다음 티타임 일정이 없사옵니다. ☕</div>`;
                    return;
                }

                // 여러 개의 책이 한 차수에 동시 선정될 수 있으므로 유연하게 압축 결합!
                const targetRound = data[0].round_no;
                const formattedDate = data[0].discussion_date ? data[0].discussion_date : '미정';
                const formattedLocation = data[0].location ? data[0].location : '장소 미정 📍';
                
                // 도서 제목들만 쏙 발라내기
                const bookTitles = data.map(b => `<b>[${b.title}]</b>`).join(', ');

                // 모바일 해상도 터짐을 방지하기 위한 슬림 한줄 스펙 압축 레이아웃 렌더링!
                contentZone.innerHTML = `
                    <div class="text-white" style="font-size:0.8rem; font-weight:500;">
                        <span class="text-warning fw-bold">[제 ${targetRound}회차]</span> ${bookTitles}
                    </div>
                    <div class="d-flex justify-content-between mt-1 text-muted" style="font-size:0.72rem; color: var(--text-muted) !important;">
                        <span>📅 날짜 : ${formattedDate}</span>
                        <span class="text-truncate" style="max-width:50%;">📍 장소 : ${formattedLocation}</span>
                    </div>
                `;
            } catch (err) {
                console.error("예고장 스캔 실패:", err);
                contentZone.innerHTML = `<span class="text-danger" style="font-size:0.72rem;">예고편 로드 실패</span>`;
            }
        }

        // 4자리 입력 시 번개처럼 패스워드 자동 일치 검증 처리 기믹
        async function handlePasswordAutoSubmit() {
            const name = document.getElementById("memberSelect").value;
            const pwd = document.getElementById("passwordInput").value;
            const errZone = document.getElementById("errorMessageArea");

            if (!name) {
                if (pwd.length > 0) {
                    alert("공주님 이름부터 셀렉트 박스에서 고르셔요!");
                    document.getElementById("passwordInput").value = "";
                }
                return;
            }

            // 4자리가 꽉 차는 순간 다이렉트 직격 검증 단행
            if (pwd.length === 4) {
                errZone.classList.add("d-none");
                try {
                    const { data, error } = await _db
                        .from('members')
                        .select('member_name, image_name, password')
                        .eq('member_name', name)
                        .eq('password', pwd)
                        .eq('is_active', true);

                    if (error) throw error;

                    if (data && data.length > 0) {
                        // 일치 확인 시 세션 키 발급 후 입장권 끊기
                        localStorage.setItem("login_member", data[0].member_name);
                        localStorage.setItem("login_member_image", data[0].image_name || 'default_princess.png');
                        
                        window.location.href = "feed.html";
                    } else {
                        errZone.textContent = "❌ 시크릿 시그널 암호가 올바르지 않사옵니다.";
                        errZone.classList.remove("d-none");
                        document.getElementById("passwordInput").value = "";
                        document.getElementById("passwordInput").focus();
                    }
                } catch (err) {
                    console.error(err);
                    errZone.textContent = "⚠️ 서버 통신 검격 도중 장해 발생.";
                    errZone.classList.remove("d-none");
                }
            }
        }
    </script>
</body>
</html>

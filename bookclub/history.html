<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>독한녀들 Book Club - History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">

    <style>
        /* 👑 [Zoro's Epic History Dynamic UI Custom Styles] */
        .history-card {
            background: linear-gradient(135deg, #141414, #1c1c1c);
            border: 1px solid rgba(255, 105, 180, 0.12) !important;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }
        .history-card:hover {
            border-color: rgba(255, 0, 127, 0.3) !important;
            box-shadow: 0 12px 30px rgba(255, 0, 127, 0.1);
        }
        .history-photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 8px;
        }
        .history-photo-item {
            position: relative;
            width: 100%;
            padding-top: 100%; /* 1:1 정방형 결속 */
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: #000;
        }
        .history-photo-item img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
        }
        .photo-delete-badge {
            position: absolute;
            top: 2px;
            right: 2px;
            background: #FF007F;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.65rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .attendee-badge-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .attendee-chip {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 215, 0, 0.15);
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.72rem;
            color: #eee;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
    </style>
</head>
<body>

    <div class="container-fluid">
        <div class="dashboard-header">
            <div class="d-flex justify-content-between align-items-center">
                <h1><i class="fa-solid fa-monument text-pink" style="color: var(--neon-pink);"></i> 독한 연대기 <span>HISTORY</span></h1>
                <span class="badge bg-dark border border-pink text-pink p-2" id="userBadge" style="color: var(--bp-pink) !important;">공주님</span>
            </div>
            <p class="text-muted mt-2 m-0">우리가 나눈 치열한 지성과 달콤한 수다의 흔적들을 영구 보존하옵니다 👑</p>
        </div>

        <div class="row g-2 mb-3">
            <div class="col-12">
                <div class="p-3 bg-dark rounded-3 border border-secondary" style="border-color: rgba(255,255,255,0.06) !important;">
                    <label class="form-label text-pink small fw-bold mb-1"><i class="fa-solid fa-magnifying-glass-chart"></i> 특정 회차 대서사시 조준경 (점프점프)</label>
                    <select class="form-select form-select-custom py-2" id="roundJumpSelect" onchange="handleRoundJumpSelect(this.value)">
                        <option value="">정주행 연대기 전체 보기 (최근 순) 🎞️</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="historyMasterContainer" class="d-flex flex-column gap-3">
            </div>

        <div class="mt-4 mb-4 text-center px-1" id="loadMoreBtnArea">
            <button class="btn btn-princess w-100 p-2.5 fw-bold" id="btnLoadMoreHistories" onclick="fetchNextHistoryPage()">
                <i class="fa-solid fa-angles-down me-1"></i> 이전 대서사시 5개 더 불러오기
            </button>
        </div>
    </div>

    <div id="global-nav" data-active="history"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>

    <script>
        checkAuth();

        let currentPageOffset = 0; // 무한 스크롤 페이징 오프셋 포인터
        const ITEMS_PER_PAGE = 5;  // 5개씩 쪼개오기 방어 한도선
        let isLastPageReached = false;

        document.addEventListener("DOMContentLoaded", async () => {
            document.getElementById("userBadge").textContent = `👸 ${getLoggedInMember()} 공주`;
            await populateRoundDropdownFilter();
            await fetchHistoryDataOrchestrator(false); // 최초 로딩 가동
        });

        // 드롭다운 조준경 선택 목록 필터 수집
        async function populateRoundDropdownFilter() {
            const select = document.getElementById("roundJumpSelect");
            try {
                const { data, error } = await _db
                    .from('discussion_histories')
                    .select('round_no')
                    .order('round_no', { ascending: false });

                if (error) throw error;
                if (data) {
                    data.forEach(h => {
                        const opt = document.createElement("option");
                        opt.value = h.round_no;
                        opt.textContent = `제 ${h.round_no}회차 대서사시 보러가기 ✨`;
                        select.appendChild(opt);
                    });
                }
            } catch (err) { console.error("드롭다운 바인딩 장해:", err); }
        }

        // 드롭다운 조준 시 점프 서치 제어 핸들러
        async function handleRoundJumpSelect(val) {
            const container = document.getElementById("historyMasterContainer");
            const loadMoreBtn = document.getElementById("btnLoadMoreHistories");
            container.innerHTML = "";

            if (val === "") {
                // 전체 정주행 복귀
                currentPageOffset = 0;
                isLastPageReached = false;
                loadMoreBtn.classList.remove("d-none");
                await fetchHistoryDataOrchestrator(false);
            } else {
                // 특정 회차 단 한 장만 정밀 타격 소환
                loadMoreBtn.classList.add("d-none");
                await fetchHistoryDataOrchestrator(false, parseInt(val));
            }
        }

        // 다음 페이지 페이징 포인터 밀어 올리기
        async function fetchNextHistoryPage() {
            if (isLastPageReached) return;
            currentPageOffset += ITEMS_PER_PAGE;
            await fetchHistoryDataOrchestrator(true);
        }

        // 👑 [Zoro's Multi-Query Link Joiner]: 히스토리, 다중 도서, 출석 명단을 연쇄 사냥해오는 핵심 메커니즘
        async function fetchHistoryDataOrchestrator(isAppend = false, targetRound = null) {
            const container = document.getElementById("historyMasterContainer");
            
            try {
                let query = _db.from('discussion_histories').select('*');

                if (targetRound !== null) {
                    query = query.eq('round_no', targetRound);
                } else {
                    // 무한 스크롤 용 .range 처리
                    const startIdx = currentPageOffset;
                    const endIdx = currentPageOffset + ITEMS_PER_PAGE - 1;
                    query = query.order('round_no', { ascending: false }).range(startIdx, endIdx);
                }

                const { data: histories, error: histErr } = await query;
                if (histErr) throw histErr;

                if (!isAppend && (!histories || histories.length === 0)) {
                    container.innerHTML = `<div class="text-center py-5 text-muted small"><i class="fa-solid fa-folder-open d-block fs-1 mb-2"></i> 아지트에 등록된 역사적 히스토리 카드가 아직 없사옵니다.</div>`;
                    document.getElementById("btnLoadMoreHistories").classList.add("d-none");
                    return;
                }

                // 5개 한도보다 적게 긁어왔다면 마지막 영토 도달 마킹 처리
                if (targetRound === null && histories.length < ITEMS_PER_PAGE) {
                    isLastPageReached = true;
                    document.getElementById("btnLoadMoreHistories").classList.add("d-none");
                }

                const roundNumbers = histories.map(h => h.round_no);

                // 병렬 연쇄 연동 사냥 발사 (다중 도서 목록 + 출석부 명단 다발 인출)
                const [booksResponse, attendeesResponse] = await Promise.all([
                    _db.from('books').select('round_no, title, discussion_date, location').in('round_no', roundNumbers),
                    _db.from('reviews_ratings').select('round_no, member_id, members(member_name, image_name)').in('round_no', roundNumbers)
                ]);

                if (booksResponse.error) throw booksResponse.error;
                if (attendeesResponse.error) throw attendeesResponse.error;

                const allBooks = booksResponse.data || [];
                const allAttendees = attendeesResponse.data || [];

                // 융합 렌더링 루프 가동
                histories.forEach(hist => {
                    const matchedBooks = allBooks.filter(b => b.round_no === hist.round_no);
                    const matchedAttendees = allAttendees.filter(a => a.round_no === hist.round_no);
                    
                    const cardHtml = buildHistoryCardHtml(hist, matchedBooks, matchedAttendees);
                    container.innerHTML += cardHtml;
                });

            } catch (err) {
                console.error("연대기 대합동 쿼리 대참사:", err);
                container.innerHTML += `<div class="p-3 text-center text-danger small fw-bold">역사 보관소 로딩 실패장해 발생.</div>`;
            }
        }

        // 👑 히스토리 카드 레이아웃 빌더 (자동 출석부 배지 렌더러 탑재)
        function buildHistoryCardHtml(hist, books, attendees) {
            const roundNo = hist.round_no;
            const bookTitles = books.map(b => `<b>[${b.title}]</b>`).join(', ');
            const targetDate = books.length > 0 && books[0].discussion_date ? books[0].discussion_date : '날짜 조율기록 미정';
            const targetLocation = books.length > 0 && books[0].location ? books[0].location : '장소 조율기록 미정';

            // 출석 공주님 중복 명단 정돈 및 배지 칩 빌드 (별점 구운 유니크 ID 필터링)
            const uniqueAttendanceMap = new Map();
            attendees.forEach(a => {
                if (a.members && !uniqueAttendanceMap.has(a.member_id)) {
                    uniqueAttendanceMap.set(a.member_id, a.members);
                }
            });

            let attendeeChipsHtml = "";
            if (uniqueAttendanceMap.size === 0) {
                attendeeChipsHtml = `<span class="text-muted small">출석 도장 공백</span>`;
            } else {
                uniqueAttendanceMap.forEach((memberInfo) => {
                    attendeeChipsHtml += `
                        <span class="attendee-chip">
                            <img src="images/${memberInfo.image_name || 'default_princess.png'}" class="princess-avatar-xs" onerror="this.src='images/default_princess.png'">
                            ${memberInfo.member_name}
                        </span>
                    `;
                });
            }

            // 현장 사진첩 앨범 이미지 가공
            let photosHtml = "";
            if (hist.photo_urls && hist.photo_urls.length > 0) {
                hist.photo_urls.forEach((url, pIdx) => {
                    photosHtml += `
                        <div class="history-photo-item" id="photoBox_${roundNo}_${pIdx}">
                            <img src="${url}">
                            <button type="button" class="photo-delete-badge d-none node-delete-${roundNo}" onclick="deleteHistoryPhotoAction(${roundNo}, '${url}', ${pIdx})">❌</button>
                        </div>
                    `;
                });
            } else {
                photosHtml = `<div class="text-muted small py-2 id-empty-photo-${roundNo}"><i class="fa-regular fa-images me-1"></i> 현장 박제 사진첩이 비어있사옵니다.</div>`;
            }

            return `
                <div class="card history-card text-start p-3.5 mb-1" id="card_master_${roundNo}">
                    <div class="d-flex justify-content-between align-items-center border-bottom border-secondary pb-2 mb-2" style="border-color: rgba(255,0,127,0.15) !important;">
                        <div>
                            <span class="badge bg-danger" style="background-color: var(--neon-pink) !important; font-size: 0.78rem;">제 ${roundNo}회차</span>
                            <span class="text-muted small ms-2"><i class="fa-solid fa-calendar-day"></i> ${targetDate}</span>
                        </div>
                        <button class="btn btn-outline-pink btn-sm py-0.5 px-2" id="editTriggerBtn_${roundNo}" onclick="toggleHistoryCardEditMode(${roundNo})" style="font-size:0.75rem;">
                            <i class="fa-solid fa-file-pen"></i> 역사 수정
                        </button>
                    </div>

                    <div class="text-white mb-2 fs-6">
                        <i class="fa-solid fa-book text-warning me-1"></i> 지정도서: ${bookTitles}
                    </div>

                    <div class="text-muted small mb-3">
                        <i class="fa-solid fa-location-dot text-pink me-1" style="color:var(--bp-pink);"></i> 개최 장소: <b>${targetLocation}</b>
                    </div>

                    <div class="mb-3">
                        <div class="fw-bold text-pink small mb-1.5" style="font-size:0.75rem;"><i class="fa-solid fa-users-rectangle"></i> 티타임에 참석한 고결한 공주 정예 명단</div>
                        <div class="attendee-badge-list">${attendeeChipsHtml}</div>
                    </div>

                    <div class="mb-3">
                        <div class="fw-bold text-pink small mb-1.5" style="font-size:0.75rem;"><i class="fa-solid fa-camera-retro"></i> 현장 아카이브 앨범</div>
                        <div class="history-photo-grid" id="photoGridMaster_${roundNo}">${photosHtml}</div>
                        
                        <div class="mt-2 d-none" id="addPhotoUploadArea_${roundNo}">
                            <input type="file" class="form-control form-control-custom py-1 px-2" id="appendPhotosInput_${roundNo}" multiple accept="image/*" onchange="executeAppendPhotosToHistory(${roundNo})" style="font-size:0.75rem; background:#000 !important;">
                        </div>
                    </div>

                    <div>
                        <div class="fw-bold text-pink small mb-1.5" style="font-size:0.75rem;"><i class="fa-solid fa-brain"></i> AI 토론 종합 분석 요약문</div>
                        
                        <div class="text-white bg-black p-3 rounded-3" id="summaryViewZone_${roundNo}" style="font-size:0.85rem; line-height:1.6; border: 1px solid rgba(255,255,255,0.03); max-height:220px; overflow-y:auto; font-weight:300; white-space: pre-wrap;">${escapeHtml(hist.summary_text)}</div>
                        
                        <textarea class="form-control form-control-custom d-none" id="summaryEditInput_${roundNo}" rows="6" style="font-size:0.85rem; line-height:1.5; background:#000 !important; color:#fff !important;"></textarea>
                    </div>

                    <div class="mt-3 text-end d-none" id="editActionPanel_${roundNo}">
                        <button class="btn btn-secondary btn-sm me-1.5" onclick="toggleHistoryCardEditMode(${roundNo}, true)" style="font-size:0.78rem;">취소</button>
                        <button class="btn btn-princess btn-sm px-3" onclick="commitHistoryUpdatesToDatabase(${roundNo})" style="font-size:0.78rem;"><i class="fa-solid fa-circle-check"></i> 개정 역사 확정 저장</button>
                    </div>
                </div>
            `;
        }

        // 👑 [Zoro 인라인 컨트롤러]: 수정 모드와 뷰 모드를 자유자재로 스위칭하는 검법
        function toggleHistoryCardEditMode(roundNo, isCancel = false) {
            const viewZone = document.getElementById(`summaryViewZone_${roundNo}`);
            const editInput = document.getElementById(`summaryEditInput_${roundNo}`);
            const actionPanel = document.getElementById(`editActionPanel_${roundNo}`);
            const deleteBadges = document.querySelectorAll(`.node-delete-${roundNo}`);
            const photoUpload = document.getElementById(`addPhotoUploadArea_${roundNo}`);
            const triggerBtn = document.getElementById(`editTriggerBtn_${roundNo}`);

            if (editInput.classList.contains("d-none") && !isCancel) {
                // 편집 개방 기믹 가동
                editInput.value = viewZone.textContent;
                editInput.classList.remove("d-none");
                viewZone.classList.add("d-none");
                actionPanel.classList.remove("d-none");
                photoUpload.classList.remove("d-none");
                triggerBtn.classList.add("active");
                deleteBadges.forEach(b => b.removeProperty ? b.removeProperty("display") : b.classList.remove("d-none"));
            } else {
                // 닫기 수습 기믹 가동
                editInput.classList.add("d-none");
                viewZone.classList.remove("d-none");
                actionPanel.classList.add("d-none");
                photoUpload.classList.add("d-none");
                triggerBtn.classList.remove("active");
                deleteBadges.forEach(b => b.classList.add("d-none"));
                
                if (isCancel) {
                    // 취소 시 원본 복구를 위해 조종 창 리프레시 정밀 강타
                    const container = document.getElementById("historyMasterContainer");
                    container.innerHTML = "";
                    currentPageOffset = 0;
                    isLastPageReached = false;
                    document.getElementById("btnLoadMoreHistories").classList.remove("d-none");
                    document.getElementById("roundJumpSelect").value = "";
                    fetchHistoryDataOrchestrator(false);
                }
            }
        }

        // 👑 [Zoro 인라인 컨트롤러 - 사진 추방 기믹]: 메모리상에서 삭제 후 확정 대기 상태 연출
        let localTempDeletedUrls = new Set(); // 취소 가능 구역 처리를 위한 단기 격리소
        function deleteHistoryPhotoAction(roundNo, url, index) {
            if(confirm("정말로 이 눈부신 현장 사진 한 장을 히스토리 앨범에서 도려내시겠사옵니다? 🥀")) {
                localTempDeletedUrls.add(url);
                document.getElementById(`photoBox_${roundNo}_${index}`).style.display = "none";
            }
        }

        // 👑 [Zoro 인라인 컨트롤러 - 사진 추가 업로드]: Canvas 이미지 압축 초식 즉석 이식 가동
        let localTempAppendedUrls = {}; 
        async function executeAppendPhotosToHistory(roundNo) {
            const files = document.getElementById(`appendPhotosInput_${roundNo}`).files;
            const grid = document.getElementById(`photoGridMaster_${roundNo}`);
            if(!files || files.length === 0) return;

            if(!localTempAppendedUrls[roundNo]) localTempAppendedUrls[roundNo] = [];

            const mockSpinnerId = `spinner_mock_${roundNo}_${Date.now()}`;
            const spinnerDiv = document.createElement("div");
            spinnerDiv.id = mockSpinnerId;
            spinnerDiv.className = "history-photo-item d-flex align-items-center justify-content-center";
            spinnerDiv.innerHTML = `<div class="spinner-border spinner-pink spinner-border-sm" role="status"></div>`;
            grid.appendChild(spinnerDiv);

            try {
                // 기존 manage.html의 핵심 자산인 Canvas 하드웨어 가속 초경량 압축 업로드엔진 병렬 임베딩 구동
                for(let i=0; i<files.length; i++) {
                    const url = await compressAndUploadHistorySingleBlob(files[i], roundNo, i);
                    localTempAppendedUrls[roundNo].push(url);

                    // 화면에 가상 썸네일 노드 즉석 인젝션
                    const nextIdx = grid.children.length + 99;
                    const newPhotoHtml = `
                        <div class="history-photo-item" id="photoBox_${roundNo}_${nextIdx}">
                            <img src="${url}">
                            <button type="button" class="photo-delete-badge node-delete-${roundNo}" onclick="localTempDeletedUrls.add('${url}'); document.getElementById('photoBox_${roundNo}_${nextIdx}').style.display='none';">❌</button>
                        </div>
                    `;
                    grid.insertAdjacentHTML('beforeend', newPhotoHtml);
                }
                
                // 임시 안내 안내 메시지가 있으면 영구 제거
                const emptyMsg = document.querySelector(`.id-empty-photo-${roundNo}`);
                if (emptyMsg) emptyMsg.style.display = "none";

                alert(`✨ 압축 완료! ${files.length}장의 사진이 초경량 상태로 장전되었습니다. 하단 [개정 역사 확정 저장]을 누르셔야 최종 반영되옵니다!`);
            } catch(e) {
                console.error(e);
                alert("가변 이미지 연쇄 압축 실패.");
            } finally {
                document.getElementById(mockSpinnerId).remove();
            }
        }

        // 단기 캔버스 연산 압축 함수 상속
        async function compressAndUploadHistorySingleBlob(file, roundNo, index) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1200;
                        let width = img.width; let height = img.height;
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);

                        canvas.toBlob(async (blob) => {
                            if (!blob) { reject("블롭 실패"); return; }
                            const path = `${roundNo}/append_${Date.now()}_${index}.jpg`;
                            try {
                                const { error } = await _db.storage.from('discussion-photos').upload(path, blob, { contentType: 'image/jpeg' });
                                if (error) throw error;
                                const { data } = _db.storage.from('discussion-photos').getPublicUrl(path);
                                resolve(data.publicUrl);
                            } catch (err) { reject(err); }
                        }, 'image/jpeg', 0.75);
                    };
                };
            });
        }

        // 👑 [Zoro 인라인 컨트롤러 - 최종 업데이트 저장]: 마침내 수정된 텍스트와 사진 배열을 융합 연산하여 DB로 밀어 넣기
        async function commitHistoryUpdatesToDatabase(roundNo) {
            const newSummary = document.getElementById(`summaryEditInput_${roundNo}`).value.trim();
            if(!newSummary) { alert("역사의 총평 요약본을 공백으로 남겨둘 수는 없사옵니다!"); return; }

            try {
                // 1. 현재 라운드의 기존 원본 데이터 스냅샷 재조사
                const { data: original, error: originErr } = await _db
                    .from('discussion_histories')
                    .select('photo_urls')
                    .eq('round_no', roundNo)
                    .single();

                if (originErr) throw originErr;

                // 2. 삭제 대상 걸러내고 새로 추가된 어펜드 사진들 융합 가공
                let finalUrls = original.photo_urls ? original.photo_urls.filter(url => !localTempDeletedUrls.has(url)) : [];
                if (localTempAppendedUrls[roundNo]) {
                    const validAppended = localTempAppendedUrls[roundNo].filter(url => !localTempDeletedUrls.has(url));
                    finalUrls = [...finalUrls, ...validAppended];
                }

                // 3. Supabase 핵심 업데이트 집행!
                const { error: updateErr } = await _db
                    .from('discussion_histories')
                    .update({
                        summary_text: newSummary,
                        photo_urls: finalUrls
                    })
                    .eq('round_no', roundNo);

                if (updateErr) throw updateErr;

                alert(`🎉 개정 연대기 수정 완료! 제 ${roundNo}회차 대서사시 기록이 무결점 상태로 완전 갱신 적재되었습니다. ✨`);
                
                // 변수 리셋 및 카드 강제 새로고침 동기화
                localTempDeletedUrls.clear();
                delete localTempAppendedUrls[roundNo];

                const container = document.getElementById("historyMasterContainer");
                container.innerHTML = "";
                currentPageOffset = 0;
                isLastPageReached = false;
                document.getElementById("btnLoadMoreHistories").classList.remove("d-none");
                document.getElementById("roundJumpSelect").value = "";
                await fetchHistoryDataOrchestrator(false);

            } catch (err) {
                console.error(err);
                alert("데이터베이스 역사 개정 도중 치명적 장애 발생.");
            }
        }

        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>

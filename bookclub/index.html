<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>독한녀들 Book Club - Princess Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🔒 [PWA 무력화 전용 특수 임베디드 핀패드 UI 엔지니어링] */
        .pin-dot-wrapper {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 20px 0;
        }
        
        .princess-pin-dot {
            width: 16px;
            height: 16px;
            border: 2px solid var(--bp-pink);
            border-radius: 50%;
            transition: all 0.15s ease-in-out;
            background: transparent;
        }

        .princess-virtual-keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 240px;
            margin: 0 auto;
        }

        .princess-virtual-btn {
            background: #111;
            border: 1px solid #222;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 14px;
            padding: 12px 0;
            transition: all 0.1s ease;
            -webkit-user-select: none;
            user-select: none;
        }

        .princess-virtual-btn:active {
            transform: scale(0.93);
            background: var(--bp-pink);
            color: #000;
            border-color: var(--bp-pink);
        }
    </style>
</head>
<body>

    <div class="container login-container">
        <div class="login-box">
            <div id="avatarStage" class="d-none">
                <img id="princessAvatarDisplay" src="images/default_princess.png" class="princess-avatar-lg" onerror="this.src='images/default_princess.png'">
            </div>

            <div class="brand-logo">
                독한녀들 <span style="color: var(--neon-pink);">👑</span>
            </div>
            <p class="text-muted mb-4">
                <i class="fa-solid fa-sparkles" style="color: var(--bp-pink);"></i> 
                러블리 공주님들의 시크릿 술타임
            </p>

            <form id="loginForm" onsubmit="event.preventDefault();">
                <div class="mb-4 text-start">
                    <label for="memberSelect" class="form-label" style="color: var(--bp-pink); font-weight: 700; font-size: 0.95rem;">
                        <i class="fa-solid fa-heart-user me-1" style="color: var(--neon-pink);"></i> 수다 떨 공주님? 💕
                    </label>
                    <select class="form-select form-select-custom" id="memberSelect" onchange="focusPasswordAndShowAvatar()" required>
                        <option value="" disabled selected>공주님 선택~ 🎀</option>
                    </select>
                </div>

                <!-- 🎹 [치트키 개조] 사파리와 크롬 오토필의 오작동을 완전히 소탕하기 위해 인풋창 박멸 후 가상 엔진 매립 -->
                <div class="mb-3 text-start" id="pinpadControlSection" style="opacity: 0.3; pointer-events: none; transition: opacity 0.3s ease-in-out;">
                    <label class="form-label" style="color: var(--bp-pink); font-weight: 700; font-size: 0.95rem;">
                        <i class="fa-solid fa-key me-1" style="color: var(--neon-pink);"></i> 시크릿 시그널 🤫
                    </label>
                    
                    <!-- 상태 시각화 비밀 도트 인디케이터 구역 -->
                    <div class="pin-dot-wrapper">
                        <div class="princess-pin-dot" id="p-dot-0"></div>
                        <div class="princess-pin-dot" id="p-dot-1"></div>
                        <div class="princess-pin-dot" id="p-dot-2"></div>
                        <div class="princess-pin-dot" id="p-dot-3"></div>
                    </div>

                    <!-- 순수 버튼 배열 마스터 그리드 핀패드 -->
                    <div class="princess-virtual-keypad">
                        <button type="button" class="princess-virtual-btn" onclick="touchPinKey('1')">1</button>
                        <button type="button" class="princess-virtual-btn" onclick="touchPinKey('2')">2</button>
                        <button type="button" class="princess-virtual-btn" onclick="touchPinKey('3')">3</button>
                        <button type="button" class="princess-virtual-btn" onclick="touchPinKey('4')">4</button>
                        <button type="button" class="princess-virtual-btn" onclick="touchPinKey('5')">5</button>
                        <button type="button" class="princess-virtual-btn" onclick="touchPinKey('6')">6</button>
                        <button type="button" class="princess-virtual-btn" onclick="touchPinKey('7')">7</button>
                        <button type="button" class="princess-virtual-btn" onclick="touchPinKey('8')">8</button>
                        <button type="button" class="princess-virtual-btn" onclick="touchPinKey('9')">9</button>
                        <button type="button" class="princess-virtual-btn text-danger" style="font-size: 0.75rem; font-weight: 900;" onclick="touchPinKey('CLR')">CLR</button>
                        <button type="button" class="princess-virtual-btn" onclick="touchPinKey('0')">0</button>
                        <button type="button" class="princess-virtual-btn text-secondary" style="font-size: 0.95rem;" onclick="touchPinKey('BACK')">⌫</button>
                    </div>
                </div>

                <p id="infoMessage" class="small text-muted mt-3">
                    ※ 공주님 선택 후 가상 패스워드 4자리를 치면 자동 입자앙~
                </p>

                <div id="errorMessage" class="text-danger mt-3 fw-bold small" style="display: none; text-shadow: 0 0 5px rgba(255,0,0,0.3);"></div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let isProcessing = false;
        const avatarMap = {};
        
        // 🔒 독학녀들 전용 가상 암호 임베디드 스트리지 버퍼
        let virtualPinBuffer = "";

        document.addEventListener("DOMContentLoaded", () => {
            loadMembers();
        });

        // DB에서 활성 공주님 리스트만 정밀 로드
        async function loadMembers() {
            try {
                const { data, error } = await _db
                    .from('members')
                    .select('member_name, image_name')
                    .eq('is_active', true) 
                    .order('member_name', { ascending: true });

                if (error) throw error;

                const selectEl = document.getElementById("memberSelect");
                
                if (data) {
                    data.forEach(member => {
                        avatarMap[member.member_name] = member.image_name;
                        const option = document.createElement("option");
                        option.value = member.member_name;
                        option.textContent = `👸 ${member.member_name} 공주님`;
                        selectEl.appendChild(option);
                    });
                }
            } catch (err) {
                console.error(err);
                showError("공주님 명단을 불러오지 못했사옵니다.");
            }
        }

        function focusPasswordAndShowAvatar() {
            const memberName = document.getElementById("memberSelect").value;
            const avatarStage = document.getElementById("avatarStage");
            const avatarImg = document.getElementById("princessAvatarDisplay");
            const pinpadSection = document.getElementById("pinpadControlSection");

            if (memberName && avatarMap[memberName]) {
                avatarImg.src = `images/${avatarMap[memberName]}`;
                avatarStage.classList.remove("d-none");
            }

            // 공주님이 제대로 셀렉트되면 가상 키패드 락 해제 조치
            pinpadSection.style.opacity = "1";
            pinpadSection.style.pointerEvents = "auto";
            
            // 입력 데이터 초기화 스트림
            virtualPinBuffer = "";
            renderPrincessDots();
            
            document.getElementById("errorMessage").style.display = "none";
            isProcessing = false;
        }

        // 🎹 가상 패드 입력 라우터 스위치
        function touchPinKey(key) {
            const memberName = document.getElementById("memberSelect").value;
            if (!memberName) {
                showError("어머나! 어느 공주님이신지 먼저 선택하셔야죠?");
                return;
            }

            if (isProcessing) return;
            document.getElementById("errorMessage").style.display = "none";

            if (key === 'CLR') {
                virtualPinBuffer = "";
            } else if (key === 'BACK') {
                virtualPinBuffer = virtualPinBuffer.slice(0, -1);
            } else {
                if (virtualPinBuffer.length < 4) {
                    virtualPinBuffer += key;
                }
            }

            renderPrincessDots();

            // 4자리가 들어차는 순간 도화선 격발
            if (virtualPinBuffer.length === 4) {
                executeAutoPrincessLogin();
            }
        }

        // 핑키 도트 동적 트래킹 렌더러
        function renderPrincessDots() {
            const currentLen = virtualPinBuffer.length;
            for (let i = 0; i < 4; i++) {
                const dot = document.getElementById(`p-dot-${i}`);
                if (dot) {
                    if (i < currentLen) {
                        dot.style.background = "var(--neon-pink)";
                        dot.style.borderColor = "var(--neon-pink)";
                    } else {
                        dot.style.background = "transparent";
                        dot.style.borderColor = "var(--bp-pink)";
                    }
                }
            }
        }

        async function executeAutoPrincessLogin() {
            const memberName = document.getElementById("memberSelect").value;
            const errorDiv = document.getElementById("errorMessage");
            
            isProcessing = true;

            try {
                // 👑 [Zoro Link System] 고유 id 컬럼 및 암호 검증 트랜잭션 전개
                const { data, error } = await _db
                    .from('members')
                    .select('id, member_name, password, image_name') 
                    .eq('member_name', memberName)
                    .eq('password', virtualPinBuffer)
                    .eq('is_active', true); 

                if (error) throw error;

                if (data && data.length > 0) {
                    // 👑 [Zoro Link System] 로컬 로운지 세션 창고 최종 보존 바인딩
                    localStorage.setItem("login_member_id", data[0].id);
                    localStorage.setItem("login_member", memberName);
                    localStorage.setItem("login_member_image", data[0].image_name);
                    
                    window.location.href = "gate.html";
                } else {
                    showError("시크릿 시그널이 올바르지 않사옵니다, 공주님! 🥀");
                    virtualPinBuffer = ""; 
                    renderPrincessDots();
                    isProcessing = false; 
                }
            } catch (err) {
                console.error(err);
                showError("서버 라운지에 일시적 문제가 발생했사옵니다.");
                virtualPinBuffer = "";
                renderPrincessDots();
                isProcessing = false;
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById("errorMessage");
            errorDiv.innerHTML = `<i class="fa-solid fa-triangle-exclamation me-1"></i> ${message}`;
            errorDiv.style.display = "block";
        }
    </script>
</body>
</html>

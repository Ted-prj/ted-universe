<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>독한녀들 Book Club - Princess Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container login-container">
        <div class="login-box">
            <div id="avatarStage" class="d-none animate-flicker">
                <img id="princessAvatarDisplay" src="images/default_princess.png" class="princess-avatar-lg" onerror="this.src='images/default_princess.png'">
            </div>

            <div class="brand-logo">
                독한녀들 <span style="color: var(--neon-pink);">👑</span>
            </div>
            <p class="text-muted mb-4">
                <i class="fa-solid fa-sparkles" style="color: var(--bp-pink);"></i> 
                러블리 공주님들의 시크릿 티타임 관문
            </p>

            <form id="loginForm" onsubmit="event.preventDefault();">
                <div class="mb-4 text-start">
                    <label for="memberSelect" class="form-label" style="color: var(--bp-pink); font-weight: 700; font-size: 0.95rem;">
                        <i class="fa-solid fa-heart-user me-1" style="color: var(--neon-pink);"></i> 오늘 수다 떨 공주님은 누구? 💕
                    </label>
                    <select class="form-select form-select-custom" id="memberSelect" onchange="focusPasswordAndShowAvatar()" required>
                        <option value="" disabled selected>공주님을 선택하셔요 🎀</option>
                    </select>
                </div>

                <div class="mb-3 text-start">
                    <label for="passwordInput" class="form-label" style="color: var(--bp-pink); font-weight: 700; font-size: 0.95rem;">
                        <i class="fa-solid fa-key me-1" style="color: var(--neon-pink);"></i> 시크릿 시그널 (숫자 4자리) 🤫
                    </label>
                    <input type="password" 
                           class="form-control form-control-custom text-center fs-4 fw-bold password-box-princess" 
                           id="passwordInput" 
                           placeholder="••••" 
                           maxlength="4" 
                           inputmode="numeric" 
                           pattern="[0-9]*"
                           oninput="checkPasswordAutoLogin(this)"
                           disabled>
                </div>

                <p id="infoMessage" class="small text-muted mt-2">
                    ※ 공주님 선택 후 패스워드 4자리를 치면 자동 입장되옵니다.
                </p>

                <div id="errorMessage" class="text-danger mt-3 fw-bold small" style="display: none; text-shadow: 0 0 5px rgba(255,0,0,0.3);"></div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let isProcessing = false;
        // 아바타 매핑 데이터 캐시용 오브젝트
        const avatarMap = {};

        document.addEventListener("DOMContentLoaded", () => {
            loadMembers();
        });

        async function loadMembers() {
            try {
                const { data, error } = await _db
                    .from('members')
                    .select('member_name, image_name')
                    .order('member_name', { ascending: true });

                if (error) throw error;

                const selectEl = document.getElementById("memberSelect");
                
                if (data) {
                    data.forEach(member => {
                        avatarMap[member.member_name] = member.image_name;
                        const option = document.createElement("option");
                        option.value = member.member_name;
                        option.textContent = `👸 ${member.member_name} 공주님`;
                        selectEl.appendChild(option);
                    });
                }
            } catch (err) {
                console.error(err);
                showError("공주님 명단을 불러오지 못했사옵니다.");
            }
        }

        // 선택 즉시 상단에 아바타 액자를 렌더링하고 포커싱한다
        function focusPasswordAndShowAvatar() {
            const memberName = document.getElementById("memberSelect").value;
            const passInput = document.getElementById("passwordInput");
            const avatarStage = document.getElementById("avatarStage");
            const avatarImg = document.getElementById("princessAvatarDisplay");

            if (memberName && avatarMap[memberName]) {
                avatarImg.src = `images/${avatarMap[memberName]}`;
                avatarStage.classList.remove("d-none");
            }

            passInput.disabled = false;
            passInput.value = "";
            passInput.focus();
            document.getElementById("errorMessage").style.display = "none";
            isProcessing = false;
        }

        async function checkPasswordAutoLogin(input) {
            const memberName = document.getElementById("memberSelect").value;
            const password = input.value.trim();
            const errorDiv = document.getElementById("errorMessage");
            
            if (!memberName) {
                showError("어머나! 어느 공주님이신지 먼저 선택하셔야죠?");
                input.value = "";
                return;
            }

            if (isProcessing) return;
            errorDiv.style.display = "none";

            if (password.length === 4) {
                isProcessing = true; 
                input.blur(); 

                try {
                    const { data, error } = await _db
                        .from('members')
                        .select('member_name, password, image_name')
                        .eq('member_name', memberName)
                        .eq('password', password);

                    if (error) throw error;

                    if (data && data.length > 0) {
                        // 세션 적재 시 이름과 이미지 파일명도 함께 기억시킨다
                        localStorage.setItem("login_member", memberName);
                        localStorage.setItem("login_member_image", data[0].image_name);
                        
                        // [숙제 검사 모듈]
                        try {
                            const now = new Date();
                            const future = new Date(now.getFullYear(), now.getMonth() + 1, 1);
                            const nextMonthStr = `${future.getFullYear()}-${String(future.getMonth() + 1).padStart(2, '0')}`;
                            
                            const { data: bookData } = await _db
                                .from('books')
                                .select('round_no')
                                .order('round_no', { ascending: false })
                                .limit(1);
                            const latestRound = bookData && bookData.length > 0 ? bookData[0].round_no : 0;

                            const { data: recData } = await _db
                                .from('recommendations')
                                .select('id')
                                .eq('member_name', memberName)
                                .eq('target_month', nextMonthStr);
                            const hasRec = recData && recData.length > 0;

                            let hasReview = true;
                            if (latestRound > 0) {
                                const { data: revData } = await _db
                                    .from('reviews_ratings')
                                    .select('id')
                                    .eq('member_name', memberName)
                                    .eq('round_no', latestRound)
                                    .not('review_text', 'is', null);
                                hasReview = revData && revData.length > 0;
                            }

                            if (!hasRec || !hasReview) {
                                let alertMsg = `✨ [시크릿 라운지 알림] ✨\n\n👸 ${memberName} 공주님! 아직 비밀 기록장에 흔적을 남기지 않으셨사옵니다!\n\n`;
                                if (!hasRec) alertMsg += `❌ 다음 달(${future.getMonth() + 1}월) 추천 도서 미등록\n`;
                                if (!hasReview) alertMsg += `❌ 이번 달(${latestRound}회차) 토론 총평 미등록\n`;
                                alertMsg += `\n입장하신 후 꼭 '비밀 기록' 탭으로 이동하셔서 우아하게 입력해 주셔요! 💕`;
                                alert(alertMsg);
                            }
                        } catch (checkErr) {
                            console.error(checkErr);
                        }

                        window.location.href = "feed.html";
                    } else {
                        showError("시크릿 시그널이 올바르지 않사옵니다, 공주님! 🥀");
                        input.value = ""; 
                        isProcessing = false; 
                        input.focus();
                    }
                } catch (err) {
                    console.error(err);
                    showError("서버 라운지에 일시적 문제가 발생했사옵니다.");
                    input.value = "";
                    isProcessing = false;
                }
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById("errorMessage");
            errorDiv.innerHTML = `<i class="fa-solid fa-triangle-exclamation me-1"></i> ${message}`;
            errorDiv.style.display = "block";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>독한녀들 Book Club - Manage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container-fluid">
        <div class="dashboard-header">
            <div class="d-flex justify-content-between align-items-center">
                <h1><i class="fa-solid fa-screwdriver-wrenches text-pink" style="color: var(--neon-pink);"></i> 시크릿 운영 <span>MANAGE</span></h1>
                <span class="badge bg-dark border border-warning text-warning p-2" id="roundStatusBadge"><i class="fa-solid fa-gavel"></i> 차수 로딩 중...</span>
            </div>
            <p class="text-muted mt-2 m-0">티타임 마감, 최종 별점 수거 및 다음 회차 진급 처리를 대행하옵니다 👑</p>
        </div>

        <div class="stat-card mb-4" style="border-color: var(--neon-pink) !important;">
            <div class="card-header-custom" style="color: var(--neon-pink) !important; font-weight:900;">
                <i class="fa-solid fa-mug-tea" style="color: var(--neon-pink) !important;"></i> ☕ <span id="currentRoundTitleLabel">현재 차수</span> 토론 마감 및 최종 별점 수거
            </div>
            <div class="card-body-custom p-3">
                <p class="text-muted small mb-3">※ 토론을 마무리하며 갈대 같은 공주님들의 최종 평점(rating_after)을 거두어 주셔요.</p>
                <div id="memberFinalRatingsContainer" class="d-flex flex-column gap-2">
                    <div class="text-center py-2"><div class="spinner-border spinner-pink spinner-sm" role="status"></div></div>
                </div>
            </div>
        </div>

        <div class="stat-card mb-4">
            <div class="card-header-custom">
                <i class="fa-solid fa-calendar-circle-plus"></i> 📅 다음 차수 도서 및 토론 일정 수립
            </div>
            <div class="card-body-custom p-3">
                <div class="mb-3">
                    <label class="form-label text-pink small fw-bold" id="nextRoundDateLabel">다음 차수 토론 날짜 선택</label>
                    <input type="date" class="form-control form-control-custom text-center text-white" id="nextRoundDateInput" style="background:#000 !important;" required>
                </div>

                <div class="form-check form-switch mb-3 px-5">
                    <input class="form-check-input" type="checkbox" id="spontaneousToggle" onchange="toggleSpontaneousForm()">
                    <label class="form-check-label text-warning small fw-bold" for="spontaneousToggle">💡 후보작 목록 외 [즉석 도서 직접 기입] 하기</label>
                </div>

                <div id="candidateSelectionWrapper">
                    <label class="form-label text-pink small fw-bold mb-2">다음 차수 공주 추천 후보작 중 택 1</label>
                    <div id="candidateRadioContainer" class="d-flex flex-column gap-2">
                        </div>
                </div>

                <div id="spontaneousFormWrapper" class="d-none rounded p-3 border border-secondary" style="background:#0a0a0a; border-color: rgba(255,215,0,0.2) !important;">
                    <label class="form-label text-warning small fw-bold mb-2"><i class="fa-solid fa-wand-magic-sparkles"></i> 즉석 추가 도서 상세 스펙 입력</label>
                    <div class="row g-2">
                        <div class="col-12">
                            <input type="text" class="form-control form-control-custom" id="sponTitle" placeholder="책 제목 입력">
                        </div>
                        <div class="col-7">
                            <input type="text" class="form-control form-control-custom" id="sponAuthor" placeholder="작가명">
                        </div>
                        <div class="col-5">
                            <input type="number" class="form-control form-control-custom" id="sponPage" placeholder="쪽수" min="1">
                        </div>
                        <div class="col-6">
                            <input type="text" class="form-control form-control-custom" id="sponMainCat" value="인문/사회" placeholder="대분류 장르">
                        </div>
                        <div class="col-6">
                            <input type="text" class="form-control form-control-custom" id="sponCustomCat" value="공감/치유" placeholder="맞춤 분류">
                        </div>
                        <div class="col-12">
                            <input type="text" class="form-control form-control-custom" id="sponBy" value="즉석지정" placeholder="추천공주명">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mb-4 px-1">
            <button class="btn w-100 p-3 fw-bold fs-6 text-white" id="btnSealSession" onclick="executeFinalSessionClosingTransaction()"
                    style="background: linear-gradient(135deg, #FF007F, #FF69B4); border: 2px solid #fff; border-radius: 16px; box-shadow: 0 0 15px rgba(255,0,127,0.4); text-shadow: 0 1px 3px #000;">
                <i class="fa-solid fa-flag-checkered me-1"></i> 이번 회차 독서토론 공식 마감 및 다음 차수 진급 세우기
            </button>
        </div>

        <div class="stat-card">
            <div class="card-header-custom">
                <i class="fa-solid fa-calendar-days"></i> 예정된 티타임 일정 단독 변경
            </div>
            <div class="card-body-custom scrollable-panel">
                <div id="discussionBookList">
                    <div class="text-center py-3"><div class="spinner-border spinner-pink" role="status"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div id="global-nav" data-active="manage"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>
    
    <script>
        checkAuth();

        let currentActiveRound = 0; 
        let nextTargetRound = 0;
        let activeMembersList = []; // 실시간 평점 수집용 공주 정예 명단

        document.addEventListener("DOMContentLoaded", async () => {
            // 1. 최고 차수 정보 벼락 수색 기동
            await anchorRoundsEngine();
            // 2. 종속 뷰포트 데이터 병렬 로드
            await Promise.all([
                loadActiveMembersRatingForm(),
                loadTargetRecommendations(),
                loadDiscussionBooks()
            ]);
        });

        // 차수 스캔 및 환경 변수 고정 엔진
        async function anchorRoundsEngine() {
            try {
                const { data, error } = await _db
                    .from('books')
                    .select('round_no, title')
                    .order('round_no', { ascending: false })
                    .limit(1);

                if (error) throw error;

                currentActiveRound = data && data.length > 0 ? data[0].round_no : 0;
                const currentTitle = data && data.length > 0 ? data[0].title : '지정도서 없음';
                nextTargetRound = currentActiveRound + 1;

                document.getElementById("roundStatusBadge").innerHTML = 
                    `<i class="fa-solid fa-gavel"></i> 라이브 진행 : 제 ${currentActiveRound}회차`;
                
                document.getElementById("currentRoundTitleLabel").textContent = `제 ${currentActiveRound}회차 [${currentTitle}]`;
                
                document.getElementById("nextRoundDateLabel").innerHTML = 
                    `<i class="fa-solid fa-calendar-days text-pink"></i> 다음 [ 제 ${nextTargetRound}회차 ] 토론 개최 일자 선택`;

            } catch (err) { console.error("차수 인프라 앵커링 실패:", err); }
        }

        // 👑 이번 차수 멤버별 토론 후 최종 평점 입력 폼 렌더링
        async function loadActiveMembersRatingForm() {
            const container = document.getElementById("memberFinalRatingsContainer");
            try {
                const { data: members, error: memErr } = await _db
                    .from('members')
                    .select('member_name, image_name')
                    .eq('is_active', true)
                    .order('member_name', { ascending: true });

                if (memErr) throw memErr;
                activeMembersList = members || [];

                container.innerHTML = "";
                activeMembersList.forEach(m => {
                    container.innerHTML += `
                        <div class="p-2 rounded bg-black d-flex justify-content-between align-items-center border border-secondary" style="border-color: rgba(255,105,180,0.15) !important;">
                            <div class="fw-bold text-white small">
                                <img src="images/${m.image_name}" class="princess-avatar-sm" onerror="this.src='images/default_princess.png'">
                                ${m.member_name} 공주
                            </div>
                            <div style="width: 45%;">
                                <select class="form-select form-select-custom py-1 px-2" id="rating_after_${m.member_name}" style="font-size:0.8rem;">
                                    <option value="5.0">★★★★★ (5.0)</option>
                                    <option value="4.5">★★★★☆ (4.5)</option>
                                    <option value="4.0" selected>★★★★ (4.0)</option>
                                    <option value="3.5">★★★☆ (3.5)</option>
                                    <option value="3.0">★★★ (3.0)</option>
                                    <option value="2.5">★★☆ (2.5)</option>
                                    <option value="2.0">★★ (2.0)</option>
                                    <option value="1.0">★ (1.0)</option>
                                </select>
                            </div>
                        </div>
                    `;
                });
            } catch (err) { console.error(err); }
        }

        // 다음 차수 전용 추천 후보작 리스트 로드 (라디오 선택지 트랜스폼)
        async function loadTargetRecommendations() {
            const container = document.getElementById("candidateRadioContainer");
            if (!nextTargetRound) return;
            
            try {
                const { data, error } = await _db
                    .from('recommendations')
                    .select('*')
                    .eq('target_round', nextTargetRound)
                    .eq('is_selected', false);

                if (error) throw error;
                container.innerHTML = "";

                if (!data || data.length === 0) {
                    container.innerHTML = `<p class="text-center text-muted small py-2 m-0">공주들이 다음 ${nextTargetRound}회차 타겟으로 기입해둔 후보작이 없사옵니다.</p>`;
                    return;
                }

                data.forEach((item, index) => {
                    container.innerHTML += `
                        <label class="p-2 rounded bg-black d-flex align-items-center border border-secondary" style="cursor:pointer; border-color: rgba(255,105,180,0.1) !important;">
                            <input type="radio" name="nextBookCandidateRadio" class="form-check-input me-2" value="${item.id}" data-title="${escapeHtml(item.title)}" data-author="${escapeHtml(item.author)}" data-page="${item.page_count || 0}" data-by="${escapeHtml(item.member_name)}" ${index===0?'checked':''}>
                            <div style="width:90%;">
                                <div class="fw-bold text-white small text-truncate">📖 ${item.title}</div>
                                <div class="text-muted" style="font-size:0.72rem;">픽:${item.member_name} | 작가:${item.author || '미상'} | ${item.page_count || 0}쪽 | "${item.nickname || '평범함'}"</div>
                            </div>
                        </label>
                    `;
                });
            } catch (err) { console.error(err); }
        }

        // 즉석 직접 입력 토글 변환 스위치 기믹
        function toggleSpontaneousForm() {
            const isChecked = document.getElementById("spontaneousToggle").checked;
            const candWrapper = document.getElementById("candidateSelectionWrapper");
            const sponWrapper = document.getElementById("spontaneousFormWrapper");

            if (isChecked) {
                candWrapper.classList.add("d-none");
                sponWrapper.classList.remove("d-none");
            } else {
                candWrapper.classList.remove("d-none");
                sponWrapper.classList.add("d-none");
            }
        }

        // 👑 [Zoro's Supreme Transaction Closing] 독서토론 최종 마감 매듭 짓기 대작전
        async function executeFinalSessionClosingTransaction() {
            // 날짜 검증 타격
            const nextDiscussionDate = document.getElementById("nextRoundDateInput").value;
            if (!nextDiscussionDate) {
                alert(`선장! 다음 [ 제 ${nextTargetRound}회차 ] 독서토론 일정을 먼저 캘린더에서 완벽히 선택하셔야 최종 마감이 가동되옵니다! 📅✨`);
                document.getElementById("nextRoundDateInput").focus();
                return;
            }

            const masterConfirm = confirm(`정말로 이번 제 ${currentActiveRound}회차 토론을 영구 마감하고, 지정하신 내용으로 다음 제 ${nextTargetRound}회차 성벽을 전진시키겠사옵니까?`);
            if (!masterConfirm) return;

            try {
                // 파이프라인 A: 이번 차수 개인별 최종 평점(rating_after) 일제히 Upsert 수집 수립
                const ratingPromises = activeMembersList.map(m => {
                    const finalRatingScore = parseFloat(document.getElementById(`rating_after_${m.member_name}`).value);
                    return _db.from('reviews_ratings').upsert({
                        round_no: currentActiveRound,
                        member_name: m.member_name,
                        rating_after: finalRatingScore
                    }, { onConflict: 'round_no, member_name' });
                });

                // 파이프라인 B: 다음 회차 도서 스펙 발라내기 기믹
                const isSpontaneous = document.getElementById("spontaneousToggle").checked;
                let nextBookPayload = {
                    round_no: nextTargetRound,
                    discussion_date: nextDiscussionDate
                };
                let selectedRecId = null;

                if (isSpontaneous) {
                    // 수동 양식 긁기
                    const title = document.getElementById("sponTitle").value.trim();
                    const author = document.getElementById("sponAuthor").value.trim();
                    const page_count = parseInt(document.getElementById("sponPage").value);
                    if (!title || !author || !page_count) {
                        alert("즉석 추가 도서의 제목, 작가, 쪽수를 단 한 칸도 빠짐없이 기입하셔야 하옵니다!");
                        return;
                    }
                    nextBookPayload.title = title;
                    nextBookPayload.author = author;
                    nextBookPayload.page_count = page_count;
                    nextBookPayload.recommended_by = document.getElementById("sponBy").value.trim() || '즉석지정';
                    nextBookPayload.main_category = document.getElementById("sponMainCat").value.trim() || '인문/사회';
                    nextBookPayload.custom_category = document.getElementById("sponCustomCat").value.trim() || '공감/치유';
                } else {
                    // 라디오 선택박스 스펙 낚아채기
                    const checkedRadio = document.querySelector('input[name="nextBookCandidateRadio"]:checked');
                    if (!checkedRadio) {
                        alert("다음 차수 후보방에 책이 없사오니 즉석 직접 입력 토글을 켜고 등록해 주셔요!");
                        return;
                    }
                    selectedRecId = parseInt(checkedRadio.value);
                    nextBookPayload.title = checkedRadio.getAttribute('data-title');
                    nextBookPayload.author = checkedRadio.getAttribute('data-author');
                    nextBookPayload.page_count = parseInt(checkedRadio.getAttribute('data-page'));
                    nextBookPayload.recommended_by = checkedRadio.getAttribute('data-by');
                    nextBookPayload.main_category = '인문/사회';
                    nextBookPayload.custom_category = '공감/치유';
                }

                // 파이프라인 C: 다음 회차 새 도서 Row 공식 인서트(INSERT) 약속 수립
                const bookInsertPromise = _db.from('books').insert([nextBookPayload]);

                // 대의적인 일괄 연쇄 동시 폭파 집행!
                const results = await Promise.all([...ratingPromises, bookInsertPromise]);
                
                // 에러 레이스 체 스캔
                for(let r of results) { if(r.error) throw r.error; }

                // 파이프라인 D: 후보작 풀방에서 올라왔다면 이력 플래그 true 마킹 마무리
                if (selectedRecId) {
                    await _db.from('recommendations').update({ is_selected: true }).eq('id', selectedRecId);
                }

                alert(`🎉 대성황 마감! 제 ${currentActiveRound}회차 토론이 성대하게 마무리되었으며, 다음 제 ${nextTargetRound}회차 공식 요새(INSERT)가 정상 오픈되었습니다! 📅✨`);
                
                // 마스터 제어판 리프레시 엔진 리로드
                document.getElementById("nextRoundDateInput").value = "";
                document.getElementById("spontaneousToggle").checked = false;
                toggleSpontaneousForm();
                if(document.getElementById("sponRound")) document.getElementById("spontaneousForm").reset();

                await anchorRoundsEngine();
                await Promise.all([
                    loadActiveMembersRatingForm(),
                    loadTargetRecommendations(),
                    loadDiscussionBooks()
                ]);

            } catch (err) {
                console.error("최종 세션 마감 대재앙 에러:", err);
                alert("공식 마감 트랜잭션 도중 치명적 에러가 터졌다, 선장.");
            }
        }

        // 하단 미래 티타임 일정 단독 변경 리스트
        async function loadDiscussionBooks() {
            const container = document.getElementById("discussionBookList");
            try {
                const { data, error } = await _db
                    .from('books')
                    .select('id, round_no, title, discussion_date')
                    .gte('round_no', currentActiveRound)
                    .order('round_no', { ascending: false });

                if (error) throw error;
                container.innerHTML = "";

                if (!data || data.length === 0) {
                    container.innerHTML = `<p class="text-center text-muted small py-3">조율 대상 티타임이 없사옵니다.</p>`;
                    return;
                }

                data.forEach(book => {
                    const dateVal = book.discussion_date || "";
                    container.innerHTML += `
                        <div class="p-3 mb-2 rounded bg-dark border border-secondary" style="border-color: rgba(255,0,127,0.15) !important;">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="badge bg-danger" style="background-color: var(--neon-pink) !important;">제 ${book.round_no}회차</span>
                                <span class="text-white small fw-bold text-truncate" style="max-width:65%;">${book.title}</span>
                            </div>
                            <div class="d-flex gap-2 align-items-center">
                                <input type="date" class="form-control form-control-custom py-1 px-2 text-center text-white" id="dateInput_${book.id}" value="${dateVal}" style="font-size:0.85rem; background:#000 !important;">
                                <button class="btn btn-sm btn-princess px-2 py-1 flex-shrink-0" onclick="updateDiscussionDate(${book.id})">
                                    <i class="fa-solid fa-calendar-check"></i> 일정 변경
                                </button>
                            </div>
                        </div>
                    `;
                });
            } catch (err) { console.error(err); }
        }

        async function updateDiscussionDate(bookId) {
            const newDate = document.getElementById(`dateInput_${bookId}`).value;
            if (!newDate) {
                alert("변경 조율할 날짜를 올바르게 사수하셔요!");
                return;
            }

            try {
                const { error } = await _db
                    .from('books')
                    .update({ discussion_date: newDate })
                    .eq('id', bookId);

                if (error) throw error;
                alert("독서 토론 일정이 무사히 리스케줄링 되었습니다! 📅✨");
                loadDiscussionBooks();
            } catch (err) {
                console.error(err);
                alert("날짜 단독 변경 실패.");
            }
        }

        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>독한녀들 Book Club - Manage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">

    <style>
        /* 👑 [Zoro's Multi-Member Star Swipe Architecture] */
        .star-rating-wrapper {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.02);
            padding: 4px 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .star-input-container {
            position: relative;
            width: 115px;
            height: 24px;
            user-select: none;
        }
        .star-input-stars-outer {
            color: #242424;
            font-size: 1.25rem;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            letter-spacing: 2px;
            line-height: 1;
        }
        .star-input-stars-inner {
            color: var(--royal-gold, #FFD700);
            font-size: 1.25rem;
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            white-space: nowrap;
            overflow: hidden;
            width: 80%;
            pointer-events: none;
            letter-spacing: 2px;
            line-height: 1;
            transition: width 0.05s linear;
        }
        .star-range-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            margin: 0;
            padding: 0;
            -webkit-appearance: none;
        }
    </style>
</head>
<body>

    <div class="container-fluid">
        <div class="dashboard-header">
            <div class="d-flex justify-content-between align-items-center">
                <h1><i class="fa-solid fa-screwdriver-wrenches text-pink" style="color: var(--neon-pink);"></i> 시크릿 운영 <span>MANAGE</span></h1>
                <span class="badge bg-dark border border-warning text-warning p-2" id="roundStatusBadge"><i class="fa-solid fa-gavel"></i> 차수 로딩 중...</span>
            </div>
            <p class="text-muted mt-2 m-0">티타임 공식 마감, 최종 평점 수거 및 다음 회차 개막을 대행하옵니다 👑</p>
        </div>

        <div class="stat-card mb-4" style="border-color: var(--neon-pink) !important;">
            <div class="card-header-custom" style="color: var(--neon-pink) !important; font-weight:900;">
                <i class="fa-solid fa-mug-tea" style="color: var(--neon-pink) !important;"></i> ☕ <span id="currentRoundTitleLabel">현재 차수</span> 토론 마감 및 최종 별점 수거
            </div>
            <div class="card-body-custom p-3">
                <p class="text-muted small mb-3">※ 토론을 마무리하며 공주님들이 최종적으로 확정한 평점을 거두어 주셔요.</p>
                <div id="memberFinalRatingsContainer" class="d-flex flex-column gap-2">
                    <div class="text-center py-2"><div class="spinner-border spinner-pink spinner-sm" role="status"></div></div>
                </div>

                <div class="mt-4 pt-3 border-top border-secondary">
                    <label class="form-label text-warning small fw-bold mb-1.5">
                        <i class="fa-solid fa-square-poll-horizontal"></i> AI 토론 내용 요약본 (회의록 텍스트 붙여넣기)
                    </label>
                    <textarea class="form-control form-control-custom" id="historySummaryText" rows="5" placeholder="AI가 장시간 수다를 요약한 대장정 회의록본을 남김없이 여기에 붙여넣으셔요." required></textarea>
                </div>
                <div class="mt-3">
                    <label class="form-label text-warning small fw-bold mb-1.5">
                        <i class="fa-solid fa-images"></i> 티타임 현장 사진 업로드 (다중 선택 가능)
                    </label>
                    <input type="file" class="form-control form-control-custom" id="historyPhotosInput" multiple accept="image/*" style="background:#000 !important;">
                    <p class="text-muted m-0 mt-1" style="font-size:0.7rem; line-height: 1.3;">
                        ※ 조로의 모바일 초경량 Canvas 압축 엔진이 실시간 가동되어 선장의 Supabase Storage 무료 한도(1GB)를 평생 사수하옵니다.
                    </p>
                </div>
            </div>
        </div>

        <div class="stat-card mb-4">
            <div class="card-header-custom">
                <i class="fa-solid fa-calendar-circle-plus"></i> 📅 다음 차수 도서 및 토론 일정 수립
            </div>
            <div class="card-body-custom p-3">
                <div class="mb-2">
                    <label class="form-label text-pink small fw-bold" id="nextRoundDateLabel">다음 차수 토론 날짜 선택</label>
                    <input type="date" class="form-control form-control-custom text-center text-white" id="nextRoundDateInput" style="background:#000 !important;" required>
                </div>

                <div class="mb-3">
                    <label class="form-label text-pink small fw-bold"><i class="fa-solid fa-location-dot me-1"></i> 다음 티타임 개최 장소 입력</label>
                    <input type="text" class="form-control form-control-custom" id="nextRoundLocationInput" placeholder="예: 강남 핑크 테라스 (미정 시 공백 가능)">
                </div>

                <div id="candidateSelectionWrapper">
                    <label class="form-label text-pink small fw-bold mb-2">다음 차수 공주 추천 후보작 목록 (복수 선택 가능)</label>
                    <div id="candidateCheckboxContainer" class="d-flex flex-column gap-2">
                    </div>
                </div>

                <div class="text-center mt-3">
                    <span class="small fw-bold text-warning" style="cursor: pointer; text-decoration: underline;" onclick="toggleSpontaneousFormDropdown()">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> 후보작 목록 외 [즉석 도서 직접 기입] 하기 (터치하여 확장)
                    </span>
                </div>

                <div id="spontaneousFormWrapper" class="d-none mt-3 rounded p-3 border border-secondary" style="background:#0a0a0a; border-color: rgba(255,215,0,0.2) !important;">
                    <div class="row g-2">
                        <div class="col-12">
                            <label class="form-label text-warning small fw-bold m-0 mb-1">즉석 추가 도서명</label>
                            <input type="text" class="form-control form-control-custom" id="sponTitle" placeholder="책 제목 입력">
                        </div>
                        <div class="col-7">
                            <label class="form-label text-warning small fw-bold m-0 mb-1">작가명</label>
                            <input type="text" class="form-control form-control-custom" id="sponAuthor" placeholder="작가명">
                        </div>
                        <div class="col-5">
                            <label class="form-label text-warning small fw-bold m-0 mb-1">쪽수</label>
                            <input type="number" class="form-control form-control-custom" id="sponPage" placeholder="쪽수" min="1">
                        </div>
                        <div class="col-6">
                            <label class="form-label text-warning small fw-bold m-0 mb-1">대분류</label>
                            <input type="text" class="form-control form-control-custom" id="sponMainCat" value="인문/사회">
                        </div>
                        <div class="col-6">
                            <label class="form-label text-warning small fw-bold m-0 mb-1">맞춤분류</label>
                            <input type="text" class="form-control form-control-custom" id="sponCustomCat" value="공감/치유">
                        </div>
                        <div class="col-12">
                            <label class="form-label text-warning small fw-bold m-0 mb-1">추천 공주명 선택</label>
                            <select class="form-select form-select-custom text-white" id="sponBySelect" style="background:#000 !important;">
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mb-4 px-1">
            <button class="btn btn-princess w-100 p-3 fw-bold fs-6" id="btnSealSession" onclick="executeFinalSessionClosingTransaction()">
                <i class="fa-solid fa-flag-checkered me-1"></i> 이번 티타임 공식 마감 및 다음 차수 오픈
            </button>
        </div>

        <div class="stat-card">
            <div class="card-header-custom">
                <i class="fa-solid fa-calendar-days"></i> 진행중인 티타임 일정 및 장소 변경
            </div>
            <div class="card-body-custom scrollable-panel">
                <div id="discussionBookList">
                    <div class="text-center py-3"><div class="spinner-border spinner-pink" role="status"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div id="global-nav" data-active="manage"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>
    
    <script>
        checkAuth();

        let currentActiveRound = 0; 
        let nextTargetRound = 0;
        let activeMembersList = []; 

        document.addEventListener("DOMContentLoaded", async () => {
            await anchorRoundsEngine();
            await Promise.all([
                loadActiveMembersRatingForm(),
                loadTargetRecommendations(),
                loadDiscussionBooks()
            ]);
        });

        async function anchorRoundsEngine() {
            try {
                const { data, error } = await _db
                    .from('books')
                    .select('round_no, title')
                    .eq('is_closed', false) 
                    .order('round_no', { ascending: false })
                    .limit(1);

                if (error) throw error;

                if (data && data.length > 0) {
                    currentActiveRound = data[0].round_no;
                    const currentTitle = data[0].title;
                    nextTargetRound = currentActiveRound + 1;
                    document.getElementById("currentRoundTitleLabel").textContent = `제 ${currentActiveRound}회차 [${currentTitle}]`;
                } else {
                    const { data: maxB } = await _db.from('books').select('round_no, title').order('round_no', { ascending: false }).limit(1);
                    currentActiveRound = maxB && maxB.length > 0 ? maxB[0].round_no : 0;
                    nextTargetRound = currentActiveRound + 1;
                    document.getElementById("currentRoundTitleLabel").textContent = `제 ${currentActiveRound}회차 지정 도서`;
                }

                document.getElementById("roundStatusBadge").innerHTML = `<i class="fa-solid fa-gavel"></i> 라이브 차수 : 제 ${currentActiveRound}회`;
                document.getElementById("nextRoundDateLabel").innerHTML = `<i class="fa-solid fa-calendar-days text-pink"></i> 다음 [ 제 ${nextTargetRound}회차 ] 토론 개최 일자 선택`;

            } catch (err) { console.error("차수 인프라 앵커링 실패:", err); }
        }

        async function loadActiveMembersRatingForm() {
            const container = document.getElementById("memberFinalRatingsContainer");
            const sponBySelect = document.getElementById("sponBySelect"); 
            try {
                const { data: members, error: memErr } = await _db
                    .from('members')
                    .select('id, member_name, image_name') 
                    .eq('is_active', true)
                    .order('member_name', { ascending: true });

                if (memErr) throw memErr;
                activeMembersList = members || [];

                container.innerHTML = "";
                if (sponBySelect) sponBySelect.innerHTML = ""; 

                activeMembersList.forEach(m => {
                    const safeName = m.member_name;
                    container.innerHTML += `
                        <div class="p-2 rounded bg-black d-flex justify-content-between align-items-center border border-secondary" style="border-color: rgba(255,105,180,0.15) !important;">
                            <div class="fw-bold text-white small">
                                <img src="images/${m.image_name}" class="princess-avatar-sm" onerror="this.src='images/default_princess.png'">
                                ${safeName} 공주
                            </div>
                            <div class="star-rating-wrapper">
                                <div class="star-input-container">
                                    <div class="star-input-stars-outer">★★★★★</div>
                                    <div class="star-input-stars-inner" id="innerStar_${safeName}">★★★★★</div>
                                    <input type="range" class="star-range-input" id="rating_after_${safeName}" min="0" max="5" step="0.1" value="4.0" 
                                           oninput="document.getElementById('innerStar_${safeName}').style.width = (this.value / 5 * 100) + '%'; document.getElementById('textStar_${safeName}').textContent = parseFloat(this.value).toFixed(1);">
                                </div>
                                <span class="rating-value text-warning fw-bold small" id="textStar_${safeName}" style="min-width: 22px; display: inline-block; text-align: right;">4.0</span>
                            </div>
                        </div>
                    `;

                    if (sponBySelect) {
                        const opt = document.createElement("option");
                        opt.value = m.id;
                        opt.textContent = `👸 ${m.member_name} 공주`;
                        sponBySelect.appendChild(opt);
                    }
                });
            } catch (err) { console.error(err); }
        }

        async function loadTargetRecommendations() {
            const container = document.getElementById("candidateCheckboxContainer");
            if (!nextTargetRound) return;
            
            try {
                const { data, error } = await _db
                    .from('recommendations')
                    .select('*, members(member_name)') 
                    .eq('target_round', nextTargetRound)
                    .eq('is_selected', false);

                if (error) throw error;
                container.innerHTML = "";

                if (!data || data.length === 0) {
                    container.innerHTML = `<p class="text-center text-muted small py-2 m-0">공주들이 대기방에 제출해둔 후보작이 없사옵니다.</p>`;
                    return;
                }

                data.forEach((item) => {
                    const recommenderName = item.members ? item.members.member_name : '즉석지정';
                    container.innerHTML += `
                        <label class="p-2 rounded bg-black d-flex align-items-center border border-secondary" style="cursor:pointer; border-color: rgba(255,105,180,0.1) !important;">
                            <input type="checkbox" name="nextBookCandidateCheckbox" class="form-check-input me-2" value="${item.id}" data-title="${escapeHtml(item.title)}" data-author="${escapeHtml(item.author)}" data-page="${item.page_count || 0}" data-by-id="${item.member_id}">
                            <div style="width:90%;">
                                <div class="fw-bold text-white small text-truncate">📖 ${item.title}</div>
                                <div class="text-muted" style="font-size:0.72rem;">픽:${recommenderName} | 작가:${item.author || '미상'} | ${item.page_count || 0}쪽</div>
                            </div>
                        </label>
                    `;
                });
            } catch (err) { console.error(err); }
        }

        function toggleSpontaneousFormDropdown() {
            const wrapper = document.getElementById("spontaneousFormWrapper");
            if (wrapper.classList.contains("d-none")) {
                wrapper.classList.remove("d-none");
            } else {
                wrapper.classList.add("d-none");
            }
        }

        // 👑 [Zoro's Masterpiece Async Sequencer Engine]: 비동기 역전 레이스 트랩을 완벽히 분쇄해낸 무결점 세션 마감 압축 함수
        async function compressAndUploadPhoto(file, roundNo, index) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                
                // 1. 이벤트 리스너 감지기를 1순위로 선제 장전하여 비동기 트랩 전면 봉쇄!
                reader.onload = (event) => {
                    const img = new Image();
                    
                    // 2. 이미지 객체 로딩 완료 이벤트 또한 src 할당보다 반드시 앞자리에 위치 사수!
                    img.onload = async () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1200; 
                        
                        // 3. 0x0 유령 캔버스 생성 원천 차단 가드 보루 탑재
                        let width = img.width || 300;
                        let height = img.height || 300;

                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                        canvas.width = width;
                        canvas.height = height;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        canvas.toBlob(async (blob) => {
                            if (!blob) {
                                reject("이미지 변환에 실패했사옵니다.");
                                return;
                            }
                            
                            const uniqueFileName = `${roundNo}/${Date.now()}_${index}.jpg`;
                            try {
                                const { data, error } = await _db.storage
                                    .from('discussion-photos')
                                    .upload(uniqueFileName, blob, { contentType: 'image/jpeg' });

                                if (error) throw error;

                                const { data: urlData } = _db.storage
                                    .from('discussion-photos')
                                    .getPublicUrl(uniqueFileName);

                                resolve(urlData.publicUrl);
                            } catch (err) {
                                reject(err);
                            }
                        }, 'image/jpeg', 0.75);
                    };
                    
                    img.onerror = () => reject("이미지 가공 로드 대실패");
                    img.src = event.target.result; // 👑 리스너 선포 완료 아랫줄에 안착시켜 로딩 가동!
                };
                
                reader.onerror = error => reject("로컬 파일 스캔 장해 발생");
                reader.readAsDataURL(file); // 👑 리스너 선포 완료 아랫줄에 안착시켜 파일 리딩 가동!
            });
        }

        async function executeFinalSessionClosingTransaction() {
            const nextRoundDate = document.getElementById("nextRoundDateInput").value;
            const nextRoundLocation = document.getElementById("nextRoundLocationInput").value.trim();
            const summaryText = document.getElementById("historySummaryText").value.trim();
            const photoFiles = document.getElementById("historyPhotosInput").files;

            if (!nextRoundDate) {
                alert(`선장! 다음 [ 제 ${nextTargetRound}회차 ] 토론 일정을 캘린더에서 완벽히 선택하셔야 최종 마감이 가동되옵니다! 📅✨`);
                document.getElementById("nextRoundDateInput").focus();
                return;
            }

            if (!summaryText) {
                alert("선장! 이번 회차의 대서사시를 보존하려면 AI 토론 요약 내용(회의록)을 무조건 기입하셔야 하옵니다! 📜");
                document.getElementById("historySummaryText").focus();
                return;
            }

            const masterConfirm = confirm(`정말로 이번 제 ${currentActiveRound}회차 토론을 영구 마감(is_closed=true)하고 대서사시 히스토리와 함께 다음 차수를 공식 출범시키겠사옵니다?`);
            if (!masterConfirm) return;

            const sealBtn = document.getElementById("btnSealSession");
            const originalBtnHtml = sealBtn.innerHTML;
            sealBtn.disabled = true;
            sealBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin me-1"></i> 이미지 초고속 압축 및 대서사시 적재 중...`;

            try {
                let uploadedPhotoUrls = [];
                if (photoFiles && photoFiles.length > 0) {
                    for (let i = 0; i < photoFiles.length; i++) {
                        const publicUrl = await compressAndUploadPhoto(photoFiles[i], currentActiveRound, i);
                        uploadedPhotoUrls.push(publicUrl);
                    }
                }

                const ratingPromises = activeMembersList.map(m => {
                    const finalScore = parseFloat(document.getElementById(`rating_after_${m.member_name}`).value);
                    return _db.from('reviews_ratings').upsert({
                        round_no: currentActiveRound,
                        member_id: m.id, 
                        rating_after: finalScore
                    }, { onConflict: 'round_no, member_id' }); 
                });

                let nextBooksPayloads = [];
                const checkedBoxes = document.querySelectorAll('input[name="nextBookCandidateCheckbox"]:checked');
                
                checkedBoxes.forEach(cb => {
                    nextBooksPayloads.push({
                        round_no: nextTargetRound,
                        title: cb.getAttribute('data-title'),
                        author: cb.getAttribute('data-author'),
                        page_count: parseInt(cb.getAttribute('data-page')),
                        recommended_by: parseInt(cb.getAttribute('data-by-id')), 
                        main_category: '인문/사회',
                        custom_category: '공감/치유',
                        discussion_date: nextRoundDate,
                        location: nextRoundLocation || null, 
                        is_closed: false
                    });
                });

                const sponTitle = document.getElementById("sponTitle").value.trim();
                if (sponTitle) {
                    const sponAuthor = document.getElementById("sponAuthor").value.trim();
                    const sponPage = parseInt(document.getElementById("sponPage").value);
                    const sponPageValue = isNaN(sponPage) ? null : sponPage;
                    const sponById = parseInt(document.getElementById("sponBySelect").value); 

                    if (!sponAuthor || !sponPageValue || !sponById) {
                        alert("즉석 직접 기입 도서의 작가, 쪽수, 그리고 추천 공주 선택까지 명확히 채워주셔야 하옵니다!");
                        sealBtn.disabled = false;
                        sealBtn.innerHTML = originalBtnHtml;
                        return;
                    }
                    nextBooksPayloads.push({
                        round_no: nextTargetRound,
                        title: sponTitle,
                        author: sponAuthor,
                        page_count: sponPageValue,
                        recommended_by: sponById,
                        main_category: document.getElementById("sponMainCat").value.trim() || '인문/사회',
                        custom_category: document.getElementById("sponCustomCat").value.trim() || '공감/치유',
                        discussion_date: nextRoundDate,
                        location: nextRoundLocation || null,
                        is_closed: false
                    });
                }

                if (nextBooksPayloads.length === 0) {
                    alert("다음 회차 도서를 최소 한 권 이상 체크박스로 선택하시거나 즉석 기입란에 채우셔야 하옵니다!");
                    sealBtn.disabled = false;
                    sealBtn.innerHTML = originalBtnHtml;
                    return;
                }

                const closeCurrentRoundPromise = _db.from('books').update({ is_closed: true }).eq('round_no', currentActiveRound);
                const insertNextBooksPromise = _db.from('books').insert(nextBooksPayloads);

                const insertHistoryPromise = _db.from('discussion_histories').insert([{
                    round_no: currentActiveRound,
                    summary_text: summaryText,
                    photo_urls: uploadedPhotoUrls
                }]);

                const results = await Promise.all([
                    ...ratingPromises, 
                    closeCurrentRoundPromise, 
                    insertNextBooksPromise,
                    insertHistoryPromise
                ]);
                for(let r of results) { if(r.error) throw r.error; }

                const selectedRecIds = Array.from(checkedBoxes).map(cb => parseInt(cb.value));
                if (selectedRecIds.length > 0) {
                    await _db.from('recommendations').update({ is_selected: true }).in('id', selectedRecIds);
                }

                alert(`🎉 대서사시 기록 보관 완료! 제 ${currentActiveRound}회차 토론방 셧다운 및 앨범 저장이 공식 잠금 완료되었으며, 제 ${nextTargetRound}회차 새 무결점 차수가 공식 출범되었습니다! 📅✨`);
                
                document.getElementById("nextRoundDateInput").value = "";
                document.getElementById("nextRoundLocationInput").value = "";
                document.getElementById("historySummaryText").value = "";
                document.getElementById("historyPhotosInput").value = "";
                document.getElementById("spontaneousFormWrapper").classList.add("d-none");
                document.getElementById("sponTitle").value = "";
                document.getElementById("sponAuthor").value = "";
                document.getElementById("sponPage").value = "";

                await anchorRoundsEngine();
                await Promise.all([
                    loadActiveMembersRatingForm(),
                    loadTargetRecommendations(),
                    loadDiscussionBooks()
                ]);

            } catch (err) {
                console.error(err);
                alert("공식 세션 및 미디어 히스토리 적재 도중 에러 발생.");
            } finally {
                sealBtn.disabled = false;
                sealBtn.innerHTML = originalBtnHtml;
            }
        }

        async function loadDiscussionBooks() {
            const container = document.getElementById("discussionBookList");
            try {
                const { data, error } = await _db
                    .from('books')
                    .select('id, round_no, title, discussion_date, location')
                    .eq('is_closed', false) 
                    .order('round_no', { ascending: false });

                if (error) throw error;
                container.innerHTML = "";

                if (!data || data.length === 0) {
                    container.innerHTML = `<p class="text-center text-muted small py-3 m-0">현재 실시간 조율 가능한 미완료 티타임 도서가 없사옵니다.</p>`;
                    return;
                }

                data.forEach(book => {
                    const dateVal = book.discussion_date || "";
                    const locVal = book.location || "";
                    container.innerHTML += `
                        <div class="p-3 mb-2 rounded bg-dark border border-secondary" style="border-color: rgba(255,0,127,0.15) !important;">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="badge bg-danger" style="background-color: var(--neon-pink) !important;">제 ${book.round_no}회차</span>
                                <span class="text-white small fw-bold text-truncate" style="max-width:65%;">${book.title}</span>
                            </div>
                            <div class="d-flex flex-column gap-2">
                                <div class="d-flex gap-2 align-items-center">
                                    <span class="text-pink small fw-bold flex-shrink-0" style="width:30px;">날짜</span>
                                    <input type="date" class="form-control form-control-custom py-1 px-2 text-center text-white" id="dateInput_${book.id}" value="${dateVal}" style="font-size:0.85rem; background:#000 !important;">
                                </div>
                                <div class="d-flex gap-2 align-items-center">
                                    <span class="text-pink small fw-bold flex-shrink-0" style="width:30px;">장소</span>
                                    <input type="text" class="form-control form-control-custom py-1 px-2 text-white" id="locInput_${book.id}" value="${locVal}" placeholder="개최지 장소 입력" style="font-size:0.85rem; background:#000 !important;">
                                </div>
                                <div class="mt-1">
                                    <button class="btn btn-sm btn-princess w-100 py-1" onclick="updateDiscussionSchedule(${book.id})">
                                        <i class="fa-solid fa-calendar-check text-pink"></i> 일정 및 장소 실시간 변경 반영
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (err) { console.error(err); }
        }

        async function updateDiscussionSchedule(bookId) {
            const newDate = document.getElementById(`dateInput_${bookId}`).value;
            const newLoc = document.getElementById(`locInput_${bookId}`).value.trim();

            if (!newDate) {
                alert("조율할 티타임 일정을 똑바로 정해주셔요!");
                return;
            }

            try {
                const { error } = await _db
                    .from('books')
                    .update({ 
                        discussion_date: newDate,
                        location: newLoc || null 
                    })
                    .eq('id', bookId);

                if (error) throw error;
                alert("해당 진행 차수의 개최 일정과 티타임 장소가 우아하게 실시간 리스케줄링 완료되었습니다! 📅📍");
                loadDiscussionBooks();
            } catch (err) {
                console.error(err);
                alert("라이브 일정 수정 갱신 에러.");
            }
        }

        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>

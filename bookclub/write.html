<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>독한녀들 Book Club - Write</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container-fluid">
        <div class="dashboard-header d-flex align-items-center p-3">
            <img id="myWriteAvatar" src="images/default_princess.png" class="princess-avatar-mid" style="width:55px; height:55px; border-width:3px;" onerror="this.src='images/default_princess.png'">
            <div class="ms-2">
                <h1 class="m-0" style="font-size:1.4rem;"><i class="fa-solid fa-pen-fancy text-pink" style="color: var(--neon-pink);"></i> 비밀 <span>WRITE</span></h1>
                <p class="text-muted m-0 id-label" id="welcomePrincess" style="font-size:0.8rem;">공주님 기록실</p>
            </div>
        </div>

        <div class="stat-card mb-4">
            <div class="card-header-custom">
                <i class="fa-solid fa-book-medical"></i> 1. 다음 달(M+1) 도서 추천하기
            </div>
            <div class="card-body-custom">
                <form id="recommendForm" onsubmit="saveRecommendation(event)">
                    <div class="mb-2">
                        <label class="form-label text-pink small fw-bold">타겟 월 선택</label>
                        <select class="form-select form-select-custom" id="targetMonth" onchange="loadExistingRecommendation()" required>
                            </select>
                    </div>
                    
                    <div class="mb-2">
                        <label class="form-label text-pink small fw-bold">추천 도서명</label>
                        <input type="text" class="form-control form-control-custom" id="recTitle" placeholder="정확한 책 제목 입력" required>
                    </div>

                    <div class="mb-2">
                        <label class="form-label text-pink small fw-bold">작가명</label>
                        <input type="text" class="form-control form-control-custom" id="recAuthor" placeholder="작가 이름 입력" required>
                    </div>

                    <div class="mb-2">
                        <label class="form-label text-pink small fw-bold">책 별칭 또는 한줄평 키워드</label>
                        <input type="text" class="form-control form-control-custom" id="recNickname" placeholder="예: 시크릿 인더 가든">
                    </div>

                    <button type="submit" class="btn btn-princess w-100 mt-2" id="recSubmitBtn">
                        <i class="fa-solid fa-heart-circle-plus"></i> 추천 도서 등록하기
                    </button>
                </form>
            </div>
        </div>

        <div class="stat-card">
            <div class="card-header-custom">
                <i class="fa-solid fa-heart me-1"></i> 2. 이번 달(M) 티타임 평가 남기기
            </div>
            <div class="card-body-custom">
                <form id="reviewForm" onsubmit="saveReviewRating(event)">
                    <div class="mb-2">
                        <label class="form-label text-pink small fw-bold">토론 참여 회차</label>
                        <select class="form-select form-select-custom" id="roundNoSelect" required>
                            </select>
                    </div>
                    <div class="mb-2">
                        <label class="form-label text-pink small fw-bold">마음의 별점 점수</label>
                        <select class="form-select form-select-custom" id="ratingSelect" required>
                            <option value="5.0">★★★★★ (5.0점 최고여요)</option>
                            <option value="4.5">★★★★☆ (4.5점 아주 좋아용)</option>
                            <option value="4.0">★★★★ (4.0점 볼만해요)</option>
                            <option value="3.5">★★★☆ (3.5점 낫배드)</option>
                            <option value="3.0">★★★ (3.0점 평범해요)</option>
                            <option value="2.5">★★☆ (2.5점 아쉬워요)</option>
                            <option value="2.0">★★ (2.0점 별로여요)</option>
                            <option value="1.0">★ (1.0점 시간낭비)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-pink small fw-bold">솔직 담백 총평 스토리</label>
                        <textarea class="form-control form-control-custom" id="reviewText" rows="3" placeholder="공주님들의 뇌리에 남은 감상을 적어주셔요." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-princess w-100"><i class="fa-solid fa-cloud-arrow-up"></i> 리뷰 & 별점 굽기 완료</button>
                </form>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="feed.html" class="bottom-nav-item">
            <i class="fa-solid fa-rss"></i>
            <span>소통 피드</span>
        </a>
        <a href="write.html" class="bottom-nav-item active">
            <i class="fa-solid fa-pen-to-square"></i>
            <span>비밀 기록</span>
        </a>
        <a href="dashboard.html" class="bottom-nav-item">
            <i class="fa-solid fa-crown"></i>
            <span>핑크 라운지</span>
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>
    
    <script>
        checkAuth();
        
        // 기존 추천 기록의 고유 ID를 보관할 상태 자물쇠 변수 (수정시 필요)
        let currentRecId = null;

        document.addEventListener("DOMContentLoaded", async () => {
            const princess = getLoggedInMember();
            document.getElementById("welcomePrincess").innerHTML = `👸 <b>${princess} 공주님</b>의 아지트 레코드 존-★`;
            document.getElementById("myWriteAvatar").src = `images/${localStorage.getItem("login_member_image") || 'default_princess.png'}`;
            
            // 1. 달력 세팅 먼저 수행
            setupTargetMonths();
            // 2. 과거 차수 바인딩
            await loadRounds();
            // 3. 현재 선택된 달에 기존 입력 내역이 이미 박혀있는지 스캔 시작!
            loadExistingRecommendation();
        });

        // M+1 타겟 월 드롭다운 바인딩
        function setupTargetMonths() {
            const select = document.getElementById("targetMonth");
            const now = new Date();
            select.innerHTML = ""; // 초기화
            for(let i=1; i<=3; i++) {
                let future = new Date(now.getFullYear(), now.getMonth() + i, 1);
                let y = future.getFullYear();
                let m = String(future.getMonth() + 1).padStart(2, '0');
                let optStr = `${y}-${m}`;
                select.innerHTML += `<option value="${optStr}">${y}년 ${m}월 모임용</option>`;
            }
        }

        // 👑 [Zoro's Smart Auto-Loader] 이미 등록한 추천작이 있으면 불러오는 핵심 모듈!
        async function loadExistingRecommendation() {
            const member_name = getLoggedInMember();
            const target_month = document.getElementById("targetMonth").value;
            
            try {
                const { data, error } = await _db
                    .from('recommendations')
                    .select('id, title, author, nickname')
                    .eq('member_name', member_name)
                    .eq('target_month', target_month)
                    .order('created_at', { ascending: false })
                    .limit(1);

                if (error) throw error;

                const submitBtn = document.getElementById("recSubmitBtn");

                if (data && data.length > 0) {
                    // 데이터가 있으면 자물쇠에 ID 걸고 폼에 무조건 기본값 주입!
                    const rec = data[0];
                    currentRecId = rec.id;
                    document.getElementById("recTitle").value = rec.title || "";
                    document.getElementById("recAuthor").value = rec.author || "";
                    document.getElementById("recNickname").value = rec.nickname || "";
                    
                    // UI도 세련되게 수정하기 모드로 자동 트랜스폼!
                    submitBtn.innerHTML = `<i class="fa-solid fa-pen-fancy"></i> 추천 도서 우아하게 수정하기`;
                    submitBtn.style.background = "linear-gradient(135deg, #FF007F, #FF69B4)";
                } else {
                    // 기입한 데이터가 없으면 깔끔하게 빈칸 처리해서 새 입력 유도!
                    currentRecId = null;
                    document.getElementById("recTitle").value = "";
                    document.getElementById("recAuthor").value = "";
                    document.getElementById("recNickname").value = "";
                    
                    submitBtn.innerHTML = `<i class="fa-solid fa-heart-circle-plus"></i> 추천 도서 등록하기`;
                    submitBtn.style.background = ""; // style.css 기본 스타일 상속
                }
            } catch (err) {
                console.error("기존 추천 내역 로드 에러:", err);
            }
        }

        // 차수 정보 동적 바인딩
        async function loadRounds() {
            try {
                const { data, error } = await _db.from('books').select('round_no, title').order('round_no', { ascending: false });
                if (error) throw error;
                const select = document.getElementById("roundNoSelect");
                select.innerHTML = "";
                data.forEach(b => {
                    select.innerHTML += `<option value="${b.round_no}">${b.round_no}회차 [${b.title}]</option>`;
                });
            } catch(e) { console.error(e); }
        }

        // 추천 도서 스마트 저장 분기 로직 (Insert 및 Update 완벽 대응)
        async function saveRecommendation(e) {
            e.preventDefault();
            const member_name = getLoggedInMember();
            const target_month = document.getElementById("targetMonth").value;
            const title = document.getElementById("recTitle").value.trim();
            const author = document.getElementById("recAuthor").value.trim();
            const nickname = document.getElementById("recNickname").value.trim();

            try {
                if (currentRecId) {
                    // A안: 기존 데이터가 로드된 상태면 조용히 덮어쓰기(Update)를 단행한다!
                    const { error } = await _db
                        .from('recommendations')
                        .update({ title, author, nickname })
                        .eq('id', currentRecId);
                        
                    if (error) throw error;
                    alert("추천 도서 정보가 완벽하게 수정되었사옵니다! ✨");
                } else {
                    // B안: 기존 이력이 없으면 새롭게 행을 박아넣는다(Insert)!
                    const { error } = await _db
                        .from('recommendations')
                        .insert([{ target_month, member_name, title, author, nickname }]);
                        
                    if (error) throw error;
                    alert("추천 도서가 기록장에 새로 등록되었사옵니다! 💖");
                }
                
                // 작업 완료 후 실시간 리로드로 상태 완벽 유지
                await loadExistingRecommendation();
            } catch(err) { 
                console.error(err);
                alert("기록 데이터 세팅에 오류가 터졌다, 선장."); 
            }
        }

        // 총평 및 별점 저장 로직 (업서트)
        async function saveReviewRating(e) {
            e.preventDefault();
            const member_name = getLoggedInMember();
            const round_no = parseInt(document.getElementById("roundNoSelect").value);
            const rating = parseFloat(document.getElementById("ratingSelect").value);
            const review_text = document.getElementById("reviewText").value.trim();

            try {
                const { error } = await _db.from('reviews_ratings').upsert({ round_no, member_name, rating, review_text }, { onConflict: 'round_no, member_name' });
                if (error) throw error;
                alert("별점과 한줄평 리뷰 굽기가 성공했사옵니다! ☕");
                document.getElementById("reviewForm").reset();
                loadRounds();
            } catch(err) { 
                console.error(err);
                alert("리뷰 적재에 실패했다."); 
            }
        }
    </script>
</body>
</html>

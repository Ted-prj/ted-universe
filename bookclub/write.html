<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>독한녀들 Book Club - Write</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">

    <style>
        /* 👑 [Zoro's Custom Star Swipe Input Infrastructure] */
        .star-rating-wrapper {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 105, 180, 0.15);
        }
        .star-input-container {
            position: relative;
            width: 140px;
            height: 30px;
            user-select: none;
        }
        .star-input-stars-outer {
            color: #2b2b2b;
            font-size: 1.5rem;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            letter-spacing: 3px;
            line-height: 1;
        }
        .star-input-stars-inner {
            color: var(--royal-gold, #FFD700);
            font-size: 1.5rem;
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            white-space: nowrap;
            overflow: hidden;
            width: 80%; /* 기본값 4.0 대응 */
            pointer-events: none;
            letter-spacing: 3px;
            line-height: 1;
            transition: width 0.05s linear;
        }
        .star-range-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            margin: 0;
            padding: 0;
            -webkit-appearance: none;
        }
    </style>
</head>
<body>

    <div class="container-fluid">
        <div class="dashboard-header d-flex align-items-center p-3">
            <img id="myWriteAvatar" src="images/default_princess.png" class="princess-avatar-mid" style="width:55px; height:55px; border-width:3px;" onerror="this.src='images/default_princess.png'">
            <div class="ms-2">
                <h1 class="m-0" style="font-size:1.4rem;"><i class="fa-solid fa-pen-fancy text-pink" style="color: var(--neon-pink);"></i> 비밀 <span>WRITE</span></h1>
                <p class="text-muted m-0 id-label" id="welcomePrincess" style="font-size:0.8rem;">공주님 기록실</p>
            </div>
        </div>

        <div class="stat-card mb-4">
            <div class="card-header-custom">
                <i class="fa-solid fa-book-medical"></i> 1. 다음 티타임 후보 도서 추천하기
            </div>
            <div class="card-body-custom">
                <form id="recommendForm" onsubmit="saveRecommendation(event)">
                    <div class="mb-2">
                        <label class="form-label text-pink small fw-bold">대상 티타임 차수 선택</label>
                        <select class="form-select form-select-custom" id="targetRoundSelect" onchange="loadExistingRecommendation()" required>
                        </select>
                    </div>
                    
                    <div id="reRecommendWrapper" class="mb-3 d-none">
                        <button type="button" class="btn w-100 p-2 text-start small fw-bold text-warning animate-pulse" 
                                id="reRecommendBtn" onclick="injectLastUnselectedBook()"
                                style="background: rgba(255, 215, 0, 0.06); border: 1px dashed var(--royal-gold); border-radius: 10px;">
                        </button>
                    </div>
                    
                    <div class="mb-2">
                        <label class="form-label text-pink small fw-bold">추천 도서명</label>
                        <input type="text" class="form-control form-control-custom" id="recTitle" placeholder="정확한 책 제목 입력" required>
                    </div>

                    <div class="mb-2">
                        <label class="form-label text-pink small fw-bold">작가명</label>
                        <input type="text" class="form-control form-control-custom" id="recAuthor" placeholder="작가 이름 입력" required>
                    </div>

                    <div class="mb-2">
                        <label class="form-label text-pink small fw-bold">책 쪽수 (페이지 수)</label>
                        <input type="number" class="form-control form-control-custom" id="recPageCount" placeholder="예: 324" min="1" inputmode="numeric" pattern="[0-9]*" required>
                    </div>

                    <div class="mb-2">
                        <label class="form-label text-pink small fw-bold">책 별칭 또는 한줄평 키워드</label>
                        <input type="text" class="form-control form-control-custom" id="recNickname" placeholder="예: 벽돌책 아님 패스">
                    </div>

                    <button type="submit" class="btn btn-princess w-100 mt-2" id="recSubmitBtn">
                        <i class="fa-solid fa-heart-circle-plus"></i> 추천 도서 등록하기
                    </button>
                </form>
            </div>
        </div>

        <div class="stat-card">
            <div class="card-header-custom">
                <i class="fa-solid fa-heart me-1"></i> 2. 이번 티타임 평가 남기기
            </div>
            <div class="card-body-custom">
                <form id="reviewForm" onsubmit="saveReviewRating(event)">
                    <div class="mb-2">
                        <label class="form-label text-pink small fw-bold">토론 참여 차수 선택</label>
                        <select class="form-select form-select-custom" id="roundNoSelect" onchange="loadExistingReview()" required>
                        </select>
                    </div>

                    <div class="mb-3 text-start">
                        <label class="form-label text-pink small fw-bold d-block mb-1.5">토론 전 마음의 별점 점수 (손가락으로 문지르셔요)</label>
                        <div class="star-rating-wrapper">
                            <div class="star-input-container">
                                <div class="star-input-stars-outer">★★★★★</div>
                                <div class="star-input-stars-inner" id="writeStarInner">★★★★★</div>
                                <input type="range" class="star-range-input" id="ratingSelect" min="0" max="5" step="0.1" value="4.0" oninput="syncWriteStarSlider(this.value)">
                            </div>
                            <span class="rating-value text-warning fw-bold fs-5" id="writeStarText" style="min-width: 32px; display: inline-block; text-align: right;">4.0</span>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-pink small fw-bold">솔직 담백 총평 스토리</label>
                        <textarea class="form-control form-control-custom" id="reviewText" rows="3" placeholder="공주님들의 뇌리에 남은 감상을 적어주셔요." required></textarea>
                    </div>

                    <button type="submit" class="btn btn-princess w-100" id="reviewSubmitBtn">
                        <i class="fa-solid fa-cloud-arrow-up"></i> 리뷰 & 별점 굽기 완료
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div id="global-nav" data-active="write"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>
    
    <script>
        checkAuth();
        let currentRecId = null;
        let latestRound = 0; 
        let lastUnselectedBookObj = null;

        document.addEventListener("DOMContentLoaded", async () => {
            const princess = getLoggedInMember();
            document.getElementById("welcomePrincess").innerHTML = `👸 <b>${princess} 공주님</b>의 아지트 레코드 존-★`;
            document.getElementById("myWriteAvatar").src = `images/${localStorage.getItem("login_member_image") || 'default_princess.png'}`;
            
            await loadRounds();
            setupTargetRounds();
            await huntLastUnselectedRecommendation();

            loadExistingRecommendation();
            loadExistingReview();
        });

        // 👑 스와이프 시 실시간으로 황금 별을 채워주고 점수를 갱신하는 렌더 엔진 유틸
        function syncWriteStarSlider(val) {
            document.getElementById("writeStarInner").style.width = (parseFloat(val) / 5 * 100) + "%";
            document.getElementById("writeStarText").textContent = parseFloat(val).toFixed(1);
        }

        function setupTargetRounds() {
            const select = document.getElementById("targetRoundSelect");
            select.innerHTML = ""; 
            for(let i = 1; i <= 3; i++) {
                let targetRoundNum = latestRound + i;
                let roundLabel = "";
                if (i === 1) roundLabel = `다음 (제 ${targetRoundNum}회차) 티타임 후보작`;
                else if (i === 2) roundLabel = `다다음 (제 ${targetRoundNum}회차) 티타임 후보작`;
                else roundLabel = `다다다음 (제 ${targetRoundNum}회차) 티타임 후보작`;

                select.innerHTML += `<option value="${targetRoundNum}">${roundLabel}</option>`;
            }
        }

        async function loadRounds() {
            try {
                const { data, error } = await _db.from('books').select('round_no, title').order('round_no', { ascending: false });
                if (error) throw error;
                
                latestRound = data && data.length > 0 ? data[0].round_no : 0;

                const select = document.getElementById("roundNoSelect");
                select.innerHTML = "";
                data.forEach(b => {
                    select.innerHTML += `<option value="${b.round_no}">${b.round_no}회차 티타임 [${b.title}]</option>`;
                });
            } catch(e) { console.error(e); }
        }

        async function huntLastUnselectedRecommendation() {
            const member_id = parseInt(localStorage.getItem("login_member_id"));
            if (!member_id) return;

            try {
                const { data, error } = await _db
                    .from('recommendations')
                    .select('title, author, page_count, nickname, is_selected')
                    .eq('member_id', member_id) 
                    .eq('is_selected', false) 
                    .order('created_at', { ascending: false })
                    .limit(1);

                if (error) throw error;

                const wrapper = document.getElementById("reRecommendWrapper");
                const btn = document.getElementById("reRecommendBtn");

                if (data && data.length > 0) {
                    lastUnselectedBookObj = data[0];
                    btn.innerHTML = `<i class="fa-solid fa-arrows-rotate text-warning"></i> ♻️ 지난 탈락작 <b>[${lastUnselectedBookObj.title}]</b> 원터치 불러오기`;
                    wrapper.classList.remove("d-none"); 
                } else {
                    lastUnselectedBookObj = null;
                    wrapper.classList.add("d-none");
                }
            } catch (err) { console.error("낙방 이력 추적 에러:", err); }
        }

        function injectLastUnselectedBook() {
            if (!lastUnselectedBookObj) return;
            
            document.getElementById("recTitle").value = lastUnselectedBookObj.title || "";
            document.getElementById("recAuthor").value = lastUnselectedBookObj.author || "";
            document.getElementById("recPageCount").value = lastUnselectedBookObj.page_count || "";
            document.getElementById("recNickname").value = lastUnselectedBookObj.nickname || "";
            
            alert(`✨ 완벽 로딩! 탈락했던 명작 [${lastUnselectedBookObj.title}]의 스펙을 폼에 채워 넣었사옵니다. 하단 등록을 누르셔요!`);
            document.getElementById("recTitle").focus();
        }

        async function loadExistingRecommendation() {
            const member_id = parseInt(localStorage.getItem("login_member_id"));
            const target_round = document.getElementById("targetRoundSelect").value;
            if(!target_round || !member_id) return;
            
            try {
                const { data, error } = await _db
                    .from('recommendations')
                    .select('id, title, author, nickname, page_count')
                    .eq('member_id', member_id) 
                    .eq('target_round', parseInt(target_round))
                    .order('created_at', { ascending: false })
                    .limit(1);

                if (error) throw error;

                const submitBtn = document.getElementById("recSubmitBtn");

                if (data && data.length > 0) {
                    const rec = data[0];
                    currentRecId = rec.id;
                    document.getElementById("recTitle").value = rec.title || "";
                    document.getElementById("recAuthor").value = rec.author || "";
                    document.getElementById("recPageCount").value = rec.page_count || "";
                    document.getElementById("recNickname").value = rec.nickname || "";
                    
                    submitBtn.innerHTML = `<i class="fa-solid fa-pen-fancy"></i> 추천 도서 우아하게 수정하기`;
                    submitBtn.style.background = "linear-gradient(135deg, #FF007F, #FF69B4)";
                } else {
                    currentRecId = null;
                    document.getElementById("recTitle").value = "";
                    document.getElementById("recAuthor").value = "";
                    document.getElementById("recPageCount").value = "";
                    document.getElementById("recNickname").value = "";
                    
                    submitBtn.innerHTML = `<i class="fa-solid fa-heart-circle-plus"></i> 추천 도서 등록하기`;
                    submitBtn.style.background = ""; 
                }
            } catch (err) { console.error(err); }
        }

        async function loadExistingReview() {
            const member_id = parseInt(localStorage.getItem("login_member_id"));
            const roundNoEl = document.getElementById("roundNoSelect");
            if (!roundNoEl.value || !member_id) return;
            
            const round_no = parseInt(roundNoEl.value);
            
            try {
                const { data, error } = await _db
                    .from('reviews_ratings')
                    .select('rating_before, review_text') 
                    .eq('member_id', member_id) 
                    .eq('round_no', round_no)
                    .limit(1);

                if (error) throw error;

                const submitBtn = document.getElementById("reviewSubmitBtn");
                const ratingSlider = document.getElementById("ratingSelect");

                if (data && data.length > 0) {
                    const rev = data[0];
                    const existingScore = rev.rating_before !== null ? rev.rating_before : 4.0;
                    
                    // 👑 기입 데이터 기반 슬라이더 및 황금 광채 별 연동 세팅
                    ratingSlider.value = existingScore;
                    syncWriteStarSlider(existingScore);
                    
                    document.getElementById("reviewText").value = rev.review_text || "";
                    submitBtn.innerHTML = `<i class="fa-solid fa-pen-fancy"></i> 티타임 총평 우아하게 수정하기`;
                    submitBtn.style.background = "linear-gradient(135deg, #FF007F, #FF69B4)";
                } else {
                    ratingSlider.value = 4.0;
                    syncWriteStarSlider(4.0);
                    
                    document.getElementById("reviewText").value = "";
                    submitBtn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up"></i> 리뷰 & 별점 굽기 완료`;
                    submitBtn.style.background = "";
                }
            } catch (err) { console.error(err); }
        }

        async function saveRecommendation(e) {
            e.preventDefault();
            const member_id = parseInt(localStorage.getItem("login_member_id"));
            if (!member_id) { alert("세션 만료! 다시 로그인해 주셔요."); return; }

            const target_round = parseInt(document.getElementById("targetRoundSelect").value);
            const title = document.getElementById("recTitle").value.trim();
            const author = document.getElementById("recAuthor").value.trim();
            const page_count = document.getElementById("recPageCount").value ? parseInt(document.getElementById("recPageCount").value) : null;
            const nickname = document.getElementById("recNickname").value.trim();

            const now = new Date();
            const future = new Date(now.getFullYear(), now.getMonth() + (target_round - latestRound), 1);
            const target_month = `${future.getFullYear()}-${String(future.getMonth() + 1).padStart(2, '0')}`;

            try {
                if (currentRecId) {
                    const { error } = await _db
                        .from('recommendations')
                        .update({ title, author, page_count, nickname, target_round })
                        .eq('id', currentRecId);
                        
                    if (error) throw error;
                    alert("추천 도서 정보가 차수별로 완벽하게 수정되었사옵니다! ✨");
                } else {
                    const { error } = await _db
                        .from('recommendations')
                        .insert([{ target_month, target_round, member_id, title, author, page_count, nickname }]);
                        
                    if (error) throw error;
                    alert("추천 도서가 지정 차수에 명확히 등록되었사옵니다! 💖");
                }
                
                await huntLastUnselectedRecommendation();
                await loadExistingRecommendation();
            } catch(err) { 
                console.error(err);
                alert("적재 에러 발생!"); 
            }
        }

        async function saveReviewRating(e) {
            e.preventDefault();
            const member_id = parseInt(localStorage.getItem("login_member_id"));
            if (!member_id) { alert("세션 만료! 다시 로그인해 주셔요."); return; }

            const round_no = parseInt(document.getElementById("roundNoSelect").value);
            // 👑 슬라이더 인풋에 누적된 0.1 정밀도 실수를 그대로 적재 파이프라인에 바인딩!
            const rating_before = parseFloat(document.getElementById("ratingSelect").value); 
            const review_text = document.getElementById("reviewText").value.trim();

            try {
                const { error } = await _db.from('reviews_ratings').upsert({ 
                    round_no, 
                    member_id, 
                    rating_before, 
                    review_text 
                }, { onConflict: 'round_no, member_id' }); 
                
                if (error) throw error;
                alert("토론 전 마음의 별점과 리뷰 총평이 성공적으로 장전되었습니다! ☕");
                await loadExistingReview();
            } catch(err) { 
                console.error(err);
                alert("리뷰 적재 실패."); 
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>TED DIET ADMIN v3.7.5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bp-pink: rgb(232, 142, 163); --bp-black: #000; --bp-dark-gray: #121212; --neon-pink: #FF3F7E; --text-dim: #888; }
        body { background-color: var(--bp-black); color: #fff; font-family: 'Pretendard', sans-serif; padding-bottom: 50px; }
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-input { max-width: 200px; font-size: 1.5rem; letter-spacing: 10px; background: #000 !important; border: 2px solid #333 !important; text-align: center; color: var(--bp-pink) !important; }
        .container { max-width: 800px; margin: 0 auto; padding: 15px; display: none; position: relative; z-index: 1; }
        .nav-pills { background: #000; border-radius: 16px; padding: 5px; }
        .nav-pills .nav-link { color: var(--bp-pink); font-weight: 800; border-radius: 12px; margin: 2px; font-size: 0.75rem; border: none; background: transparent; }
        .nav-pills .nav-link.active { background-color: var(--bp-pink) !important; color: #000 !important; }
        .hub-card { background: var(--bp-dark-gray); border-radius: 20px; padding: 15px; border: 1px solid #252525; margin-bottom: 15px; }
        .csv-box { background: #080808 !important; color: #00ff41 !important; font-family: 'Courier New', monospace; font-size: 0.7rem; border-radius: 12px; border: 1px solid #333 !important; width: 100%; }
        .btn-action { background: var(--bp-pink); color: #000; border: none; border-radius: 10px; font-weight: 900; padding: 10px 15px; font-size: 0.8rem; transition: 0.2s; }
        .btn-outline { background: transparent; color: var(--bp-pink); border: 1px solid var(--bp-pink); border-radius: 10px; font-weight: 800; padding: 6px 10px; font-size: 0.7rem; }
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 10px; border: 1px solid #333; position: relative; min-height: 100px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; color: #ccc; font-size: 0.7rem; }
        th { background: #1a1a1a; color: var(--bp-pink); padding: 12px 10px; border-bottom: 1px solid #333; white-space: nowrap; position: sticky; top: 0; z-index: 10; }
        td { padding: 12px 10px; border-bottom: 1px solid #222; white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
        .sticky-col { position: sticky; left: 0; background: #121212; z-index: 5; border-right: 1px solid #444; }
        .editing-cell { padding: 0 !important; background: var(--neon-pink) !important; }
        .edit-input { width: 100%; border: none; background: transparent; color: #fff; padding: 12px 8px; font-weight: 800; outline: none; text-align: center; }
        .table-badge { background: #1a1a1a; padding: 4px 10px; border-radius: 15px; font-size: 0.65rem; color: var(--bp-pink); border: 1px solid #333; margin: 2px; display: inline-block; }
        .update-bar { display: none; gap: 10px; margin-bottom: 15px; padding: 10px; background: rgba(255, 63, 126, 0.1); border: 1px solid var(--neon-pink); border-radius: 12px; }
        .label-small { font-size: 0.65rem; color: #666; margin-bottom: 2px; display: block; font-weight: 700; }
        .guide-box { background: rgba(232, 142, 163, 0.05); border: 1px solid rgba(232, 142, 163, 0.2); border-radius: 12px; padding: 10px; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="auth-overlay"><div class="text-center w-75"><h4 style="color:var(--bp-pink); font-weight:900; letter-spacing:3px; margin-bottom: 20px;">DIET IDENTITY</h4><input type="password" id="pw-input" class="form-control auth-input mx-auto" maxlength="4" inputmode="numeric" autofocus oninput="if(this.value.length===4) verify()"><div id="auth-msg" class="text-danger mt-3 small"></div></div></div>

    <div class="container" id="main-app">
        <div class="text-center mb-3"><h4 style="color:var(--bp-pink); font-weight:900;" onclick="location.reload()">TED DIET HUB</h4></div>
        <ul class="nav nav-pills nav-fill mb-3" id="dietTab" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#v-extract">EXPORT</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#v-view" onclick="setTimeout(onTableSelectChange, 50)">VIEW & EDIT</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#v-import">IMPORT</button></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="v-extract">
                <div class="hub-card">
                    <div class="d-flex justify-content-between mb-2"><span class="small fw-bold">TABLE LIST</span><div class="form-check"><input class="form-check-input" type="checkbox" id="all-check" onchange="toggleAllCheck(this)"><label class="form-check-label small" for="all-check">전체 선택</label></div></div>
                    <div id="table-select-list" class="row g-2 mb-3"></div>
                    <div class="row g-2 mb-3" style="border-top: 1px solid #333; padding-top: 15px;"><div class="col-6"><label class="label-small text-dim mb-1">시작 날짜</label><input type="date" id="export-start-date" class="form-control form-control-sm bg-dark text-white border-secondary" value="2026-04-13"></div><div class="col-6"><label class="label-small text-dim mb-1">종료 날짜</label><input type="date" id="export-end-date" class="form-control form-control-sm bg-dark text-white border-secondary"></div></div>
                    <div class="d-flex flex-wrap gap-2 mb-3"><button class="btn-outline" onclick="processExport('col')">칼럼명 추출</button><button class="btn-outline" onclick="processExport('data')">데이터 추출</button><button class="btn-outline" onclick="processExport('both')">칼럼&데이터 추출</button></div>
                    <textarea id="export-csv-output" class="form-control csv-box mb-2" rows="12" placeholder="추출 결과가 여기에 표시됩니다." readonly></textarea>
                    <button class="btn-action w-100 mb-3" onclick="copyResult()">CSV 결과 복사</button>
                    
                    <div id="luka-guide-area" class="guide-box" style="display:none;">
                        <label class="label-small text-pink mb-2" style="color:var(--bp-pink)">LUCA REQUEST GUIDE</label>
                        <div id="luka-guide-text" class="small mb-3" style="font-size: 0.7rem; color: #aaa; line-height: 1.4;"></div>
                        <button class="btn-outline w-100" onclick="copyLukaGuide()">루카 가이드 복사</button>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="v-view">
                <div class="hub-card">
                    <div class="row g-2 mb-3 align-items-end"><div class="col-6"><label class="small text-dim mb-1">TABLE</label><select id="view-table-select" class="form-select form-select-sm bg-dark text-white border-secondary" onchange="onTableSelectChange()"></select></div><div class="col-6" id="date-filter-area" style="display:none;"><div class="d-flex justify-content-between"><label class="small text-dim mb-1">DATE FILTER</label><span class="small text-info" style="cursor:pointer; font-size:10px;" onclick="resetDateFilter()">전체보기</span></div><input type="date" id="view-date" class="form-control form-control-sm bg-dark text-white border-secondary" onchange="loadTableData()"></div><div class="col-12 mt-2" id="add-row-area" style="display:none;"><button class="btn-action w-100" style="background:var(--neon-pink); color:#fff;" onclick="createNewRow()">+ NEW PLAN (행 추가)</button></div></div>
                    <div id="update-btn-bar" class="update-bar"><button class="btn-action flex-fill" onclick="commitUpdate()">SAVE TO DB (저장)</button><button class="btn-outline flex-fill" onclick="loadTableData()">되돌리기</button></div>
                    <div class="table-wrap" id="table-data-area"><p class="text-center opacity-50 my-5">데이터를 불러오는 중...</p></div>
                </div>
            </div>

            <div class="tab-pane fade" id="v-import">
                <div class="hub-card">
                    <h6 class="small fw-bold mb-2">CSV IMPORT (루카 데이터 입력)</h6>
                    <textarea id="import-input" class="form-control csv-box mb-3" rows="12" placeholder="CSV 형식을 붙여넣으세요." oninput="detectImportInfo()"></textarea>
                    <div id="import-tables-area" class="mb-3"></div>
                    <button class="btn-action w-100" onclick="processInsert()">데이터 최종 INSERT</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://vaamifqzjsrflmprihgv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhYW1pZnF6anNyZmxtcHJpaGd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzODc2NzksImV4cCI6MjA5MTk2MzY3OX0.qUUs3aoWQMEVjTQkYTZtA8CMjMF_MrgBFa4UfiiEWzI';
        const _db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const DIET_TABLES = [
            { schema: 'diet', id: 'ai_rulebook', name: '1. AI 룰셋', dateCol: false },
            { schema: 'diet', id: 'user_goals', name: '2. 사용자 정보', dateCol: false },
            { schema: 'diet', id: 'project_goals', name: '3. 프로젝트 목표', dateCol: false },
            { schema: 'diet', id: 'inbody_logs', name: '4. 인바디 기록', dateCol: 'test_date' },
            { schema: 'diet', id: 'meal_logs', name: '5. 식단 로그', dateCol: 'log_date' },
            { schema: 'diet', id: 'condition_logs', name: '6. 생활/컨디션', dateCol: 'log_date' },
            { schema: 'diet', id: 'strategies', name: '7. 다이어트 전략', dateCol: false },
            { schema: 'diet', id: 'snacks', name: '8. 간식 라이브러리', dateCol: false },
            { schema: 'diet', id: 'project_schedules', name: '9. 프로젝트 스케줄', dateCol: 'plan_date', allowAdd: true },
            { schema: 'workout', id: 'session_logs', name: 'W1. 운동 세션 로그', dateCol: 'workout_date' },
            { schema: 'workout', id: 'logs', name: 'W2. 운동 상세 로그', dateCol: 'workout_date' }
        ];

        let PENDING_UPDATES = {};
        window.onload = () => { document.getElementById('pw-input').focus(); };

        async function verify() {
            const pw = document.getElementById('pw-input').value;
            const { data } = await _db.from('settings').select('value').eq('code', 'ACCESS_PW').single();
            if(data?.value === pw) {
                document.getElementById('auth-overlay').style.display='none';
                document.getElementById('main-app').style.display='block';
                initExtractUI(); initViewUI();
            } else { document.getElementById('auth-msg').innerText = "WRONG PASSWORD"; document.getElementById('pw-input').value = ""; }
        }

        function initExtractUI() {
            document.getElementById('table-select-list').innerHTML = DIET_TABLES.map(t => `<div class="col-6"><div class="form-check"><input class="form-check-input chk-item" type="checkbox" value="${t.id}" id="e-${t.id}" data-schema="${t.schema}" data-name="${t.name}"><label class="form-check-label small text-truncate" for="e-${t.id}">${t.name}</label></div></div>`).join('');
        }
        function toggleAllCheck(el) { document.querySelectorAll('.chk-item').forEach(c => c.checked = el.checked); }

        async function processExport(mode) {
            const checkedItems = Array.from(document.querySelectorAll('.chk-item:checked'));
            if(!checkedItems.length) return alert("추출할 테이블을 선택하세요.");
            const startDate = document.getElementById('export-start-date').value;
            let endDate = document.getElementById('export-end-date').value;
            let adjustedEnd = endDate ? endDate + 'T23:59:59.999Z' : endDate;
            let finalCsv = "";
            let guideInfo = [];

            for(const item of checkedItems) {
                const tableId = item.value; const schemaName = item.getAttribute('data-schema');
                const tableName = item.getAttribute('data-name');
                const tInfo = DIET_TABLES.find(t => t.id === tableId && t.schema === schemaName);
                let query = _db.schema(schemaName).from(tableId).select('*');
                if (tInfo.dateCol) { if (startDate) query = query.gte(tInfo.dateCol, startDate); if (endDate) query = query.lte(tInfo.dateCol, adjustedEnd); }
                const { data } = await query.order('id', { ascending: true });
                
                finalCsv += `[${tInfo.name}]\n`;
                if(data?.length) {
                    const cols = Object.keys(data[0]);
                    guideInfo.push({ name: tInfo.name, cols: cols.filter(c => c !== 'id' && c !== 'created_at' && c !== 'updated_at') });
                    if(mode !== 'data') finalCsv += cols.join(',') + '\n';
                    if(mode !== 'col') data.forEach(row => { finalCsv += cols.map(c => { let v = row[c] === null ? "" : row[c]; let strV = String(v); return (strV.includes(',') || strV.includes('\n')) ? `"${strV.replace(/"/g, '""')}"` : strV; }).join(',') + '\n'; });
                } else finalCsv += "(데이터 없음)\n";
                finalCsv += '\n';
            }
            document.getElementById('export-csv-output').value = finalCsv.trim();
            
            if(guideInfo.length > 0) {
                let guideText = `루카, 오늘 기록을 아래 양식에 맞춰서 CSV로 작성해줘. 테이블 제목은 [숫자. 이름] 형식을 지켜줘.\n\n`;
                guideInfo.forEach(g => { guideText += `[${g.name}]\n${g.cols.join(',')}\n(데이터 입력)\n\n`; });
                document.getElementById('luka-guide-text').innerText = guideText.trim();
                document.getElementById('luka-guide-area').style.display = 'block';
            }
        }
        function copyResult() { const box = document.getElementById('export-csv-output'); if(!box.value) return alert("추출된 데이터가 없습니다."); box.select(); document.execCommand('copy'); alert("CSV 데이터가 복사되었습니다! 🖤💖"); }
        function copyLukaGuide() {
            const guide = document.getElementById('luka-guide-text').innerText;
            const temp = document.createElement('textarea');
            document.body.appendChild(temp);
            temp.value = guide; temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            alert("루카용 요청 가이드가 복사되었습니다! 🤖");
        }

        function initViewUI() { document.getElementById('view-table-select').innerHTML = DIET_TABLES.map(t => `<option value="${t.id}" data-schema="${t.schema}">${t.name}</option>`).join(''); }
        function resetDateFilter() { document.getElementById('view-date').value = ""; loadTableData(); }
        function onTableSelectChange() {
            const sel = document.getElementById('view-table-select'); const tid = sel.value;
            const t = DIET_TABLES.find(x => x.id === tid && x.schema === sel.options[sel.selectedIndex].getAttribute('data-schema'));
            document.getElementById('date-filter-area').style.display = t.dateCol ? 'block' : 'none';
            document.getElementById('add-row-area').style.display = t.allowAdd ? 'block' : 'none';
            document.getElementById('view-date').value = ""; loadTableData();
        }

        async function loadTableData() {
            const sel = document.getElementById('view-table-select'); const tid = sel.value;
            const schemaName = sel.options[sel.selectedIndex].getAttribute('data-schema');
            const tInfo = DIET_TABLES.find(x => x.id === tid && x.schema === schemaName);
            const dateVal = document.getElementById('view-date').value;
            PENDING_UPDATES = {}; document.getElementById('update-btn-bar').style.display = 'none';
            let query = _db.schema(schemaName).from(tid).select('*');
            if(tInfo.dateCol && dateVal) query = query.eq(tInfo.dateCol, dateVal);
            const { data } = await query.order('id', { ascending: true });
            renderTable(data || [], schemaName, tid);
        }

        function renderTable(data, schema, table) {
            const area = document.getElementById('table-data-area');
            if(data.length === 0) { area.innerHTML = `<table class="w-100"><thead><tr><th>ID</th><th>데이터가 없습니다.</th></tr></thead><tbody id="main-tbody"></tbody></table>`; return; }
            const cols = Object.keys(data[0]);
            let html = `<table><thead><tr>${cols.map(k => `<th class="${k==='id'?'sticky-col':''}">${k}</th>`).join('')}</tr></thead><tbody id="main-tbody">`;
            data.forEach(row => {
                html += `<tr>${cols.map(k => {
                    const val = row[k] === null ? '' : row[k];
                    const isEditable = (k !== 'id' && k !== 'created_at' && k !== 'updated_at');
                    return `<td class="${k==='id'?'sticky-col':''}" onclick="${isEditable ? `makeEditable(this, '${schema}', '${table}', '${row.id}', '${k}')` : ''}">${val}</td>`;
                }).join('')}</tr>`;
            });
            area.innerHTML = html + "</tbody></table>";
        }

        function createNewRow() {
            const tbody = document.getElementById('main-tbody');
            if(!tbody) {
                const area = document.getElementById('table-data-area');
                area.innerHTML = `<table><thead><tr><th class="sticky-col">id</th><th>plan_date</th><th>workout_available_min</th><th>is_alcohol_possible</th><th>is_alcohol_confirmed</th><th>description</th></tr></thead><tbody id="main-tbody"></tbody></table>`;
            }
            const targetTbody = document.getElementById('main-tbody');
            const tempId = 'NEW_' + Date.now();
            const newTr = document.createElement('tr');
            newTr.id = `tr-${tempId}`;
            newTr.style.background = "rgba(255, 63, 126, 0.15)";
            const cols = ['id', 'plan_date', 'workout_available_min', 'is_alcohol_possible', 'is_alcohol_confirmed', 'description'];
            const schema = 'diet'; const table = 'project_schedules';
            cols.forEach(k => {
                const td = document.createElement('td');
                let defaultVal = '';
                if(k === 'id') { td.innerText = 'NEW'; td.className = 'sticky-col'; }
                else if(k.includes('possible') || k.includes('confirmed')) defaultVal = 'false';
                else if(k.includes('min')) defaultVal = '0';
                else if(k === 'plan_date') defaultVal = new Date().toISOString().split('T')[0];
                if(k !== 'id') {
                    td.onclick = function() { makeEditable(this, schema, table, tempId, k); };
                    td.innerText = defaultVal;
                    td.style.color = 'var(--neon-pink)'; td.style.fontWeight = '900';
                }
                newTr.appendChild(td);
            });
            targetTbody.prepend(newTr);
            PENDING_UPDATES[tempId] = { _schema: schema, _table: table, _isNew: true, plan_date: new Date().toISOString().split('T')[0], workout_available_min: 0, is_alcohol_possible: false, is_alcohol_confirmed: false, description: '' };
            document.getElementById('update-btn-bar').style.display = 'flex';
        }

        function makeEditable(cell, schema, table, id, col) {
            if(cell.classList.contains('editing-cell')) return;
            const oldVal = cell.innerText.trim(); cell.classList.add('editing-cell');
            let inputType = "text";
            if(col.includes('date')) inputType = "date";
            if(col.includes('min') || col.includes('weight')) inputType = "number";
            cell.innerHTML = `<input type="${inputType}" value="${oldVal}" class="edit-input" onblur="finishEdit(this, '${schema}', '${table}', '${id}', '${col}', '${oldVal}')" onkeydown="if(event.key==='Enter') this.blur()">`;
            cell.querySelector('input').focus();
        }

        function finishEdit(input, schema, table, id, col, oldVal) {
            let newVal = input.value; const cell = input.parentElement; cell.classList.remove('editing-cell'); cell.innerText = newVal;
            if(newVal != oldVal) {
                if(!PENDING_UPDATES[id]) PENDING_UPDATES[id] = { _schema: schema, _table: table };
                PENDING_UPDATES[id][col] = newVal;
                document.getElementById('update-btn-bar').style.display = 'flex';
                cell.style.color = 'var(--neon-pink)'; cell.style.fontWeight = '900';
            }
        }

        async function commitUpdate() {
            try {
                for(const id in PENDING_UPDATES) {
                    const { _schema, _table, _isNew, ...updateData } = PENDING_UPDATES[id];
                    if(_isNew) { const { error } = await _db.schema(_schema).from(_table).insert([updateData]); if(error) throw error; }
                    else { const { error } = await _db.schema(_schema).from(_table).update(updateData).eq('id', id); if(error) throw error; }
                }
                alert("성공! 🥗"); loadTableData();
            } catch(e) { alert("실패: " + e.message); }
        }

        function detectImportInfo() {
            const val = document.getElementById('import-input').value; const area = document.getElementById('import-tables-area'); area.innerHTML = "";
            DIET_TABLES.forEach(t => { if(val.includes(`[${t.name}]`)) area.innerHTML += `<span class="table-badge">${t.name}</span>`; });
        }

        async function processInsert() {
            const val = document.getElementById('import-input').value.trim(); if(!val) return;
            try {
                const headers = val.match(/\[(?:\d+|W\d+)\.\s[^\]]+\]/g); const sections = val.split(/\[(?:\d+|W\d+)\.\s[^\]]+\]/);
                if(!headers) return alert("올바른 형식이 아닙니다.");
                for(let i=0; i<headers.length; i++) {
                    const tInfo = DIET_TABLES.find(t => headers[i].includes(t.name.split('.')[1]?.trim() || t.name.split(' ')[1]?.trim()));
                    if(!tInfo) continue;
                    const lines = sections[i+1].trim().split('\n');
                    if(lines.length < 2) continue;
                    const csvCols = lines[0].split(',').map(c => c.trim());
                    const csvData = lines.slice(1).map(l => {
                        const cells = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                        let rowObj = {};
                        csvCols.forEach((colName, idx) => {
                            if(!['id', 'created_at', 'updated_at'].includes(colName)) {
                                let cellValue = cells[idx]?.trim() || null;
                                if(cellValue && cellValue.startsWith('"') && cellValue.endsWith('"')) { cellValue = cellValue.substring(1, cellValue.length-1).replace(/""/g, '"'); }
                                if(cellValue === "") cellValue = null;
                                rowObj[colName] = cellValue;
                            }
                        });
                        return rowObj;
                    });
                    const { error } = await _db.schema(tInfo.schema).from(tInfo.id).insert(csvData);
                    if(error) throw error;
                }
                alert("데이터 지능형 삽입 완료! 🔥"); document.getElementById('import-input').value = ""; detectImportInfo();
            } catch(e) { alert("오류: " + e.message); }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>TED DIET HUB - EXPORT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    <style>
        .preset-btn-group {
            display: flex;
            gap: 4px;
            margin-bottom: 10px;
        }
        .group-header {
            font-size: 0.72rem;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 6px;
            display: inline-block;
        }
        .action-flex-group {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        /* 🌿 상큼한 민트 포인트가 결합된 프롬프트 구역 스타일 */
        .prompt-select-box {
            background: #111 !important;
            border: 1px solid #2da8c9 !important;
            color: #20c997 !important;
            font-weight: 800;
        }
    </style>
    <!-- 🌌 전 우주 공통 SSO 인증 관제탑 탑재 -->
    <script src="../universe_core.js"></script>
</head>
<body>
    <div class="container" id="main-app" style="display:block;">
        <div class="text-center mb-3">
            <h4 style="color:var(--bp-pink); font-weight:900; cursor:pointer;" onclick="location.reload()">TED DIET HUB</h4>
        </div>
        
        <div id="global-nav" data-active="export"></div>

        <div class="hub-card">
            <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">
                <span class="small fw-bold">TABLE LIST</span>
                <div class="d-flex gap-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="daily-check" onchange="toggleDailyCheck(this)">
                        <label class="form-check-label small fw-bold" for="daily-check" style="color: #4da6ff;">데일리 선택</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="all-check" onchange="toggleAllCheck(this)">
                        <label class="form-check-label small fw-bold" for="all-check" style="color: var(--bp-pink);">전체 선택</label>
                    </div>
                </div>
            </div>
            
            <div id="table-select-list" class="row g-2 mb-3"></div>
            
            <div style="border-top: 1px solid #333; padding-top: 15px; margin-bottom: 15px;">
                <label class="label-small text-dim mb-2">토큰 다이어트 기간 프리셋 (모바일 전용)</label>
                <div class="preset-btn-group">
                    <button type="button" class="btn-outline flex-fill py-1" onclick="setDatePreset(0)">오늘만</button>
                    <button type="button" class="btn-outline flex-fill py-1" onclick="setDatePreset(2)">최근 3일</button>
                    <button type="button" class="btn-outline flex-fill py-1" onclick="setDatePreset(6)">최근 7일</button>
                    <button type="button" class="btn-outline flex-fill py-1" onclick="setDatePreset('all')">전체 (4/13~)</button>
                </div>
                
                <div class="row g-2">
                    <div class="col-6">
                        <label class="label-small text-dim mb-1">시작 날짜</label>
                        <input type="date" id="export-start-date" class="form-control form-control-sm bg-dark text-white border-secondary" value="2026-04-13">
                    </div>
                    <div class="col-6">
                        <label class="label-small text-dim mb-1">종료 날짜</label>
                        <input type="date" id="export-end-date" class="form-control form-control-sm bg-dark text-white border-secondary">
                    </div>
                </div>
            </div>

            <div class="d-flex flex-wrap gap-2 mb-3">
                <button class="btn-outline" onclick="processExport('col')">칼럼명 추출</button>
                <button class="btn-outline" onclick="processExport('data')">데이터 추출</button>
                <button class="btn-outline" onclick="processExport('both')">칼럼&데이터 추출</button>
            </div>
            
            <textarea id="export-csv-output" class="form-control csv-box mb-2" rows="12" placeholder="추출 결과가 여기에 표시됩니다. (대용량의 경우 일부 잘려 보일 수 있으나 다운로드 파일은 안전합니다)" readonly></textarea>
            
            <div class="action-flex-group">
                <button class="btn-action flex-fill" onclick="copyResult()">CSV 결과 복사</button>
                <button class="btn-outline flex-fill" style="padding: 10px 15px; font-weight:900; font-size:0.8rem;" onclick="downloadResult()">TXT 파일 다운로드 💾</button>
            </div>
            
            <!-- ⚡ [치트키 개조] 상시 가동형 쵸파 결합용 저장된 AI 프롬프트 셀렉터 구역 -->
            <div style="border-top: 1px dashed #333; padding-top: 15px; margin-top: 15px; margin-bottom: 15px;">
                <label class="label-small mb-2" style="color: #20c997; font-weight: 900;">⚡ SAVED AI PROMPTS COCKPIT</label>
                <div class="d-flex gap-2">
                    <select id="export-prompt-select" class="form-select form-select-sm prompt-select-box" onchange="handlePromptSelect(this.value)">
                        <option value="">-- 불러온 프롬프트 없음 --</option>
                    </select>
                    <button class="btn btn-sm btn-outline-info" style="border-color:#20c997; color:#20c997; font-weight: 800; font-size: 0.7rem; white-space: nowrap;" onclick="copySelectedPromptOnly()">프롬프트만 복사</button>
                </div>
                <div id="export-prompt-desc" class="small text-secondary mt-1 px-1" style="font-size: 0.65rem; font-style: italic;"></div>
            </div>

            <div id="chopper-guide-area" class="guide-box" style="display:none;">
                <label class="label-small text-pink mb-2" style="color:var(--bp-pink)">CHOPPER REQUEST GUIDE (업데이트 데이터 요청용)</label>
                <div id="chopper-guide-text" class="small mb-3" style="font-size: 0.7rem; color: #aaa; line-height: 1.4; white-space: pre-wrap; word-break: break-all;"></div>
                <button class="btn-outline w-100 mb-3" onclick="copyChopperGuide()">쵸파 데이터 요청 가이드 복사 🤖</button>
                
                <label class="label-small text-pink mb-2" style="color:var(--neon-pink); border-top: 1px solid #222; padding-top: 10px;">CHOPPER MORNING RESET GUIDE (아침 히스토리 리셋용)</label>
                <div class="small mb-3" style="font-size: 0.7rem; color: #aaa; line-height: 1.4;">
                    "쵸파, 프로젝트 히스토리를 리셋하고, 이번 프롬프트에서 알려주는 CSV코드 형태의 프로젝트 히스토리를 기준으로 오늘의 코칭을 시작하자" 문장 뒤에 아래 추출된 CSV 데이터 본문 전체가 자동으로 결합되어 복사 또는 파일로 저장됩니다.
                </div>
                <div class="d-flex gap-2">
                    <button class="btn-outline flex-fill py-2" style="border-color: var(--neon-pink); color: var(--neon-pink);" onclick="copyMorningResetGuide()">모닝 가이드 복사 🌅</button>
                    <button class="btn-action flex-fill py-2" style="background: var(--neon-pink); color:#000;" onclick="downloadMorningResetGuide()">모닝 가이드 TXT 다운로드 💾🦌</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let RAW_MEMORY_CSV_BUFFER = ""; 
        let PROMPT_CACHE_MAP = {}; // 프롬프트 텍스트 다이렉트 맵핑 캐시

        window.onload = () => {
            const masterTables = DIET_TABLES.filter(t => t.group === 'master');
            const dailyTables = DIET_TABLES.filter(t => t.group === 'daily');
            const workoutTables = DIET_TABLES.filter(t => t.group === 'workout');
            let html = "";
            
            if(masterTables.length > 0) {
                html += `<div class="col-12 mt-2 mb-1"><span class="group-header" style="background:rgba(232, 142, 163, 0.15); color:var(--bp-pink);">📋 마스터 관리 테이블</span></div>`;
                masterTables.forEach(t => { html += renderCheckItem(t, 'master'); });
            }
            if(dailyTables.length > 0) {
                html += `<div class="col-12 mt-3 mb-1"><span class="group-header" style="background:rgba(77, 166, 255, 0.15); color:#4da6ff;">🌅 데일리 업데이트 테이블</span></div>`;
                dailyTables.forEach(t => { html += renderCheckItem(t, 'daily'); });
            }
            if(workoutTables.length > 0) {
                html += `<div class="col-12 mt-3 mb-1"><span class="group-header" style="background:rgba(128, 128, 128, 0.15); color:#aaa;">🏋️‍♂️ 워크아웃 로그 (workout 스키마)</span></div>`;
                workoutTables.forEach(t => { html += renderCheckItem(t, 'workout'); });
            }
            document.getElementById('table-select-list').innerHTML = html;
            
            const todayStr = new Date().toISOString().split('T')[0];
            document.getElementById('export-end-date').value = todayStr;

            // ⚡ 기획 명세 구현: 기동 시 저장된 프롬프트 목록 실시간 버퍼 바인딩
            fetchSavedPrompts();
        };

        async function fetchSavedPrompts() {
            try {
                const { data, error } = await _db.schema('diet').from('saved_prompts').select('*').order('title');
                if (error) throw error;
                const selectEl = document.getElementById('export-prompt-select');
                if(data && data.length > 0) {
                    selectEl.innerHTML = '<option value="">-- 사용할 프롬프트 선택 --</option>' + data.map(p => {
                        PROMPT_CACHE_MAP[p.id] = { text: p.prompt_text, desc: p.description };
                        return `<option value="${p.id}">${p.title}</option>`;
                    }).join('');
                } else {
                    selectEl.innerHTML = '<option value="">등록된 프롬프트가 없습니다.</option>';
                }
            } catch (e) {
                console.error("프롬프트 캐싱 실패:", e);
            }
        }

        function handlePromptSelect(id) {
            const descEl = document.getElementById('export-prompt-desc');
            if(id && PROMPT_CACHE_MAP[id]) {
                descEl.innerText = PROMPT_CACHE_MAP[id].desc ? `설명: ${PROMPT_CACHE_MAP[id].desc}` : "지정된 설명이 없습니다.";
            } else {
                descEl.innerText = "";
            }
        }

        function copySelectedPromptOnly() {
            const selectId = document.getElementById('export-prompt-select').value;
            if(!selectId || !PROMPT_CACHE_MAP[selectId]) return alert("복사할 프롬프트를 리스트에서 선택해 주세요!");
            executeOffscreenCopy(PROMPT_CACHE_MAP[selectId].text);
            alert("선택한 단독 프롬프트 명령어가 클립보드에 복사되었습니다! 🤖⚡");
        }

        function renderCheckItem(t, typeClass) {
            return `
                <div class="col-6">
                    <div class="form-check">
                        <input class="form-check-input chk-item chk-${typeClass}" type="checkbox" value="${t.id}" id="e-${t.id}" data-schema="${t.schema}" data-name="${t.name}">
                        <label class="form-check-label small text-truncate" for="e-${t.id}">${t.name}</label>
                    </div>
                </div>
            `;
        }
        
        function toggleAllCheck(el) { 
            document.querySelectorAll('.chk-item').forEach(c => c.checked = el.checked); 
            document.getElementById('daily-check').checked = false;
        }

        function toggleDailyCheck(el) {
            document.querySelectorAll('.chk-item').forEach(c => {
                if (c.classList.contains('chk-daily')) {
                    c.checked = el.checked;
                } else {
                    if (el.checked) c.checked = false;
                }
            });
            document.getElementById('all-check').checked = false;
        }

        function setDatePreset(days) {
            const endDateInput = document.getElementById('export-end-date');
            const startDateInput = document.getElementById('export-start-date');
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
            endDateInput.value = todayStr;

            if (days === 'all') {
                startDateInput.value = "2026-04-13";
            } else {
                const targetDate = new Date();
                targetDate.setDate(today.getDate() - days);
                startDateInput.value = targetDate.toISOString().split('T')[0];
            }
        }

        async function processExport(mode) {
            const checkedItems = Array.from(document.querySelectorAll('.chk-item:checked'));
            if(!checkedItems.length) return alert("추출할 테이블을 선택하세요.");
            const startDate = document.getElementById('export-start-date').value;
            let endDate = document.getElementById('export-end-date').value;
            let adjustedEnd = endDate ? endDate + 'T23:59:59.999Z' : endDate;
            let finalCsv = "";
            let guideInfo = [];

            for(const item of checkedItems) {
                const tableId = item.value; 
                const schemaName = item.getAttribute('data-schema');
                const tInfo = DIET_TABLES.find(t => t.id === tableId && t.schema === schemaName);
                let query = _db.schema(schemaName).from(tableId).select('*');
                
                if (tableId === 'project_schedules') {
                    const todayObj = new Date();
                    todayObj.setDate(todayObj.getDate() - 7);
                    const yyyy = todayObj.getFullYear();
                    const mm = String(todayObj.getMonth() + 1).padStart(2, '0');
                    const dd = String(todayObj.getDate()).padStart(2, '0');
                    const customScheduleStart = `${yyyy}-${mm}-${dd}`;
                    query = query.gte('plan_date', customScheduleStart); 
                } else {
                    if (tInfo.dateCol) { 
                        if (startDate) query = query.gte(tInfo.dateCol, startDate); 
                        if (endDate) {
                            if (tInfo.dateCol === 'workout_date' || tInfo.dateCol === 'created_at') {
                                query = query.lte(tInfo.dateCol, adjustedEnd); 
                            } else {
                                query = query.lte(tInfo.dateCol, endDate); 
                            }
                        }
                    }
                }
                
                let orderCol = tInfo.dateCol ? tInfo.dateCol : 'id';
                const { data } = await query.order(orderCol, { ascending: true });
                
                finalCsv += `[${tInfo.name}]\n`;
                if(data?.length) {
                    const cols = Object.keys(data[0]);
                    guideInfo.push({ name: tInfo.name, cols: cols.filter(c => c !== 'id' && c !== 'created_at' && c !== 'updated_at') });
                    if(mode !== 'data') finalCsv += cols.join(',') + '\n';
                    if(mode !== 'col') data.forEach(row => { 
                        finalCsv += cols.map(c => { 
                            let v = row[c] === null ? "" : row[c]; 
                            let strV = String(v); 
                            return (strV.includes(',') || strV.includes('\n')) ? `"${strV.replace(/"/g, '""')}"` : strV; 
                        }).join(',') + '\n'; 
                    });
                } else finalCsv += "(데이터 없음)\n";
                finalCsv += '\n';
            }
            
            RAW_MEMORY_CSV_BUFFER = finalCsv.trim();
            document.getElementById('export-csv-output').value = RAW_MEMORY_CSV_BUFFER;
            
            if(guideInfo.length > 0) {
                let guideText = `쵸파, 오늘 업데이트할 내용이 있는 기록을, 아래 양식에 맞춰서, CSV코드 형태로, 그대로 복사해서 쓸 수 있게, 한 블럭의 코드로 작성해줘. 테이블 제목은 [숫자. 이름] 형식을 지켜줘.\n\n`;
                guideInfo.forEach(g => { guideText += `[${g.name}]\n${g.cols.join(',')}\n(데이터 입력)\n\n`; });
                document.getElementById('chopper-guide-text').innerText = guideText.trim();
                document.getElementById('chopper-guide-area').style.display = 'block';
            }
        }
        
        function copyResult() { 
            if(!RAW_MEMORY_CSV_BUFFER) return alert("추출된 데이터가 없습니다."); 
            executeOffscreenCopy(RAW_MEMORY_CSV_BUFFER);
            alert("가상 버퍼의 원본 CSV 데이터가 완벽하게 복사되었습니다! 🖤💖"); 
        }

        function downloadResult() {
            if(!RAW_MEMORY_CSV_BUFFER) return alert("추출된 데이터가 없습니다. 먼저 데이터를 추출해 주세요!");
            const todayStr = new Date().toISOString().split('T')[0];
            triggerFileDownload(RAW_MEMORY_CSV_BUFFER, `diet_hub_raw_data_${todayStr}.txt`);
        }
        
        function copyChopperGuide() {
            const guide = document.getElementById('chopper-guide-text').innerText;
            executeOffscreenCopy(guide);
            alert("쵸파용 요청 가이드가 복사되었습니다! 🤖");
        }

        // 🧠 [지능형 하이브리드 결합] 선택된 커스텀 프롬프트 문장 뒤에 추출된 백그라운드 CSV 데이터를 수포 결합!
        function copyMorningResetGuide() {
            if(!RAW_MEMORY_CSV_BUFFER) return alert("추출된 CSV 데이터가 없습니다. [칼럼&데이터 추출]을 완료해 주세요!");
            
            const selectId = document.getElementById('export-prompt-select').value;
            let basePrompt = "쵸파, 프로젝트 히스토리를 리셋하고, 이번 프롬프트에서 알려주는 CSV코드 형태의 프로젝트 히스토리를 기준으로 오늘의 코칭을 시작하자";
            
            if(selectId && PROMPT_CACHE_MAP[selectId]) {
                basePrompt = PROMPT_CACHE_MAP[selectId].text;
            }
            
            const fullPromptCombined = `${basePrompt}\n\n${RAW_MEMORY_CSV_BUFFER}`;
            executeOffscreenCopy(fullPromptCombined);
            alert("지정한 AI 커스텀 프롬프트문과 CSV 데이터가 결합되어 완벽히 복사되었습니다! 🌅🦌");
        }

        function downloadMorningResetGuide() {
            if(!RAW_MEMORY_CSV_BUFFER) return alert("추출된 CSV 데이터가 없습니다. 먼저 [칼럼&데이터 추출]을 완료해 주세요!");
            
            const selectId = document.getElementById('export-prompt-select').value;
            let basePrompt = "쵸파, 프로젝트 히스토리를 리셋하고, 이번 프롬프트에서 알려주는 CSV코드 형태의 프로젝트 히스토리를 기준으로 오늘의 코칭을 시작하자";
            
            if(selectId && PROMPT_CACHE_MAP[selectId]) {
                basePrompt = PROMPT_CACHE_MAP[selectId].text;
            }
            
            const fullMorningPrompt = `${basePrompt}\n\n${RAW_MEMORY_CSV_BUFFER}`;
            const todayStr = new Date().toISOString().split('T')[0];
            triggerFileDownload(fullMorningPrompt, `chopper_morning_reset_${todayStr}.txt`);
        }

        function executeOffscreenCopy(text) {
            const tempTextArea = document.createElement('textarea');
            tempTextArea.style.position = 'fixed';
            tempTextArea.style.top = '-9999px';
            tempTextArea.value = text;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            tempTextArea.setSelectionRange(0, 999999);
            document.execCommand('copy');
            document.body.removeChild(tempTextArea);
        }

        function triggerFileDownload(content, filename) {
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>TED DIET HUB - IMPORT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    <script src="../universe_core.js"></script>
    <style>
        /* 유효성 결과 창을 위한 에레강트 핑크 스타일 가니시 */
        .table-badge {
            display: inline-block;
            padding: 4px 10px;
            font-size: 0.72rem;
            font-weight: 800;
            border-radius: 6px;
            margin-right: 6px;
        }
        .validation-box {
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container" id="main-app" style="display:block;">
        <div class="text-center mb-3">
            <h4 style="color:var(--bp-pink); font-weight:900; cursor:pointer;" onclick="location.reload()">TED DIET HUB</h4>
        </div>
        
        <div id="global-nav" data-active="import"></div>

        <div class="hub-card">
            <h6 class="small fw-bold mb-2">CSV IMPORT (루카 데이터 입력)</h6>
            <textarea id="import-input" class="form-control csv-box mb-3" rows="12" placeholder="CSV 형식을 붙여넣으세요." oninput="window.detectImportInfo()"></textarea>
            
            <!-- 🔍 실시간 유효성 스캐너 렌더링 구역 -->
            <div id="import-tables-area" class="validation-box mb-3" style="display:none;"></div>
            
            <button class="btn-action w-100" onclick="processInsert()">데이터 최종 INSERT</button>
        </div>
    </div>

    <script>
        // 🔍 [상디 특제 리팩토링]: 붙여넣는 즉시 쵸파의 오타와 규격 오차를 잡아내는 실시간 신선도 검사 엔진[cite: 9, 11]
        function detectImportInfo() {
            const val = document.getElementById('import-input').value.trim(); 
            const area = document.getElementById('import-tables-area'); 
            
            if(!val) {
                area.innerHTML = "";
                area.style.display = 'none';
                return;
            }

            area.style.display = 'block';
            area.innerHTML = "";

            const headers = val.match(/\[(?:\d+|W\d+)\.\s[^\]]+\]/g); 
            const sections = val.split(/\[(?:\d+|W\d+)\.\s[^\]]+\]/);

            if(!headers) {
                area.innerHTML = `<div class="text-danger small fw-bold">⚠️ 올바른 형식이 아닙니다. 헤더 양식 [숫자. 이름] 규격을 맞춰줘 선장!</div>`;
                return;
            }

            let totalHtml = `<div class="mb-2 small fw-bold text-secondary">📊 실시간 재료 신선도(유효성) 검사 결과:</div>`;

            for(let i=0; i<headers.length; i++) {
                const tInfo = DIET_TABLES.find(t => headers[i].includes(t.name.split('.')[1]?.trim() || t.name.split(' ')[1]?.trim()));
                if(!tInfo) {
                    totalHtml += `<div class="mb-2 d-flex align-items-center"><span class="table-badge bg-secondary text-white">미등록 구역</span> <small class="text-muted">${headers[i]}</small></div>`;
                    continue;
                }

                const sectionContent = sections[i+1] ? sections[i+1].trim() : "";
                const lines = sectionContent.split('\n').filter(l => l.trim() !== "");

                if(lines.length < 1) {
                    totalHtml += `<div class="mb-2 d-flex align-items-center"><span class="table-badge bg-warning text-dark">${tInfo.name}</span> <small class="text-warning">⚠️ 데이터 컬럼 헤더가 비어있어!</small></div>`;
                    continue;
                }

                const csvCols = lines[0].split(',').map(c => c.trim());
                const rows = lines.slice(1);

                let isSectionValid = true;
                let warningReason = "";

                if (csvCols.length === 0 || csvCols[0] === "") {
                    isSectionValid = false;
                    warningReason = "컬럼 헤더명 파손";
                }

                // 🚀 행 단위 실시간 정밀 스캔 파이프라인 가동
                for(let r=0; r<rows.length; r++) {
                    const currentRowText = rows[r];
                    const cells = currentRowText.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

                    // 1. 문자열 "NULL" 테러 탐지 가이드[cite: 9]
                    if (currentRowText.toLowerCase().includes(',null,') || currentRowText.toLowerCase().endsWith(',null') || currentRowText.toLowerCase().startsWith('null,')) {
                        isSectionValid = false;
                        warningReason = `${r+1}번째 행에 금지된 문자 "NULL" 감지! 공백(,,)으로 처리해야 해!`;
                        break;
                    }

                    // 2. 컬럼별 데이터 형식 불일치 매커니즘 정밀 역추적[cite: 9]
                    for (let cIdx = 0; cIdx < csvCols.length; cIdx++) {
                        const colName = csvCols[cIdx];
                        let cellValue = cells[cIdx]?.trim() || "";

                        if(cellValue.startsWith('"') && cellValue.endsWith('"')) { 
                            cellValue = cellValue.substring(1, cellValue.length-1).replace(/""/g, '"'); 
                        }

                        if (cellValue) {
                            // 날짜 속성 감지 구간[cite: 9]
                            if (['log_date', 'plan_date', 'test_date', 'workout_date', 'created_at'].includes(colName)) {
                                if (colName === 'workout_date' || colName === 'created_at') {
                                    // timestamptz 형식 타이트 체크 (+09:00 또는 Z 오프셋 확인)[cite: 9]
                                    if (!cellValue.includes('T') || (!cellValue.includes('+09:00') && !cellValue.toLowerCase().endsWith('z'))) {
                                        isSectionValid = false;
                                        warningReason = `${r+1}번째 행 [${colName}] 타임존 오프셋(+09:00) 누락!`;
                                        break;
                                    }
                                } else {
                                    // 순수 date 형식 검증 (YYYY-MM-DD)[cite: 9]
                                    const dateRegex = /^\d{4}-\d{2}-\d{2}$/;
                                    if (!dateRegex.test(cellValue)) {
                                        isSectionValid = false;
                                        warningReason = `${r+1}번째 행 [${colName}] 날짜 규격(YYYY-MM-DD) 위반!`;
                                        break;
                                    }
                                }
                            }
                        }
                    }
                    if(!isSectionValid) break;
                }

                // 결과별 에레강트 UI 스위칭
                if (rows.length === 0) {
                    totalHtml += `<div class="mb-2 d-flex align-items-center"><span class="table-badge bg-info text-black">${tInfo.name}</span> <small class="text-info">(컬럼 뼈대 배치 완료 - 데이터 대기 중)</small></div>`;
                } else if (isSectionValid) {
                    totalHtml += `<div class="mb-2 d-flex align-items-center"><span class="table-badge bg-success text-white">${tInfo.name}</span> <small class="text-success">✅ 재료 신선도 최고! (총 ${rows.length}개 로그 적재 가능)</small></div>`;
                } else {
                    totalHtml += `<div class="mb-2 d-flex align-items-start flex-column"><div class="d-flex align-items-center"><span class="table-badge bg-danger text-white">${tInfo.name}</span> <b class="text-danger" style="font-size:0.75rem;">❌ 검사 통과 실패!</b></div><small class="text-warning mt-1" style="font-size:0.68rem; padding-left:4px;">->이유: ${warningReason}</small></div>`;
                }
            }
            area.innerHTML = totalHtml;
        }
        window.detectImportInfo = detectImportInfo;

        // 🛡️ 가상 트랜잭션 롤백 엔진이 장착된 안전한 일괄 INSERT 파이프라인
        async function processInsert() {
            const val = document.getElementById('import-input').value.trim(); 
            if(!val) return;

            const btn = document.querySelector('.btn-action');
            const originalText = btn.innerText;
            btn.innerText = "⏳ 지능형 트랜잭션 무결성 검증 중...";
            btn.disabled = true;

            let successfulInserts = [];

            try {
                const headers = val.match(/\[(?:\d+|W\d+)\.\s[^\]]+\]/g); 
                const sections = val.split(/\[(?:\d+|W\d+)\.\s[^\]]+\]/);
                if(!headers) {
                    alert("올바른 형식이 아닙니다.");
                    btn.innerText = originalText;
                    btn.disabled = false;
                    return;
                }
                
                for(let i=0; i<headers.length; i++) {
                    const tInfo = DIET_TABLES.find(t => headers[i].includes(t.name.split('.')[1]?.trim() || t.name.split(' ')[1]?.trim()));
                    if(!tInfo) continue;
                    const lines = sections[i+1].trim().split('\n');
                    if(lines.length < 2) continue;
                    const csvCols = lines[0].split(',').map(c => c.trim());
                    const csvData = lines.slice(1).map(l => {
                        const cells = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                        let rowObj = {};
                        csvCols.forEach((colName, idx) => {
                            if(!['id', 'created_at', 'updated_at'].includes(colName)) {
                                let cellValue = cells[idx]?.trim() || null;
                                if(cellValue && cellValue.startsWith('"') && cellValue.endsWith('"')) { 
                                    cellValue = cellValue.substring(1, cellValue.length-1).replace(/""/g, '"'); 
                                }
                                if(cellValue === "") cellValue = null;
                                rowObj[colName] = cellValue;
                            }
                        });
                        return rowObj;
                    });

                    const { data, error } = await _db.schema(tInfo.schema).from(tInfo.id).insert(csvData).select('id');
                    
                    if(error) {
                        throw { error, tableName: tInfo.name };
                    }

                    if (data && data.length > 0) {
                        successfulInserts.push({
                            schema: tInfo.schema,
                            tableId: tInfo.id,
                            name: tInfo.name,
                            ids: data.map(row => row.id)
                        });
                    }
                }

                alert("데이터 지능형 전 도메인 일괄 삽입 완료! 🔥"); 
                document.getElementById('import-input').value = ""; 
                window.detectImportInfo();

            } catch(e) {
                console.error("상디의 주방 트랜잭션 관제탑 에러 포착:", e);
                
                if (successfulInserts.length > 0) {
                    let rollbackSummary = successfulInserts.map(x => x.name).join(', ');
                    alert(`⚠️ [지옥의 중복 적재 차단막 트리거 발동]\n\n[${e.tableName || '알 수 없는 테이블'}] 구역 요리 도중 데이터 형식 오류가 감지되었다구!\n\n장부 오염을 막기 위해 이미 삽입 성공했던 앞선 테이블들(${rollbackSummary})의 새 데이터 레코드들을 흔적도 없이 깔끔하게 철회(자동 롤백) 처리했다 선장! 에러난 구역만 수정해서 다시 안전하게 들이밀어줘!`);
                    
                    for (let i = successfulInserts.length - 1; i >= 0; i--) {
                        const target = successfulInserts[i];
                        if (target.ids && target.ids.length > 0) {
                            await _db.schema(target.schema).from(target.tableId).delete().in('id', target.ids);
                        }
                    }
                } else {
                    alert("오류: " + (e.error?.message || e.message || "알 수 없는 형식 에러"));
                }
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

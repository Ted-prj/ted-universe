<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>TED DIET ADMIN - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body>
    <div id="auth-overlay">
        <div class="text-center w-75">
            <h4 style="color:var(--bp-pink); font-weight:900; letter-spacing:3px; margin-bottom: 20px;">DIET IDENTITY</h4>
            <input type="password" id="pw-input" class="form-control auth-input mx-auto" maxlength="4" inputmode="numeric" autofocus oninput="if(this.value.length===4) verify()">
            <div id="auth-msg" class="text-danger mt-3 small"></div>
        </div>
    </div>

    <script>
        window.onload = () => { document.getElementById('pw-input').focus(); };

        async function verify() {
            const pw = document.getElementById('pw-input').value;
            try {
                const { data, error } = await _db.from('settings').select('value').eq('code', 'ACCESS_PW').single();
                if(error) throw error;
                
                if(data?.value === pw) {
                    // 로그인 성공 시 조회 및 수정 전용 대시보드로 이동!
                    window.location.href = "view.html";
                } else { 
                    document.getElementById('auth-msg').innerText = "WRONG PASSWORD"; 
                    document.getElementById('pw-input').value = ""; 
                }
            } catch (err) {
                console.error(err);
                document.getElementById('auth-msg').innerText = "DB 연결 실패";
            }
        }
    </script>
</body>
</html>

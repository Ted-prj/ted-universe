<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>TED DIET HUB - PROMPT MANAGER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    <style>
        /* 💖 개조: 눈에 거슬리던 민트 그린을 완전히 소탕하고 블랙핑크 고유 핑크 보더 시스템 연동 */
        .pink-accent-border {
            border: 1px solid var(--bp-pink) !important;
        }
        .btn-pink-custom {
            background: var(--bp-pink);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 900;
            padding: 8px 14px;
            font-size: 0.78rem;
            transition: 0.2s;
        }
        .btn-pink-custom:hover {
            background: var(--neon-pink);
            color: #fff;
        }
        .prompt-card-unit {
            background: #161616;
            border: 1px solid #252525;
            border-left: 4px solid var(--bp-pink);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
        }
    </style>
    <!-- 🌌 전 우주 공통 SSO 인증 관제탑 탑재 -->
    <script src="../universe_core.js"></script>
</head>
<body>
    <div class="container" id="main-app" style="display:block;">
        <div class="text-center mb-3">
            <h4 style="color:var(--bp-pink); font-weight:900; cursor:pointer;" onclick="location.reload()">TED DIET HUB</h4>
        </div>
        
        <!-- 📱 하단 공통 네비게이션이 렌더링될 타깃 구조체 -->
        <div id="global-nav" data-active="prompt"></div>

        <!-- 프롬프트 등록 및 수정 관제소 -->
        <div class="hub-card">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="small fw-bold mb-0" id="form-work-title" style="color:var(--bp-pink);">📝 NEW AI PROMPT REGISTER</h6>
                <button class="btn btn-xs btn-outline-secondary" style="font-size:0.65rem;" onclick="clearPromptForm()">입력창 리셋</button>
            </div>
            
            <input type="hidden" id="form-prompt-id">
            
            <div class="mb-2">
                <label class="label-small text-dim mb-1">프롬프트 단축 제목</label>
                <input type="text" id="form-prompt-title" class="form-control form-control-sm bg-dark text-white border-secondary" placeholder="예: 아침 쵸파 모닝 리셋용">
            </div>
            
            <div class="mb-2">
                <label class="label-small text-dim mb-1">상세 설명</label>
                <input type="text" id="form-prompt-desc" class="form-control form-control-sm bg-dark text-white border-secondary" placeholder="어떤 전략 유도용 프롬프트인지 메모">
            </div>
            
            <div class="mb-3">
                <label class="label-small text-dim mb-1">AI 지시문 본문 (Prompt Text)</label>
                <textarea id="form-prompt-text" class="form-control csv-box" rows="5" placeholder="쵸파한테 던질 명령어 템플릿을 입력하세요."></textarea>
            </div>
            
            <button id="btn-submit-action" class="btn-pink-custom w-100" onclick="commitPromptForm()">AI 프롬프트 마스터 저장 💾</button>
        </div>

        <!-- 실시간 적재된 프롬프트 인벤토리 리스트 -->
        <div class="hub-card">
            <h6 class="small fw-bold mb-3" style="color: var(--bp-pink);">📋 SAVED PROMPT INVENTORY</h6>
            <div id="prompt-inventory-target"><p class="text-center opacity-50 my-4">로딩 중...</p></div>
        </div>
    </div>

    <script>
        let LIVE_PROMPT_LIST = [];

        window.onload = () => {
            loadPromptInventory();
        };

        async function loadPromptInventory() {
            const container = document.getElementById('prompt-inventory-target');
            try {
                const { data, error } = await _db.schema('diet').from('saved_prompts').select('*').order('title');
                if (error) throw error;
                LIVE_PROMPT_LIST = data || [];
                
                if(LIVE_PROMPT_LIST.length === 0) {
                    container.innerHTML = '<p class="text-center opacity-50 py-4 font-mono small">저장된 AI 지시문이 없습니다.</p>';
                    return;
                }
                
                container.innerHTML = LIVE_PROMPT_LIST.map(p => `
                    <div class="prompt-card-unit">
                        <div class="d-flex justify-content-between align-items-start mb-1 flex-wrap gap-2">
                            <b style="font-size:0.85rem; color:#fff;">${p.title}</b>
                            <div class="d-flex gap-1">
                                <button class="btn btn-sm btn-outline-light py-0 px-2" style="font-size:0.65rem;" onclick="setupEditMode(${p.id})">수정</button>
                                <button class="btn btn-sm btn-outline-danger py-0 px-2" style="font-size:0.65rem; border-color:rgba(220,53,69,0.4);" onclick="deletePromptUnit(${p.id})">삭제</button>
                            </div>
                        </div>
                        <p class="small text-dim mb-2" style="font-size:0.7rem; color:#888;">${p.description || '지정된 설명 메모가 없습니다'}</p>
                        <div style="background:#0a0a0a; padding:10px; border-radius:10px; font-size:0.68rem; color:var(--bp-pink); font-family:monospace; white-space:pre-wrap; max-height:100px; overflow-y:auto; border:1px solid #222;">${p.prompt_text}</div>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = `<p class="text-danger small py-3">로드 에러: ${e.message}</p>`;
            }
        }

        function setupEditMode(id) {
            const target = LIVE_PROMPT_LIST.find(p => p.id === id);
            if(!target) return;
            
            document.getElementById('form-prompt-id').value = target.id;
            document.getElementById('form-prompt-title').value = target.title;
            document.getElementById('form-prompt-desc').value = target.description || '';
            document.getElementById('form-prompt-text').value = target.prompt_text;
            
            document.getElementById('form-work-title').innerText = "🔄 EDIT AI PROMPT REGULATION";
            document.getElementById('form-work-title').style.color = "var(--neon-pink)";
            document.getElementById('btn-submit-action').innerText = "마스터 프롬프트 업데이트 ⚙️";
            document.getElementById('btn-submit-action').className = "btn-action w-100";
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function clearPromptForm() {
            document.getElementById('form-prompt-id').value = "";
            document.getElementById('form-prompt-title').value = "";
            document.getElementById('form-prompt-desc').value = "";
            document.getElementById('form-prompt-text').value = "";
            
            document.getElementById('form-work-title').innerText = "📝 NEW AI PROMPT REGISTER";
            document.getElementById('form-work-title').style.color = "var(--bp-pink)";
            document.getElementById('btn-submit-action').innerText = "AI 프롬프트 마스터 저장 💾";
            document.getElementById('btn-submit-action').className = "btn-pink-custom w-100";
        }

        async function commitPromptForm() {
            const id = document.getElementById('form-prompt-id').value;
            const title = document.getElementById('form-prompt-title').value.trim();
            const description = document.getElementById('form-prompt-desc').value.trim();
            const prompt_text = document.getElementById('form-prompt-text').value.trim();
            
            if(!title || !prompt_text) return alert("프롬프트 제목과 본문 지시문은 필수 입력 사항입니다!");
            
            const payload = { title, description, prompt_text };
            try {
                if(id) {
                    const { error } = await _db.schema('diet').from('saved_prompts').update(payload).eq('id', id);
                    if(error) throw error;
                    alert("프롬프트 규칙이 성공적으로 갱신되었습니다! ⚙️");
                } else {
                    const { error } = await _db.schema('diet').from('saved_prompts').insert([payload]);
                    if(error) throw error;
                    alert("새로운 프롬프트 치트키가 아카이브에 적재되었습니다! 💾");
                }
                clearPromptForm();
                loadPromptInventory();
            } catch (e) {
                alert("트랜잭션 실패: " + e.message);
            }
        }

        async function deletePromptUnit(id) {
            if(!confirm("정말 이 프롬프트 지시문을 아카이브에서 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.")) return;
            try {
                const { error } = await _db.schema('diet').from('saved_prompts').delete().eq('id', id);
                if(error) throw error;
                alert("삭제 완료되었습니다.");
                if(document.getElementById('form-prompt-id').value == id) clearPromptForm();
                loadPromptInventory();
            } catch (e) {
                alert("삭제 실패: " + e.message);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Blackpink Money - Identity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body data-page="LOGIN">
    <div id="auth-overlay">
        <div class="auth-box">
            <h4 style="color: var(--bp-pink); font-weight: 900; letter-spacing: 3px;">IDENTITY</h4>
            <input type="password" id="access-pw-input" class="form-control auth-input" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" autofocus oninput="handleAutoVerify(this)">
            <div id="auth-msg" style="font-size: 0.7rem; color: #844; margin-top: 10px; font-weight: 800; min-height: 15px;"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>

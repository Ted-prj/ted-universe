<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Blackpink Money - OUT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <script src="config.js"></script>
    <script src="../universe_core.js"></script>
</head>
<body data-page="OUT">
    <div class="container mt-2">
        <div class="text-center mb-3">
            <h4 style="color: var(--bp-pink); font-weight: 900; letter-spacing: 3px; cursor:pointer;" onclick="location.reload()">TED'S FINANCE</h4>
        </div>
        
        <div id="global-nav" data-active="OUT"></div>

        <div class="tab-content pt-2">
            <div class="tab-pane fade show active">
                <button class="btn-pink" onclick="addNewCard('OUT')">+ NEW EXPENSE</button>
                <div class="slim-filter"><input type="date" id="out-start"><input type="date" id="out-end"><button class="btn-query" onclick="loadHistoryTab('OUT', true)">조회</button></div>
                <div id="out-total-area" class="total-summary-row"></div>
                <div id="out-new-card-area"></div>
                <div id="out-history-container"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>

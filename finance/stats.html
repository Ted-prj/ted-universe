<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Blackpink Money - STATS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <script src="config.js"></script>
    <script src="../universe_core.js"></script>
</head>
<body data-page="STATS">
    <div class="container mt-2">
        <div class="text-center mb-3">
            <h4 style="color: var(--bp-pink); font-weight: 900; letter-spacing: 3px; cursor:pointer;" onclick="location.reload()">TED'S FINANCE</h4>
        </div>
        
        <ul class="nav nav-pills nav-fill" id="mainTab">
            <li class="nav-item"><a class="nav-link" href="out.html">OUT</a></li>
            <li class="nav-item"><a class="nav-link" href="in.html">IN</a></li>
            <li class="nav-item"><a class="nav-link" href="move.html">MOVE</a></li>
            <li class="nav-item"><a class="nav-link" href="assets.html">ASSETS</a></li>
            <li class="nav-item"><a class="nav-link active" href="stats.html">STATS</a></li>
        </ul>

        <div class="tab-content pt-2">
            <div class="tab-pane fade show active">
                <div class="slim-filter">
                    <span style="font-size: 0.65rem; color: var(--bp-pink); font-weight: 900; margin-left: 5px;">MONTH</span>
                    <input type="month" id="stats-month" onchange="loadStats()">
                    <button class="btn-query" onclick="loadStats()">조회</button>
                </div>
                <div class="stats-stack" id="stats-summary-area"></div>
                <div id="db-sections">
                    <div class="section-header" onclick="toggleStatSection('section-income')" style="background:#111; border:1px solid #333; border-left:4px solid var(--bp-pink); padding:16px 20px; border-radius:18px; display:flex; justify-content:space-between; margin-top:15px; cursor:pointer;"><span style="font-size:0.85rem; font-weight:900;">INCOME STATUS</span><span>▼</span></div><div id="section-income" class="expand-container"></div>
                    <div class="section-header" onclick="toggleStatSection('section-asset')" style="background:#111; border:1px solid #333; border-left:4px solid var(--bp-pink); padding:16px 20px; border-radius:18px; display:flex; justify-content:space-between; margin-top:15px; cursor:pointer;"><span style="font-size:0.85rem; font-weight:900;">ASSET BUILDING</span><span>▼</span></div><div id="section-asset" class="expand-container"></div>
                    <div class="section-header" onclick="toggleStatSection('section-expense')" style="background:#111; border:1px solid #333; border-left:4px solid var(--bp-pink); padding:16px 20px; border-radius:18px; display:flex; justify-content:space-between; margin-top:15px; cursor:pointer;"><span style="font-size:0.85rem; font-weight:900;">EXPENSE STATUS</span><span>▼</span></div><div id="section-expense" class="expand-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>

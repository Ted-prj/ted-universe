<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>TED'S UNIVERSE - Gateway</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { 
            --bg-black: #000; 
            --card-bg: #111; 
            --text-dim: #999;
        }
        body { 
            background-color: var(--bg-black); 
            color: #fff; 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .gateway-title {
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 6px;
            color: #fff;
            margin-bottom: 40px;
            text-align: center;
            opacity: 0.9;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- 확장형 애니메이션 카드 --- */
        .app-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid #222;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            position: relative;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 18px;
            pointer-events: none;
        }

        .app-icon { font-size: 2.2rem; line-height: 1; }
        .app-info { display: flex; flex-direction: column; }
        .app-title { font-size: 1.4rem; font-weight: 900; letter-spacing: 2px; }
        .app-desc { font-size: 0.75rem; color: var(--text-dim); font-weight: 700; margin-top: 2px; }

        .gate-expand-zone {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.4s ease-in-out;
            text-align: center;
        }

        .app-card.active {
            background: #0a0a0a;
            border-color: #333;
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .app-card.active .gate-expand-zone {
            max-height: 150px;
            opacity: 1;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #222;
        }

        .pass-digit-input {
            width: 100%;
            max-width: 220px;
            background: #000 !important;
            border: 2px solid #333 !important;
            color: #fff !important;
            text-align: center;
            font-size: 1.5rem;
            letter-spacing: 12px;
            margin: 0 auto;
            border-radius: 16px;
            padding: 10px;
            font-weight: 900;
            
            /* 🔒 PWA 모드 전용 특수 마스킹 스트림 (사파리/크롬 공용 교란 작전) */
            -webkit-text-security: disc !important;
            text-security: disc !important;
        }
        
        .pass-digit-input:focus { outline: none; box-shadow: none !important; }

        .gate-status-msg {
            font-size: 0.75rem;
            font-weight: 800;
            margin-top: 12px;
            min-height: 18px;
        }
        .msg-error { color: #ff4d4d; }
        .msg-loading { color: var(--text-dim); animation: pulse 1.5s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <!-- 🎯 [PWA 긴급 조치] 대시보드 전체 스캔을 유도하던 유령 비밀번호 미끼 레이어 완전 박멸! -->

    <div class="gateway-title">TED'S UNIVERSE</div>

    <div class="app-container" id="app-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="gateway_config.js"></script>
    <script>
        const SUPABASE_URL = 'https://vaamifqzjsrflmprihgv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhYW1pZnF6anNyZmxtcHJpaGd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzODc2NzksImV4cCI6MjA5MTk2MzY3OX0.qUUs3aoWQMEVjTQkYTZtA8CMjMF_MrgBFa4UfiiEWzI';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('app-container');
            
            container.innerHTML = GATEWAY_APPS.map(app => `
                <div class="app-card" id="card-${app.id}" onclick="activateApp('${app.id}')" style="border-left: 6px solid ${app.color};">
                    <div class="card-header">
                        <div class="app-icon">${app.icon}</div>
                        <div class="app-info">
                            <div class="app-title" style="color: ${app.color};">${app.title}</div>
                            <div class="app-desc">${app.desc}</div>
                        </div>
                    </div>
                    <div class="gate-expand-zone" onclick="event.stopPropagation()">
                        <!-- ⚙️ [PWA 무결성 패치] type="text" + inputmode="numeric" + name="safe_code" 조합으로 변경하여 
                             홈 화면 앱 버전 OS 레이어의 오토필 스캐너를 완벽하게 무력화 시킵니다. -->
                        <input type="text" class="form-control pass-digit-input" 
                               id="code-${app.id}" name="safe_code_digit" data-id="${app.id}" 
                               maxlength="4" inputmode="numeric"
                               autocomplete="off" autocorrect="off" autocapitalize="none"
                               oninput="handlePinInput(this)">
                        <div class="gate-status-msg" id="msg-${app.id}"></div>
                    </div>
                </div>
            `).join('');
        });

        function activateApp(appId) {
            document.querySelectorAll('.app-card').forEach(card => {
                const currentId = card.id.replace('card-', '');
                if (currentId !== appId) {
                    card.classList.remove('active');
                    const input = document.getElementById(`code-${currentId}`);
                    if(input) input.value = '';
                    const msg = document.getElementById(`msg-${currentId}`);
                    if(msg) { msg.innerText = ''; msg.className = 'gate-status-msg'; }
                }
            });

            const targetCard = document.getElementById(`card-${appId}`);
            if (!targetCard.classList.contains('active')) {
                targetCard.classList.add('active');
                
                const app = GATEWAY_APPS.find(a => a.id === appId);
                const input = document.getElementById(`code-${appId}`);
                if (input) {
                    input.onfocus = () => { input.style.borderColor = app.color; input.style.color = app.color; };
                    setTimeout(() => input.focus(), 350);
                }
            }
        }

        function handlePinInput(inputEl) {
            // 오직 숫자만 남기고 걸러내는 실시간 보정 필터 추가
            inputEl.value = inputEl.value.replace(/[^0-9]/g, '');
            
            if (inputEl.value.length === 4) {
                inputEl.blur();
                verifyAppAccess(inputEl.dataset.id, inputEl.value);
            }
        }

        async function verifyAppAccess(appId, pin) {
            const msgEl = document.getElementById(`msg-${appId}`);
            const inputEl = document.getElementById(`code-${appId}`);
            const app = GATEWAY_APPS.find(a => a.id === appId);
            
            msgEl.className = 'gate-status-msg msg-loading';
            msgEl.innerText = "CONFIRMING...";

            try {
                const { data, error } = await _supabase.from('settings').select('value').eq('code', 'ACCESS_PW').single();
                if (error) throw error;
                
                if (data.value === pin) {
                    msgEl.innerText = "VALID CODE";
                    msgEl.style.color = app.color;
                    
                    sessionStorage.setItem(app.sessionKey, 'true');
                    setTimeout(() => location.href = app.targetUrl, 300);
                } else {
                    throw new Error("INVALID");
                }
            } catch (err) {
                msgEl.className = 'gate-status-msg msg-error';
                msgEl.innerText = "DENIED";
                setTimeout(() => {
                    inputEl.value = "";
                    msgEl.innerText = "";
                    inputEl.focus();
                }, 1000);
            }
        }
    </script>
</body>
</html>

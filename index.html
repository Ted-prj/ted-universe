<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>TED'S UNIVERSE - Gateway</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { 
            --bp-pink: rgb(232, 142, 163); 
            --diet-mint: #20c997; 
            --workout-neon: #ff6b6b;
            --bg-black: #000; 
            --card-bg: #111; 
            --text-dim: #999;
        }
        body { 
            background-color: var(--bg-black); 
            color: #fff; 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .gateway-title {
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 6px;
            color: #fff;
            margin-bottom: 40px;
            text-align: center;
            opacity: 0.9;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- 확장형 앱 카드 --- */
        .app-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid #222;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            position: relative;
        }
        
        .card-finance { border-left: 6px solid var(--bp-pink); }
        .card-diet { border-left: 6px solid var(--diet-mint); }
        .card-workout { border-left: 6px solid var(--workout-neon); }

        .card-header {
            display: flex;
            align-items: center;
            gap: 18px;
            pointer-events: none;
        }

        .app-icon { font-size: 2.2rem; line-height: 1; }
        .app-info { display: flex; flex-direction: column; }
        .app-title { font-size: 1.4rem; font-weight: 900; letter-spacing: 2px; }
        .app-desc { font-size: 0.75rem; color: var(--text-dim); font-weight: 700; margin-top: 2px; }

        .auth-section {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.4s ease-in-out;
            text-align: center;
        }

        .app-card.active {
            background: #0a0a0a;
            border-color: #333;
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .app-card.active .auth-section {
            max-height: 150px;
            opacity: 1;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #222;
        }

        .auth-input {
            width: 100%;
            max-width: 220px;
            background: #000 !important;
            border: 2px solid #333 !important;
            color: #fff !important;
            text-align: center;
            font-size: 1.5rem;
            letter-spacing: 12px;
            margin: 0 auto;
            border-radius: 16px;
            padding: 10px;
            font-weight: 900;
        }
        
        .auth-input:focus { outline: none; box-shadow: none !important; }

        .card-finance.active .auth-input:focus { border-color: var(--bp-pink) !important; color: var(--bp-pink) !important; }
        .card-diet.active .auth-input:focus { border-color: var(--diet-mint) !important; color: var(--diet-mint) !important; }
        .card-workout.active .auth-input:focus { border-color: var(--workout-neon) !important; color: var(--workout-neon) !important; }

        .auth-msg {
            font-size: 0.75rem;
            font-weight: 800;
            margin-top: 12px;
            min-height: 18px;
        }
        .msg-error { color: #ff4d4d; }
        .msg-loading { color: var(--text-dim); animation: pulse 1.5s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="gateway-title">TED'S UNIVERSE</div>

    <div class="app-container">
        
        <!-- 1. FINANCE (Nami) -->
        <div class="app-card card-finance" onclick="activateApp('FINANCE', this)">
            <div class="card-header">
                <div class="app-icon">🖤</div>
                <div class="app-info">
                    <div class="app-title" style="color: var(--bp-pink);">FINANCE</div>
                    <div class="app-desc">자산 및 가계부 관리 (by Nami)</div>
                </div>
            </div>
            <div class="auth-section" onclick="event.stopPropagation()">
                <input type="password" class="form-control auth-input" data-app="FINANCE" maxlength="4" inputmode="numeric" pattern="[0-9]*" oninput="handlePinInput(this)">
                <div class="auth-msg"></div>
            </div>
        </div>

        <!-- 2. DIET (Sanji) -->
        <div class="app-card card-diet" onclick="activateApp('DIET', this)">
            <div class="card-header">
                <div class="app-icon">🥗</div>
                <div class="app-info">
                    <div class="app-title" style="color: var(--diet-mint);">DIET</div>
                    <div class="app-desc">식단 및 체중 관리 (by Sanji)</div>
                </div>
            </div>
            <div class="auth-section" onclick="event.stopPropagation()">
                <input type="password" class="form-control auth-input" data-app="DIET" maxlength="4" inputmode="numeric" pattern="[0-9]*" oninput="handlePinInput(this)">
                <div class="auth-msg"></div>
            </div>
        </div>

        <!-- 3. WORKOUT (Robin) -->
        <div class="app-card card-workout" onclick="activateApp('WORKOUT', this)">
            <div class="card-header">
                <div class="app-icon">💪</div>
                <div class="app-info">
                    <div class="app-title" style="color: var(--workout-neon);">WORKOUT</div>
                    <div class="app-desc">루틴 및 운동 기록 (by Robin)</div>
                </div>
            </div>
            <div class="auth-section" onclick="event.stopPropagation()">
                <input type="password" class="form-control auth-input" data-app="WORKOUT" maxlength="4" inputmode="numeric" pattern="[0-9]*" oninput="handlePinInput(this)">
                <div class="auth-msg"></div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase 초기화 (기본 public 스키마를 바라봅니다)
        const SUPABASE_URL = 'https://vaamifqzjsrflmprihgv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhYW1pZnF6anNyZmxtcHJpaGd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzODc2NzksImV4cCI6MjA5MTk2MzY3OX0.qUUs3aoWQMEVjTQkYTZtA8CMjMF_MrgBFa4UfiiEWzI';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function activateApp(appName, cardElement) {
            document.querySelectorAll('.app-card').forEach(card => {
                if (card !== cardElement) {
                    card.classList.remove('active');
                    const input = card.querySelector('.auth-input');
                    input.value = '';
                    card.querySelector('.auth-msg').innerText = '';
                    card.querySelector('.auth-msg').className = 'auth-msg';
                }
            });

            if (!cardElement.classList.contains('active')) {
                cardElement.classList.add('active');
                setTimeout(() => {
                    cardElement.querySelector('.auth-input').focus();
                }, 350);
            }
        }

        function handlePinInput(inputEl) {
            if (inputEl.value.length === 4) {
                inputEl.blur();
                verifyAppAccess(inputEl.dataset.app, inputEl.value, inputEl.nextElementSibling, inputEl);
            }
        }

        // 중앙 집중형 원패스(One-Pass) 라우팅 로직
        async function verifyAppAccess(appName, pin, msgEl, inputEl) {
            msgEl.className = 'auth-msg msg-loading';
            msgEl.innerText = "VERIFYING...";

            try {
                // public 스키마에서 공통 비밀번호 검증
                const { data, error } = await _supabase.from('settings').select('value').eq('code', 'ACCESS_PW').single();
                if (error) throw error;
                
                if (data.value === pin) {
                    msgEl.innerText = "ACCESS GRANTED";
                    
                    if (appName === 'FINANCE') {
                        sessionStorage.setItem('is_auth', 'true'); // 나미 앱 세션
                        msgEl.style.color = "var(--bp-pink)";
                        setTimeout(() => location.href = 'finance/out.html', 300); // 메인으로 직행!
                        
                    } else if (appName === 'DIET') {
                        // 상디 앱의 경우 특별한 세션키 명시가 없었으므로 범용 세션 저장
                        sessionStorage.setItem('diet_auth', 'true'); 
                        msgEl.style.color = "var(--diet-mint)";
                        // diet/index.html 건너뛰고 바로 export.html로 직행!
                        setTimeout(() => location.href = 'diet/export.html', 300); 
                        
                    } else if (appName === 'WORKOUT') {
                        // 로빈 앱이 요구하는 정확한 세션키 발급!
                        sessionStorage.setItem('workout_auth', 'true'); 
                        msgEl.style.color = "var(--workout-neon)";
                        // workout/index.html 건너뛰고 바로 workout.html로 직행!
                        setTimeout(() => location.href = 'workout/workout.html', 300); 
                    }
                } else {
                    throw new Error("WRONG PASSWORD");
                }
            } catch (err) {
                msgEl.className = 'auth-msg msg-error';
                msgEl.innerText = "WRONG PASSWORD";
                setTimeout(() => {
                    inputEl.value = "";
                    msgEl.innerText = "";
                    inputEl.focus();
                }, 1000);
            }
        }
    </script>
</body>
</html>

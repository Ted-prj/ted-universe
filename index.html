<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>TED'S UNIVERSE - Gateway</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { 
            --bp-pink: rgb(232, 142, 163); 
            --diet-mint: #20c997; 
            --workout-neon: #ff6b6b;
            --bg-black: #000; 
            --card-bg: #111; 
            --text-dim: #999;
        }
        body { 
            background-color: var(--bg-black); 
            color: #fff; 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .gateway-title {
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 6px;
            color: #fff;
            margin-bottom: 40px;
            text-align: center;
            opacity: 0.9;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- 확장형 앱 카드 --- */
        .app-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid #222;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            position: relative;
        }
        
        /* 각 프로젝트별 고유 컬러 브랜딩 */
        .card-finance { border-left: 6px solid var(--bp-pink); }
        .card-diet { border-left: 6px solid var(--diet-mint); }
        .card-workout { border-left: 6px solid var(--workout-neon); }

        .card-header {
            display: flex;
            align-items: center;
            gap: 18px;
            pointer-events: none; /* 클릭 이벤트 중복 방지 */
        }

        .app-icon { font-size: 2.2rem; line-height: 1; }
        .app-info { display: flex; flex-direction: column; }
        .app-title { font-size: 1.4rem; font-weight: 900; letter-spacing: 2px; }
        .app-desc { font-size: 0.75rem; color: var(--text-dim); font-weight: 700; margin-top: 2px; }

        /* --- 인라인 인증 영역 (기본 숨김) --- */
        .auth-section {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.4s ease-in-out;
            text-align: center;
        }

        .app-card.active {
            background: #0a0a0a;
            border-color: #333;
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .app-card.active .auth-section {
            max-height: 150px; /* 입력창이 열릴 충분한 높이 */
            opacity: 1;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #222;
        }

        .auth-input {
            width: 100%;
            max-width: 220px;
            background: #000 !important;
            border: 2px solid #333 !important;
            color: #fff !important;
            text-align: center;
            font-size: 1.5rem;
            letter-spacing: 12px;
            margin: 0 auto;
            border-radius: 16px;
            padding: 10px;
            font-weight: 900;
            transition: border-color 0.3s;
        }
        
        .auth-input:focus { outline: none; box-shadow: none !important; }

        /* 활성화 시 입력창 테두리 컬러 동기화 */
        .card-finance.active .auth-input:focus { border-color: var(--bp-pink) !important; color: var(--bp-pink) !important; }
        .card-diet.active .auth-input:focus { border-color: var(--diet-mint) !important; color: var(--diet-mint) !important; }
        .card-workout.active .auth-input:focus { border-color: var(--workout-neon) !important; color: var(--workout-neon) !important; }

        .auth-msg {
            font-size: 0.75rem;
            font-weight: 800;
            margin-top: 12px;
            min-height: 18px;
        }
        .msg-error { color: #ff4d4d; }
        .msg-loading { color: var(--text-dim); animation: pulse 1.5s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="gateway-title">TED'S UNIVERSE</div>

    <div class="app-container">
        
        <!-- 1. FINANCE (Nami) -->
        <div class="app-card card-finance" onclick="activateApp('FINANCE', this)">
            <div class="card-header">
                <div class="app-icon">🖤</div>
                <div class="app-info">
                    <div class="app-title" style="color: var(--bp-pink);">FINANCE</div>
                    <div class="app-desc">자산 및 가계부 관리 (by Nami)</div>
                </div>
            </div>
            <div class="auth-section" onclick="event.stopPropagation()">
                <input type="password" class="form-control auth-input" data-app="FINANCE" maxlength="4" inputmode="numeric" pattern="[0-9]*" oninput="handlePinInput(this)">
                <div class="auth-msg"></div>
            </div>
        </div>

        <!-- 2. DIET (Sanji) -->
        <div class="app-card card-diet" onclick="activateApp('DIET', this)">
            <div class="card-header">
                <div class="app-icon">🥗</div>
                <div class="app-info">
                    <div class="app-title" style="color: var(--diet-mint);">DIET</div>
                    <div class="app-desc">식단 및 체중 관리 (by Sanji)</div>
                </div>
            </div>
            <div class="auth-section" onclick="event.stopPropagation()">
                <input type="password" class="form-control auth-input" data-app="DIET" maxlength="4" inputmode="numeric" pattern="[0-9]*" oninput="handlePinInput(this)">
                <div class="auth-msg"></div>
            </div>
        </div>

        <!-- 3. WORKOUT (Robin) -->
        <div class="app-card card-workout" onclick="activateApp('WORKOUT', this)">
            <div class="card-header">
                <div class="app-icon">💪</div>
                <div class="app-info">
                    <div class="app-title" style="color: var(--workout-neon);">WORKOUT</div>
                    <div class="app-desc">루틴 및 운동 기록 (by Robin)</div>
                </div>
            </div>
            <div class="auth-section" onclick="event.stopPropagation()">
                <input type="password" class="form-control auth-input" data-app="WORKOUT" maxlength="4" inputmode="numeric" pattern="[0-9]*" oninput="handlePinInput(this)">
                <div class="auth-msg"></div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase 통합 설정 (루트 레벨에서는 스키마를 고정하지 않고, API 호출 시 동적으로 스키마 지정)
        const SUPABASE_URL = 'https://vaamifqzjsrflmprihgv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhYW1pZnF6anNyZmxtcHJpaGd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzODc2NzksImV4cCI6MjA5MTk2MzY3OX0.qUUs3aoWQMEVjTQkYTZtA8CMjMF_MrgBFa4UfiiEWzI';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 카드 활성화 로직
        function activateApp(appName, cardElement) {
            // 다른 열려있는 카드들 모두 닫기 및 초기화
            document.querySelectorAll('.app-card').forEach(card => {
                if (card !== cardElement) {
                    card.classList.remove('active');
                    const input = card.querySelector('.auth-input');
                    input.value = '';
                    card.querySelector('.auth-msg').innerText = '';
                    card.querySelector('.auth-msg').className = 'auth-msg';
                }
            });

            // 현재 선택한 카드 열기
            if (!cardElement.classList.contains('active')) {
                cardElement.classList.add('active');
                
                // 트랜지션 애니메이션이 끝난 후 포커스 주입 (모바일 키보드 팝업)
                setTimeout(() => {
                    cardElement.querySelector('.auth-input').focus();
                }, 350);
            }
        }

        // 핀 번호 자동 감지 및 인증 라우터 호출
        function handlePinInput(inputEl) {
            if (inputEl.value.length === 4) {
                inputEl.blur(); // 키보드 숨기기
                verifyAppAccess(inputEl.dataset.app, inputEl.value, inputEl.nextElementSibling, inputEl);
            }
        }

        // 인증 로직 허브
        async function verifyAppAccess(appName, pin, msgEl, inputEl) {
            msgEl.className = 'auth-msg msg-loading';
            msgEl.innerText = "VERIFYING...";

            try {
                if (appName === 'FINANCE') {
                    // 🖤 나미의 Finance 스키마 인증 로직 (PostgreSQL Schema 지원 방식)
                    const { data, error } = await _supabase.schema('finance').from('settings').select('value').eq('code', 'ACCESS_PW').single();
                    if (error) throw error;
                    
                    if (data.value === pin) {
                        sessionStorage.setItem('is_auth', 'true');
                        msgEl.innerText = "ACCESS GRANTED";
                        msgEl.style.color = "var(--bp-pink)";
                        setTimeout(() => location.href = 'finance/out.html', 300);
                    } else {
                        throw new Error("WRONG PASSWORD");
                    }
                } 
                else if (appName === 'DIET') {
                    // 💚 상디(Sanji)의 Diet 인증 로직 위치
                    // 예: await _supabase.schema('diet').from('...')...
                    // 상디가 이 부분의 쿼리와 세션스토리지, 라우팅(location.href)을 채워 넣으면 됩니다!
                    
                    // [임시 하드코딩 테스트용 - 나중에 지우고 상디 로직으로 교체하세요]
                    if (pin === '0000') {
                        sessionStorage.setItem('is_auth_diet', 'true');
                        setTimeout(() => location.href = 'diet/index.html', 300);
                    } else throw new Error("WRONG PASSWORD");
                } 
                else if (appName === 'WORKOUT') {
                    // 🔥 로빈(Robin)의 Workout 인증 로직 위치
                    // 예: await _supabase.schema('workout').from('...')...
                    // 로빈이 이 부분의 쿼리와 세션스토리지, 라우팅(location.href)을 채워 넣으면 됩니다!

                    // [임시 하드코딩 테스트용 - 나중에 지우고 로빈 로직으로 교체하세요]
                    if (pin === '0000') {
                        sessionStorage.setItem('is_auth_workout', 'true');
                        setTimeout(() => location.href = 'workout/index.html', 300);
                    } else throw new Error("WRONG PASSWORD");
                }
            } catch (err) {
                msgEl.className = 'auth-msg msg-error';
                msgEl.innerText = "WRONG PASSWORD";
                setTimeout(() => {
                    inputEl.value = "";
                    msgEl.innerText = "";
                    inputEl.focus(); // 재입력을 위해 포커스 복원
                }, 1000);
            }
        }
    </script>
</body>
</html>

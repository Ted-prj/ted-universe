<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>IDENTITY - WORKOUT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="auth-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center;">
        <div class="text-center w-75">
            <h4 style="color:var(--bp-pink); font-weight:900; letter-spacing:3px; margin-bottom: 20px;">IDENTITY</h4>
            <input type="password" id="pw-input" class="form-control text-center mx-auto" 
                   style="max-width: 200px; font-size: 1.5rem; letter-spacing: 10px; background: #000 !important;" 
                   maxlength="4" autofocus inputmode="numeric" oninput="if(this.value.length===4) verify()">
            <div id="auth-msg" class="text-danger mt-3 small" style="font-weight: 800;"></div>
        </div>
    </div>

    <script src="supabase_config.js"></script>
    <script>
        async function verify() {
            const input = document.getElementById('pw-input');
            const { data } = await _db.from('settings').select('value').eq('code', 'ACCESS_PW').single();
            if(data?.value === input.value) {
                sessionStorage.setItem('workout_auth', 'true');
                window.location.href = 'workout.html';
            } else { 
                input.value = ""; 
                document.getElementById('auth-msg').innerText = "비밀번호 불일치"; 
            }
        }
    </script>
</body>
</html>

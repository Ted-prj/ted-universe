<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>SETTINGS - WORKOUT v5.4.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="../universe_core.js"></script>
</head>
<body style="background-color: var(--bp-black); color: white;">
    <div class="container-app">
        <div class="mgmt-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 style="color:var(--bp-pink); font-weight:900; margin:0;">⚙️ 공통 설정 관리 v5.4.0</h5>
                <button class="btn btn-sm btn-outline-light" onclick="loadSettings()">Refresh</button>
            </div>

            <div class="mb-4">
                <label class="label-small">1. 카테고리 선택/관리</label>
                <div class="d-flex gap-2 mb-2">
                    <select id="category-select" class="form-select" onchange="loadSettings()">
                        <option value="BODY_PART">BODY_PART</option>
                        <option value="EXERCISE_TYPE">EXERCISE_TYPE</option>
                        <option value="EQUIPMENT">EQUIPMENT</option>
                        <option value="WEIGHT_SUB_TYPE">WEIGHT_SUB_TYPE</option>
                        <option value="GRIP">GRIP</option>
                        <option value="LYING">LYING</option>
                    </select>
                </div>
                <p class="text-secondary" style="font-size:0.65rem;">⚠️ 명칭 수정 시 관계된 모든 운동 마스터 및 로그의 표기명이 실시간으로 자동 변경됩니다.</p>
            </div>

            <hr style="border-color: #333;">

            <div class="mb-4">
                <label class="label-small">2. 명칭(Name) 리스트 관리</label>
                <div class="input-group mb-3">
                    <input type="text" id="new-name-input" class="form-control" 
                           placeholder="새 명칭 (콤마로 벌크 추가 가능)" 
                           style="background:#1e1e1e; border:1px solid #333; color:white;">
                    <button class="btn-pink px-4" onclick="addSetting()" style="border-radius: 0 10px 10px 0;">등록</button>
                </div>

                <div id="setting-list-container" class="mt-3"></div>
            </div>
        </div>

        <div id="global-nav" data-active="workout"></div>
    </div>

    <script src="supabase_config.js"></script>
    <script>
        async function init() {
            await checkAuth(); 
            loadSettings();
        }

        // 설정 데이터 불러오기 및 수정/삭제 듀얼 제어 UI 렌더링
        async function loadSettings() {
            const category = document.getElementById('category-select').value;
            const container = document.getElementById('setting-list-container');
            container.innerHTML = '<div class="text-center py-3 text-secondary">불러오는 중...</div>';

            const { data, error } = await _db.schema('workout').from('settings')
                .select('*')
                .eq('category', category)
                .order('name');

            if(error) {
                if(error.status === 401) alert("인증이 만료되었습니다. 다시 로그인해주세요.");
                return console.error(error);
            }

            container.innerHTML = data.map(item => `
                <div id="setting-row-${item.id}" class="d-flex justify-content-between align-items-center mb-2 p-2" 
                     style="background:rgba(255,255,255,0.05); border-radius:10px; border:1px solid #222;">
                    <span style="font-size:0.9rem;">${item.name}</span>
                    <div class="d-flex gap-1">
                        <button class="btn btn-sm btn-outline-secondary" 
                                style="font-size:0.7rem; padding:2px 8px; border-color:rgba(255,255,255,0.2); color:#ccc;" 
                                onclick="editSettingInline(${item.id}, '${item.name.replace(/'/g, "\\'")}')">수정</button>
                        <button class="btn btn-sm btn-outline-danger" 
                                style="font-size:0.7rem; padding:2px 8px; border-color:rgba(220,53,69,0.5);" 
                                onclick="deleteSetting(${item.id})">삭제</button>
                    </div>
                </div>
            `).join('');
        }

        // 수정을 위한 인라인 인풋 폼 스위칭 제어 함수
        function editSettingInline(id, currentName) {
            const row = document.getElementById(`setting-row-${id}`);
            if (!row) return;
            row.innerHTML = `
                <div class="d-flex w-100 gap-2 align-items-center">
                    <input type="text" id="edit-input-${id}" class="form-control form-control-sm" value="${currentName}" 
                           style="background:#1e1e1e; border:1px solid var(--bp-pink); color:white; font-size:0.9rem;">
                    <button class="btn btn-sm btn-pink" style="font-size:0.7rem; padding:4px 10px; white-space:nowrap;" onclick="saveSettingUpdate(${id})">저장</button>
                    <button class="btn btn-sm btn-outline-light" style="font-size:0.7rem; padding:4px 10px; white-space:nowrap;" onclick="loadSettings()">취소</button>
                </div>
            `;
            document.getElementById(`edit-input-${id}`).focus();
        }

        // 인라인에서 수정된 설정 값을 Supabase DB에 실시간 업데이트 처리
        async function saveSettingUpdate(id) {
            const input = document.getElementById(`edit-input-${id}`);
            if (!input) return;
            const newName = input.value.trim();
            if (!newName) return alert("명칭을 입력하세요.");

            const { error } = await _db.schema('workout').from('settings')
                .update({ name: newName })
                .eq('id', id);

            if (error) {
                alert("수정 실패: " + error.message);
                return;
            }
            loadSettings();
        }

        async function addSetting() {
            const input = document.getElementById('new-name-input');
            const category = document.getElementById('category-select').value;
            const names = input.value.split(',').map(n => n.trim()).filter(n => n !== "");

            if (names.length === 0) return alert("추가할 명칭을 입력하세요.");

            const payload = names.map(name => ({ category, name }));

            const { error } = await _db.schema('workout').from('settings').insert(payload);

            if (error) {
                if(error.status === 401) {
                    alert("인증 에러: 로그인이 필요하거나 세션이 만료되었습니다.");
                } else {
                    alert("등록 실패: " + error.message);
                }
                return;
            }

            input.value = "";
            loadSettings();
        }

        async function deleteSetting(id) {
            if(!confirm("정말 삭제하시겠습니까?\n삭제 시 이 명칭을 참조하고 있던 운동 정보의 해당 필드가 빈 값(NULL)으로 초기화됩니다.")) return;

            const { error } = await _db.schema('workout').from('settings').delete().eq('id', id);

            if (error) return alert("삭제 실패: " + error.message);
            loadSettings();
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>BLACKPINK WORKOUT v5.4.8</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 스와이프 UI 스타일 */
        .swipe-wrapper { position: relative; overflow: hidden; border-radius: 12px; margin-bottom: 5px; }
        .swipe-del-bg { 
            position: absolute; right: -100%; top: 0; width: 100%; height: 100%; 
            background: linear-gradient(90deg, transparent, #ff2d55); 
            display: flex; align-items: center; justify-content: flex-end; 
            padding-right: 20px; color: white; font-weight: 900; z-index: 1; transition: 0.2s; 
        }
        .swipe-content { position: relative; z-index: 2; background: var(--bp-dark-gray); transition: 0.2s; }
        .ex-header-wrapper { border-radius: 18px 18px 0 0; }
        
        @keyframes fadeInCard {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .workout-card { 
            background: transparent; 
            border: none; 
            margin-bottom: 20px; 
            animation: fadeInCard 0.35s cubic-bezier(0.4, 0, 0.2, 1) both; 
            will-change: transform, opacity;
        }

        /* 운동 종목 순서 조정을 위한 블랙핑크 오버레이 팝업 스타일 */
        .reorder-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 4000; align-items: center; justify-content: center; padding: 20px; }
        .reorder-modal-card { background: #111; border: 2px solid #222; border-radius: 24px; padding: 20px; width: 100%; max-width: 450px; max-height: 80vh; display: flex; flex-direction: column; }
        .reorder-list-scroll { flex-grow: 1; overflow-y: auto; margin-bottom: 15px; padding-right: 5px; }
    </style>
</head>
<body>
    <div class="container-app">
        <div class="sticky-top-group">
            <div class="d-flex justify-content-between align-items-center">
                <select id="routine-select" class="form-select form-select-sm" style="width:115px;" onchange="handleRoutineChange(this.value)">
                    <option value="자유운동">자유운동</option>
                </select>
                <div class="d-flex gap-1">
                    <button type="button" class="btn-cancel" style="padding:6px 12px; font-size:0.75rem; border-radius:10px;" onclick="openReorderModal()">순서 변경</button>
                    <button type="button" class="btn-pink" style="padding:6px 14px; font-size:0.75rem;" onclick="toggleFinishArea()">운동 완료</button>
                </div>
            </div>
            <div id="progress-text" class="mt-3" style="font-size:0.7rem; font-weight:800; color:var(--bp-pink);">0 / 0 SAVED (0%)</div>
            <div class="progress-mini-bar"><div id="progress-fill" class="progress-fill"></div></div>
            
            <div id="session-input-area" style="display:none; margin-top:15px; border-top:1px solid #333; padding-top:15px;">
                <div class="row g-2 mb-2">
                    <div class="col-4"><label class="label-small">시간(분)</label><input type="number" id="s-duration" class="form-control form-control-sm" inputmode="numeric" pattern="[0-9]*"></div>
                    <div class="col-4"><label class="label-small">활동kcal</label><input type="number" id="s-active-cal" class="form-control form-control-sm" inputmode="numeric" pattern="[0-9]*"></div>
                    <div class="col-4"><label class="label-small">총kcal</label><input type="number" id="s-total-cal" class="form-control form-control-sm" inputmode="numeric" pattern="[0-9]*"></div>
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-4"><label class="label-small">평균심박</label><input type="number" id="s-avg-hr" class="form-control form-control-sm" inputmode="numeric" pattern="[0-9]*"></div>
                    <div class="col-4"><label class="label-small">최소심박</label><input type="number" id="s-min-hr" class="form-control form-control-sm" inputmode="numeric" pattern="[0-9]*"></div>
                    <div class="col-4"><label class="label-small">최대심박</label><input type="number" id="s-max-hr" class="form-control form-control-sm" inputmode="numeric" pattern="[0-9]*"></div>
                </div>
                <button class="btn-pink w-100" onclick="processFinalSave()">최종 로그 저장 & 리셋</button>
            </div>
        </div>

        <div id="workout-list-area"></div>

        <div class="quick-add-area">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <span style="font-weight:900; font-size:0.9rem; color:var(--bp-pink);">+ QUICK ADD</span>
                <div id="buwi-last-date" style="font-size:0.65rem; color:#888;"></div>
            </div>
            <div class="row g-2 mb-2">
                <div class="col-4"><label class="label-small">종류</label><select id="q-type" class="form-select form-select-sm" onchange="handleTypeChange(this.value)"></select></div>
                <div class="col-4" id="q-buwi-wrapper"><label class="label-small">부위</label><select id="q-buwi" class="form-select form-select-sm" onchange="handleBuwiChange(this.value)"></select></div>
                <div class="col-4" id="q-ex-wrapper"><label class="label-small">종목</label><select id="q-ex" class="form-select form-select-sm" onchange="loadQuickExStats(this.value)"></select></div>
            </div>
            <div id="q-stats-area" class="stats-box" style="display:none;">
                <div id="q-best-info" class="mb-1"></div>
                <div id="q-recent-configs"></div>
            </div>
            <div id="q-inputs" class="row g-2 mb-3"></div>
            <div class="mb-3">
                <label class="label-small">수퍼세트 설정</label>
                <select id="q-superset" class="form-select form-select-sm" onchange="handleSupersetSelectChange(this.value)"><option value="">N/A</option></select>
            </div>
            <button class="btn-pink w-100" onclick="addWorkoutFromQuick()">리스트 추가하기</button>
        </div>

        <div id="reorder-overlay" class="reorder-overlay">
            <div class="reorder-modal-card">
                <h5 class="fw-bold mb-1" style="color:var(--bp-pink);">🔄 운동 순서 변경</h5>
                <p class="text-secondary mb-3" style="font-size:0.7rem;">🔼/🔽 버튼을 눌러 종목 순서를 변경하세요.</p>
                <div id="reorder-list-container" class="reorder-list-scroll"></div>
                <div class="d-flex gap-2">
                    <button class="btn-pink w-100 py-2 fw-bold" onclick="saveNewOrder()">순서 저장</button>
                    <button class="btn btn-outline-light w-100 py-2" onclick="closeReorderModal()">취소</button>
                </div>
            </div>
        </div>

        <div id="global-nav" data-active="workout"></div>
    </div>

    <script src="supabase_config.js"></script>
    <script>
        checkAuth();
        let EX_MASTER = [];
        let SETTINGS_CODE = { 'EXERCISE_TYPE':[], 'BODY_PART':[], 'EQUIPMENT':[], 'WEIGHT_SUB_TYPE':[], 'GRIP':[], 'LYING':[] };
        let SETTINGS_LOOKUP = {};
        let ACTIVE_SETS = [];
        let touchStartX = 0;

        async function init() {
            const { data: sData } = await _db.schema('workout').from('settings').select('*');
            if (sData) {
                sData.forEach(s => { 
                    SETTINGS_LOOKUP[s.id] = s.name;
                    if(SETTINGS_CODE[s.category]) {
                        SETTINGS_CODE[s.category].push({ id: s.id, name: s.name });
                    }
                });
            }
            const { data: eData } = await _db.schema('workout').from('exercises').select('*').order('name');
            EX_MASTER = eData || [];

            document.getElementById('q-type').innerHTML = SETTINGS_CODE['EXERCISE_TYPE'].map(t => `<option value="${t.id}">${t.name}</option>`).join('');
            document.getElementById('q-buwi').innerHTML = SETTINGS_CODE['BODY_PART'].map(b => `<option value="${b.id}">${b.name}</option>`).join('');
            
            handleTypeChange(document.getElementById('q-type').value);
            await refreshActiveList();
        }

        function calculateFinalWeight(weight, weightTypeId, equipTypeId) {
            let multiplier = 1;
            if ([26, 28, 46].includes(Number(weightTypeId))) multiplier = 2;
            let baseWeight = 0;
            if ([47, 48].includes(Number(equipTypeId))) baseWeight = 20;
            return (Number(weight) * multiplier) + baseWeight;
        }

        function handleTypeChange(typeId) {
            const buwiWrapper = document.getElementById('q-buwi-wrapper');
            const exWrapper = document.getElementById('q-ex-wrapper');
            const exSelect = document.getElementById('q-ex');
            const typeName = SETTINGS_LOOKUP[typeId];
            
            if (typeName === '유산소') {
                if(buwiWrapper) buwiWrapper.style.display = 'none';
                if(exWrapper) { exWrapper.classList.remove('col-4'); exWrapper.classList.add('col-8'); }
                document.getElementById('buwi-last-date').innerText = '';
                const filtered = EX_MASTER.filter(e => Number(e.exercise_type) === Number(typeId));
                exSelect.innerHTML = filtered.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
                if(filtered.length > 0) loadQuickExStats(filtered[0].id);
            } else {
                if(buwiWrapper) buwiWrapper.style.display = 'block';
                if(exWrapper) { exWrapper.classList.remove('col-8'); exWrapper.classList.add('col-4'); }
                handleBuwiChange(document.getElementById('q-buwi').value);
            }
        }

        async function handleBuwiChange(buwiId) {
            const currentTypeId = document.getElementById('q-type').value;
            if(SETTINGS_LOOKUP[currentTypeId] === '유산소') return;
            const { data } = await _db.schema('workout').from('logs').select('workout_date').eq('body_part', buwiId).order('workout_date', {ascending:false}).limit(1);
            document.getElementById('buwi-last-date').innerText = data?.[0] ? `최근 운동: ${data[0].workout_date.split('T')[0]}` : '이력 없음';
            const filtered = EX_MASTER.filter(e => Number(e.body_part) === Number(buwiId) && Number(e.exercise_type) === Number(currentTypeId));
            document.getElementById('q-ex').innerHTML = filtered.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
            if(filtered.length > 0) loadQuickExStats(filtered[0].id);
            else { document.getElementById('q-stats-area').style.display = 'none'; document.getElementById('q-inputs').innerHTML = ''; }
        }

        async function loadQuickExStats(exId) {
            if(!exId) return;
            const ex = EX_MASTER.find(e => e.id === exId);
            const { best, bestLog, recentConfigs } = await getDetailedStats(exId);
            
            let bestFinalHtml = '';
            if (bestLog && bestLog.weight) {
                let finalW = calculateFinalWeight(bestLog.weight, bestLog.weight_type || ex.weight_type, ex.equipment_type);
                bestFinalHtml = ` <span style="color:var(--neon-pink); font-size:0.75rem;">(최종: ${finalW}kg)</span>`;
            }

            document.getElementById('q-stats-area').style.display = 'block';
            document.getElementById('q-best-info').innerHTML = `
                <b class="text-pink">🏆 BEST: ${best}${bestFinalHtml}</b> 
                <small style="color:#666">(${bestLog.date})</small>
                ${bestLog.note ? `<div style="font-size:0.65rem; color:var(--deep-purple); margin-top:3px; font-style:italic;">📝 ${bestLog.note}</div>` : ''}
            `;
            document.getElementById('q-recent-configs').innerHTML = recentConfigs.map(c => `<span class="recent-config-item">${c}</span>`).join('');
            renderQuickInputFields(ex, bestLog);
        }

        function renderQuickInputFields(ex, best) {
            let html = '';
            if(ex.use_set_no) html += `<div class="col-3"><label class="label-small">세트수</label><input type="number" id="q-val-sets" class="form-control" value="3"></div>`;
            if(ex.use_equipment) html += makeQField('col-4', '기구', makeQSelect('q-val-equip', SETTINGS_CODE['EQUIPMENT'], ex.equipment_type || best.equip));
            if(ex.use_weight_type) html += makeQField('col-4', '무게타입', makeQSelect('q-val-weight-type', SETTINGS_CODE['WEIGHT_SUB_TYPE'], ex.weight_type));
            if(ex.use_grip) html += makeQField('col-4', '그립', makeQSelect('q-val-grip', SETTINGS_CODE['GRIP'], ex.grip_type || best.grip));
            if(ex.use_lying) html += makeQField('col-4', '라잉', makeQSelect('q-val-lying', SETTINGS_CODE['LYING'], ex.lying_type || best.lying));
            
            if(ex.use_weight) html += makeQField('col-4', '무게(kg)', `<input type="number" id="q-val-weight" class="form-control" value="${best.weight||''}">`);
            if(ex.use_reps) html += makeQField('col-4', '횟수', `<input type="number" id="q-val-reps" class="form-control" value="${best.reps||''}">`);
            if(ex.use_set_time) html += makeQField('col-4', '시간(s)', `<input type="number" id="q-val-set-time" class="form-control" value="${best.set_time||''}">`);
            if(ex.use_exercise_time) html += makeQField('col-4', '전체시간(m)', `<input type="number" id="q-val-time" class="form-control" value="${best.time||''}">`);
            if(ex.use_machine_lv) html += makeQField('col-4', '강도', `<input type="number" id="q-val-ml" class="form-control" value="${best.machine_lv||''}">`);
            if(ex.use_machine_speed) html += makeQField('col-4', '속도', `<input type="number" id="val-ms" class="form-control" value="${best.machine_speed||''}">`);
            if(ex.use_heart_rate) html += makeQField('col-4', '심박수', `<input type="number" id="q-val-hr" class="form-control" value="${best.heart_rate||''}">`);
            if(ex.use_pause_count) html += makeQField('col-4', '포즈 수', `<input type="number" id="q-val-pause" class="form-control" value="0" inputmode="numeric" pattern="[0-9]*">`);
            
            document.getElementById('q-inputs').innerHTML = html;
            handleSupersetSelectChange(document.getElementById('q-superset').value);
        }

        function handleSupersetSelectChange(val) {
            const setsInput = document.getElementById('q-val-sets');
            if(!setsInput) return;
            if(val) {
                const targetSets = ACTIVE_SETS.filter(s => s.display_name === val);
                if(targetSets.length > 0) {
                    const maxSet = Math.max(...targetSets.map(s => s.set_no));
                    setsInput.value = maxSet;
                    setsInput.disabled = true;
                }
            } else {
                setsInput.disabled = false;
            }
        }

        async function addWorkoutFromQuick() {
            const exId = document.getElementById('q-ex').value;
            if(!exId) return alert("종목을 선택하세요.");
            const ex = EX_MASTER.find(e => e.id === exId);
            
            const currentTypeId = document.getElementById('q-type').value;
            const currentTypeName = SETTINGS_LOOKUP[currentTypeId];
            const supersetTarget = document.getElementById('q-superset').value;
            let ssId = '';
            let sets = 1;
            
            if(supersetTarget) {
                const targetSets = ACTIVE_SETS.filter(s => s.display_name === supersetTarget);
                sets = targetSets.length > 0 ? Math.max(...targetSets.map(s => s.set_no)) : 1;
                ssId = 'ss_' + Date.now();
                
                const targetIds = targetSets.map(s => s.id);
                const { error: upError = null } = await _db.schema('workout').from('active_workout').update({ program_id: ssId }).in('id', targetIds);
                if(upError) return alert("수퍼세트 바인딩 실패: " + upError.message);
            } else {
                const setsInput = document.getElementById('q-val-sets');
                sets = setsInput ? (parseInt(setsInput.value) || 1) : 1;
            }
            
            let targetBodyPartId = ex.body_part;
            if (currentTypeName === '유산소') {
                const jeonshin = SETTINGS_CODE['BODY_PART'].find(b => b.name === '전신');
                if(jeonshin) targetBodyPartId = jeonshin.id;
            }
            
            const payload = [];
            for(let i=1; i<=sets; i++) {
                payload.push({ 
                    exercise_id: exId, 
                    display_name: ex.name, 
                    body_part: targetBodyPartId, 
                    set_no: i, status: 'TEMP', unit: ex.unit || 'kg',
                    weight: Number(document.getElementById('q-val-weight')?.value || 0), 
                    reps: Number(document.getElementById('q-val-reps')?.value || 0), 
                    set_time: Number(document.getElementById('q-val-set-time')?.value || 0),
                    workout_time: Number(document.getElementById('q-val-time')?.value || 0),
                    level: Number(document.getElementById('q-val-ml')?.value || 0),
                    machine_speed: Number(document.getElementById('val-ms')?.value || 0),
                    heart_rate: Number(document.getElementById('q-val-hr')?.value || 0),
                    pause_count: document.getElementById('q-val-pause') ? Number(document.getElementById('q-val-pause').value) : 0,
                    equipment_type: document.getElementById('q-val-equip')?.value ? Number(document.getElementById('q-val-equip').value) : (ex.equipment_type ? Number(ex.equipment_type) : null), 
                    weight_type: document.getElementById('q-val-weight-type')?.value ? Number(document.getElementById('q-val-weight-type').value) : (ex.weight_type ? Number(ex.weight_type) : null),
                    grip_type: document.getElementById('q-val-grip')?.value ? Number(document.getElementById('q-val-grip').value) : (ex.grip_type ? Number(ex.grip_type) : null), 
                    lying_type: document.getElementById('q-val-lying')?.value ? Number(document.getElementById('q-val-lying').value) : (ex.lying_type ? Number(ex.lying_type) : null), 
                    program_id: ssId
                });
            }
            const { error } = await _db.schema('workout').from('active_workout').insert(payload);
            if(error) alert("추가 실패: " + error.message);
            else {
                document.getElementById('q-superset').value = '';
                const setsInput = document.getElementById('q-val-sets');
                if(setsInput) setsInput.disabled = false;
                await refreshActiveList();
            }
        }

        // 고도화 버퍼 제어: 가상 메모리 공간(Detached DOM)에서 렌더링 후 한 번에 스왑하여 깜빡임 제거
        async function refreshActiveList() {
            const { data } = await _db.schema('workout').from('active_workout').select('*').order('id');
            ACTIVE_SETS = data || [];
            const area = document.getElementById('workout-list-area');
            
            const blocks = [];
            const blockMap = {};
            
            ACTIVE_SETS.forEach(s => {
                const isSS = s.program_id && s.program_id.startsWith('ss_');
                const key = isSS ? s.program_id : `single_${s.display_name}`;
                if(!blockMap[key]) {
                    blockMap[key] = {
                        id: key,
                        isSuperset: isSS,
                        ssId: isSS ? s.program_id : '',
                        sets: []
                    };
                    blocks.push(blockMap[key]);
                }
                blockMap[key].sets.push(s);
            });
            
            // 깜빡임 억제용 가상 메모리 임시 컨테이너 생성
            const tempContainer = document.createElement('div');
            
            for(const block of blocks) {
                const card = document.createElement('div');
                card.id = `block-card-${block.id}`;
                card.className = `workout-card border-${getPartKey(SETTINGS_LOOKUP[block.sets[0].body_part])}`;
                tempContainer.appendChild(card);
                await renderBlockCard(card, block);
            }
            
            // 단 1프레임만에 화면 일괄 리프레시 (허연 빈 화면 방지 기믹)
            area.innerHTML = tempContainer.innerHTML;
            
            // 실존 라이브 DOM 노드에 이벤트 리스너 재매핑 일괄 수동 가동
            ACTIVE_SETS.forEach(s => addSetEventListeners(s.id));
            
            updateProgress(); 
            updateSupersetDropdown();
        }

        async function renderBlockCard(cardIdOrEl, block) {
            const card = typeof cardIdOrEl === 'string' ? document.getElementById(cardIdOrEl) : cardIdOrEl;
            if (!card) return;
            
            if(block.isSuperset) {
                block.sets.sort((a, b) => a.set_no - b.set_no || a.id - b.id);
            } else {
                block.sets.sort((a, b) => a.set_no - b.set_no);
            }
            
            const names = [...new Set(block.sets.map(s => s.display_name))];
            const titleText = block.isSuperset ? `🔗 수퍼세트 (${names.join(' + ')})` : names[0];
            const bodyParts = [...new Set(block.sets.map(s => SETTINGS_LOOKUP[s.body_part] || '전신'))].join(', ');
            
            let bestInfoHtml = '';
            if(!block.isSuperset) {
                const ex = EX_MASTER.find(e => e.id === block.sets[0].exercise_id);
                const { best, bestLog } = await getDetailedStats(block.sets[0].exercise_id);
                
                let bestFinalHtml = '';
                if (bestLog && bestLog.weight) {
                    let finalW = calculateFinalWeight(bestLog.weight, bestLog.weight_type || ex.weight_type, ex.equipment_type);
                    bestFinalHtml = ` <span style="color:var(--neon-pink); font-size:0.65rem;">(최종: ${finalW}kg)</span>`;
                }
                bestInfoHtml = `<small class="text-pink" style="font-size:0.6rem;">🏆 BEST: ${best}${bestFinalHtml}</small>`;
            } else {
                bestInfoHtml = `<button class="btn btn-xs py-0 px-2" style="font-size:0.6rem; color:var(--neon-pink); border:1px solid rgba(255,63,126,0.4); border-radius:6px; background:rgba(255,63,126,0.05);" onclick="detachSuperset('${block.ssId}')">🔓 그룹 분리하기</button>`;
            }
            
            let html = `
                <div class="swipe-wrapper ex-header-wrapper">
                    <div class="swipe-del-bg" id="del-group-bg-${block.id}">ALL DELETE 🗑️</div>
                    <div class="card-header swipe-content" id="group-content-${block.id}"
                         ontouchstart="handleTouchStart(event)" 
                         ontouchmove="handleTouchMoveGroup(event, '${block.id}')" 
                         ontouchend="handleTouchEndGroup(event, '${block.id}', '${block.id}', ${block.isSuperset})">
                        <div><b>${titleText}</b><br>${bestInfoHtml}</div>
                        <small class="text-dim">${bodyParts}</small>
                    </div>
                </div>
                <div class="sets-container">`;
                
            for(const s of block.sets) { 
                html += await renderSetRowHtml(s, block.isSuperset); 
            }
            html += `</div>`;
            card.innerHTML = html;
        }

        async function detachSuperset(ssId) {
            if(!confirm("이 수퍼세트 구성을 해제하고 각각의 일반 운동 카드로 분리하시겠습니까?")) return;
            const { error } = await _db.schema('workout').from('active_workout').update({ program_id: null }).eq('program_id', ssId);
            if(error) alert("분리 실패: " + error.message);
            else await refreshActiveList();
        }

        async function renderSetRowHtml(s, isSuperset) {
            const ex = EX_MASTER.find(e => e.id === s.exercise_id);
            const { lastStr, lastNote, lastPauseCount } = await getDetailedStats(s.exercise_id, s.set_no);
            const isSaved = s.status === 'SAVED';
            
            const exLabelText = isSuperset ? `<div class="mb-1 fw-bold" style="font-size:0.65rem; color:var(--bp-pink); opacity:0.9;">[ ${s.display_name} ]</div>` : '';
            
            let selects = '';
            if(ex.use_equipment) selects += makeRowSelect(s.id, 'equip', SETTINGS_CODE['EQUIPMENT'], s.equipment_type);
            if(ex.use_weight_type) selects += makeRowSelect(s.id, 'weight-type', SETTINGS_CODE['WEIGHT_SUB_TYPE'], s.weight_type || ex.weight_type);
            if(ex.use_grip) selects += makeRowSelect(s.id, 'grip', SETTINGS_CODE['GRIP'], s.grip_type);
            if(ex.use_lying) selects += makeRowSelect(s.id, 'lying', SETTINGS_CODE['LYING'], s.lying_type);

            let inputsHtml = '';
            if(ex.use_weight) inputsHtml += `<input type="number" id="w-${s.id}" class="form-control form-control-sm text-center row-input-${s.id}" value="${s.weight||''}" placeholder="kg" inputmode="numeric" pattern="[0-9]*">`;
            if(ex.use_reps) inputsHtml += `<input type="number" id="r-${s.id}" class="form-control form-control-sm text-center row-input-${s.id}" value="${s.reps||''}" placeholder="회" inputmode="numeric" pattern="[0-9]*">`;
            if(ex.use_set_time) inputsHtml += `<input type="number" id="st-${s.id}" class="form-control form-control-sm text-center row-input-${s.id}" value="${s.set_time||''}" placeholder="sec" inputmode="numeric" pattern="[0-9]*">`;
            if(ex.use_exercise_time) inputsHtml += `<input type="number" id="t-${s.id}" class="form-control form-control-sm text-center row-input-${s.id}" value="${s.workout_time||''}" placeholder="min" inputmode="numeric" pattern="[0-9]*">`;
            if(ex.use_machine_lv) inputsHtml += `<input type="number" id="ml-${s.id}" class="form-control form-control-sm text-center row-input-${s.id}" value="${s.level||''}" placeholder="Lv" inputmode="numeric" pattern="[0-9]*">`;
            if(ex.use_machine_speed) inputsHtml += `<input type="number" id="ms-${s.id}" class="form-control form-control-sm text-center row-input-${s.id}" value="${s.machine_speed||''}" placeholder="km/h" inputmode="numeric" pattern="[0-9]*">`;
            if(ex.use_heart_rate) inputsHtml += `<input type="number" id="hr-${s.id}" class="form-control form-control-sm text-center row-input-${s.id}" value="${s.heart_rate||''}" placeholder="bpm" inputmode="numeric" pattern="[0-9]*">`;
            if(ex.use_pause_count) inputsHtml += `<input type="number" id="pc-${s.id}" class="form-control form-control-sm text-center row-input-${s.id}" value="${s.pause_count||'0'}" placeholder="포즈" inputmode="numeric" pattern="[0-9]*">`;

            let configTags = [];
            if (ex.use_weight_type) {
                let wId = s.weight_type || ex.weight_type;
                if (wId && SETTINGS_LOOKUP[wId]) configTags.push(SETTINGS_LOOKUP[wId]);
            }
            if (ex.use_grip) {
                let gId = s.grip_type || ex.grip_type;
                if (gId && SETTINGS_LOOKUP[gId]) configTags.push(SETTINGS_LOOKUP[gId]);
            }
            if (ex.use_lying) {
                let lId = s.lying_type || ex.lying_type;
                if (lId && SETTINGS_LOOKUP[lId]) configTags.push(SETTINGS_LOOKUP[lId]);
            }
            let metaDetails = configTags.length > 0 ? ` <span style="color:#888; font-weight:normal;">[${configTags.join('/')}]</span>` : '';
            let pauseDetails = ex.use_pause_count ? ` (포즈: ${lastPauseCount}회)` : '';
            let lastNoteHtml = lastNote ? `<div class="text-secondary mb-1" style="font-size:0.65rem; font-style:italic; color:#aaa; padding-left:2px;">⏮ 지난 노트: "${lastNote}"</div>` : '';

            return `
            <div class="swipe-wrapper">
                <div class="swipe-del-bg" id="del-set-bg-${s.id}">DELETE 🗑️</div>
                <div id="set-row-content-${s.id}" class="set-row swipe-content ${isSaved?'saved-row' : ''}" 
                     ontouchstart="handleTouchStart(event)" 
                     ontouchmove="handleTouchMoveSet(event, ${s.id})" 
                     ontouchend="handleTouchEndSet(event, ${s.id}, '${s.display_name}')">
                    <div class="row align-items-center g-2">
                        <div class="col-2 fw-bold text-pink text-center set-no-label">${s.set_no}S</div>
                        <div class="col-7">
                            ${exLabelText}
                            <div class="history-badge mb-2">⏮ Last: ${lastStr}${pauseDetails}${metaDetails}</div>
                            <div class="d-flex gap-1 mb-1 flex-wrap">${selects}</div>
                            <div class="d-flex gap-1 mb-1">${inputsHtml}</div>
                            
                            <div class="mt-2 w-100">
                                ${lastNoteHtml}
                                <textarea id="n-${s.id}" class="form-control form-control-sm row-input-${s.id}" 
                                          style="font-size:0.65rem; resize:none; overflow-y:hidden; background:#1c1c1c; border:1px solid #333; color:white; height:${isSaved ? '28px' : 'auto'};" 
                                          placeholder="노트 입력..." rows="1">${s.note||''}</textarea>
                            </div>
                        </div>
                        <div class="col-3"><button id="save-btn-${s.id}" class="btn-save ${isSaved?'st-saved':''}" onclick="saveSetRow(${s.id})">${isSaved?'SAVED':'SAVE'}</button></div>
                    </div>
                </div>
            </div>`;
        }

        async function saveSetRow(id) {
            const btn = document.getElementById(`save-btn-${id}`);
            const s = ACTIVE_SETS.find(x => x.id === id);
            const ex = EX_MASTER.find(e => e.id === s.exercise_id);
            const up = { 
                status: 'SAVED', 
                note: document.getElementById(`n-${id}`).value, 
                equipment_type: document.getElementById(`sel-equip-${id}`)?.value ? Number(document.getElementById(`sel-equip-${id}`).value) : null, 
                weight_type: document.getElementById(`sel-weight-type-${id}`)?.value ? Number(document.getElementById(`sel-weight-type-${id}`).value) : null, 
                grip_type: document.getElementById(`sel-grip-${id}`)?.value ? Number(document.getElementById(`sel-grip-${id}`).value) : null, 
                lying_type: document.getElementById(`sel-lying-${id}`)?.value ? Number(document.getElementById(`sel-lying-${id}`).value) : null 
            };
            
            if(ex.use_weight) up.weight = Number(document.getElementById(`w-${id}`).value);
            if(ex.use_reps) up.reps = Number(document.getElementById(`r-${id}`).value);
            if(ex.use_set_time) up.set_time = Number(document.getElementById(`st-${id}`).value);
            if(ex.use_exercise_time) up.workout_time = Number(document.getElementById('t-' + id).value);
            if(ex.use_machine_lv) up.level = Number(document.getElementById(`ml-${id}`).value);
            if(ex.use_machine_speed) up.machine_speed = Number(document.getElementById(`ms-${id}`).value);
            if(ex.use_heart_rate) up.heart_rate = Number(document.getElementById(`hr-${id}`).value);
            if(ex.use_pause_count) up.pause_count = Number(document.getElementById(`pc-${id}`).value);
            
            const { error } = await _db.schema('workout').from('active_workout').update(up).eq('id', id);
            if(!error) {
                btn.innerText = 'SAVED'; btn.classList.remove('st-update'); btn.classList.add('st-saved');
                document.getElementById(`set-row-content-${id}`).classList.add('saved-row');
                
                const ta = document.getElementById(`n-${id}`);
                if (ta) ta.style.height = '28px';

                Object.assign(s, up); 
                updateProgress(); 
            } else {
                alert("저장 실패: " + error.message);
            }
        }

        function openReorderModal() {
            const blocks = [];
            const blockMap = {};
            
            ACTIVE_SETS.forEach(s => {
                const isSS = s.program_id && s.program_id.startsWith('ss_');
                const key = isSS ? s.program_id : `single_${s.display_name}`;
                if(!blockMap[key]) {
                    blockMap[key] = { id: key, isSuperset: isSS, names: [], sets: [] };
                    blocks.push(blockMap[key]);
                }
                blockMap[key].sets.push(s);
                if(!blockMap[key].names.includes(s.display_name)) blockMap[key].names.push(s.display_name);
            });
            
            window.CURRENT_REORDER_BLOCKS = blocks; 
            renderReorderList();
            document.getElementById('reorder-overlay').style.display = 'flex';
        }

        function renderReorderList() {
            const container = document.getElementById('reorder-list-container');
            if (window.CURRENT_REORDER_BLOCKS.length === 0) {
                container.innerHTML = '<div class="text-center text-secondary py-4">현재 추가된 운동 종목이 없습니다.</div>';
                return;
            }
            container.innerHTML = window.CURRENT_REORDER_BLOCKS.map((b, idx) => {
                const title = b.isSuperset ? `🔗 수퍼세트 (${b.names.join(' + ')})` : b.names[0];
                return `
                    <div class="d-flex justify-content-between align-items-center mb-2 p-3" style="background:rgba(255,255,255,0.03); border-radius:14px; border:1px solid #222;">
                        <span style="font-size:0.85rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:65%; color:#eee;">${title}</span>
                        <div class="d-flex gap-1">
                            <button class="btn btn-sm btn-outline-light px-2 py-1" style="font-size:0.75rem;" onclick="moveReorderBlock(${idx}, -1)">🔼</button>
                            <button class="btn btn-sm btn-outline-light px-2 py-1" style="font-size:0.75rem;" onclick="moveReorderBlock(${idx}, 1)">🔽</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function moveReorderBlock(idx, dir) {
            const targetIdx = idx + dir;
            if (targetIdx < 0 || targetIdx >= window.CURRENT_REORDER_BLOCKS.length) return;
            const temp = window.CURRENT_REORDER_BLOCKS[idx];
            window.CURRENT_REORDER_BLOCKS[idx] = window.CURRENT_REORDER_BLOCKS[targetIdx];
            window.CURRENT_REORDER_BLOCKS[targetIdx] = temp;
            renderReorderList();
        }

        function closeReorderModal() { document.getElementById('reorder-overlay').style.display = 'none'; }

        async function saveNewOrder() {
            if (!window.CURRENT_REORDER_BLOCKS || window.CURRENT_REORDER_BLOCKS.length === 0) return;
            
            const allSetsNewOrder = [];
            window.CURRENT_REORDER_BLOCKS.forEach(b => {
                if(b.isSuperset) {
                    b.sets.sort((a, b) => a.set_no - b.set_no || a.id - b.id);
                } else {
                    b.sets.sort((a, b) => a.set_no - b.set_no);
                }
                allSetsNewOrder.push(...b.sets);
            });
            
            if (allSetsNewOrder.length === 0) return closeReorderModal();
            
            const originalIds = ACTIVE_SETS.map(s => s.id);

            const payload = allSetsNewOrder.map(s => {
                const { id, created_at, ...rest } = s;
                return rest;
            });
            
            const { error: delError } = await _db.schema('workout').from('active_workout').delete().in('id', originalIds);
            if(delError) return alert("순서 배치 마이그레이션 오류(삭제 단계): " + delError.message);
            
            const { error: insError } = await _db.schema('workout').from('active_workout').insert(payload);
            if(insError) return alert("순서 배치 마이그레이션 오류(재적재 단계): " + insError.message);
            
            closeReorderModal();
            await refreshActiveList(); 
        }

        function handleTouchStart(e) { touchStartX = e.touches[0].clientX; }
        function handleTouchMoveGroup(e, blockId) { const diffX = e.touches[0].clientX - touchStartX; if (diffX < 0) { document.getElementById(`group-content-${blockId}`).style.transform = `translateX(${Math.max(diffX, -100)}px)`; document.getElementById(`del-group-bg-${blockId}`).style.right = '0'; } }
        
        // 고도화 명세: 가속 스와이프 이펙트를 통한 선행 DOM 삭제 기믹 (삭제 시 깜빡임 완전 소멸 파트)
        async function handleTouchEndGroup(e, blockId, label, isSuperset) { 
            const diffX = e.changedTouches[0].clientX - touchStartX; 
            if (diffX < -150) { 
                if(confirm(isSuperset ? "이 수퍼세트 그룹 전체를 삭제할까요?" : "이 운동 전체를 삭제할까요?")) { 
                    
                    // 1 프레임 반응: 화면에서 카드를 즉시 좌측으로 날리고 높이를 차단해 위로 밀어올림
                    const cardEl = document.getElementById(`block-card-${blockId}`);
                    if(cardEl) {
                        cardEl.style.transition = "all 0.35s cubic-bezier(0.4, 0, 0.2, 1)";
                        cardEl.style.transform = "translateX(-100%)";
                        cardEl.style.opacity = "0";
                        setTimeout(() => {
                            cardEl.style.maxHeight = "0";
                            cardEl.style.margin = "0";
                            cardEl.style.padding = "0";
                        }, 150);
                        setTimeout(() => cardEl.remove(), 400);
                    }

                    // 2단계: 백엔드 동기화 쿼리 사일런트 런칭
                    if(isSuperset) {
                        await _db.schema('workout').from('active_workout').delete().eq('program_id', blockId);
                    } else {
                        const originName = blockId.replace('single_', '');
                        await _db.schema('workout').from('active_workout').delete().eq('display_name', originName);
                    }

                    // 3단계: 화면 가림 없이 내부 상태 룩업 업데이트
                    const { data } = await _db.schema('workout').from('active_workout').select('*').order('id');
                    ACTIVE_SETS = data || [];
                    updateProgress(); 
                    updateSupersetDropdown();
                } else resetSwipeGroup(blockId); 
            } else resetSwipeGroup(blockId); 
        }
        
        function resetSwipeGroup(blockId) { document.getElementById('group-content-' + blockId).style.transform = 'translateX(0)'; document.getElementById('del-group-bg-' + blockId).style.right = '-100%'; }
        function handleTouchMoveSet(e, id) { const diffX = e.touches[0].clientX - touchStartX; if (diffX < 0) { document.getElementById(`set-row-content-${id}`).style.transform = `translateX(${Math.max(diffX, -80)}px)`; document.getElementById(`del-set-bg-${id}`).style.right = '0'; } }
        
        // 고도화 명세: 단일 세트 열 스와이프 아웃 연동 가속화 기믹
        async function handleTouchEndSet(e, id, exName) { 
            const diffX = e.changedTouches[0].clientX - touchStartX; 
            if (diffX < -120) { 
                if(confirm("이 세트를 삭제할까요?")) { 
                    
                    // 프론트엔드 실시간 감축 처리 개시
                    const rowContent = document.getElementById(`set-row-content-${id}`);
                    const swipeWrapper = rowContent?.closest('.swipe-wrapper');
                    if(swipeWrapper) {
                        swipeWrapper.style.transition = "all 0.35s cubic-bezier(0.4, 0, 0.2, 1)";
                        swipeWrapper.style.transform = "translateX(-100%)";
                        swipeWrapper.style.opacity = "0";
                        setTimeout(() => {
                            swipeWrapper.style.maxHeight = "0";
                            swipeWrapper.style.margin = "0";
                            swipeWrapper.style.padding = "0";
                        }, 150);
                        setTimeout(() => swipeWrapper.remove(), 400);
                    }

                    await _db.schema('workout').from('active_workout').delete().eq('id', id); 
                    const { data } = await _db.schema('workout').from('active_workout').select('*').order('id');
                    ACTIVE_SETS = data || [];
                    updateProgress();
                } else resetSwipeSet(id); 
            } else resetSwipeSet(id); 
        }
        
        function resetSwipeSet(id) { document.getElementById(`set-row-content-${id}`).style.transform = 'translateX(0)'; document.getElementById('del-set-bg-' + id).style.right = '-100%'; }

        function addSetEventListeners(id) { 
            const row = document.getElementById(`set-row-content-${id}`); 
            if(!row) return; 
            row.querySelectorAll(`.row-input-${id}, select`).forEach(el => { 
                el.addEventListener('input', () => { 
                    const btn = document.getElementById(`save-btn-${id}`); 
                    if(btn && btn.innerText === 'SAVED') { 
                        btn.innerText = 'UPDATE'; 
                        btn.classList.add('st-update'); 
                    } 
                }); 
            }); 

            const ta = document.getElementById(`n-${id}`);
            if (ta) {
                ta.addEventListener('focus', function() {
                    this.style.height = 'auto';
                    this.style.height = this.scrollHeight + 'px';
                });
                ta.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = this.scrollHeight + 'px';
                });
                ta.addEventListener('blur', function() {
                    const btn = document.getElementById(`save-btn-${id}`);
                    if (btn && btn.innerText === 'SAVED') {
                        this.style.height = '28px';
                    }
                });
            }
        }
        
        function makeQField(col, label, input) { return `<div class="${col} mb-2"><label class="label-small">${label}</label>${input}</div>`; }
        function makeQSelect(id, list, def) { return `<select id="${id}" class="form-select">${list.map(v => `<option value="${v.id}" ${v.id==def?'selected':''}>${v.name}</option>`).join('')}</select>`; }
        function makeRowSelect(id, type, list, current) { return `<select id="sel-${type}-${id}" class="form-select form-select-sm" style="font-size:0.6rem; height:24px;">${list.map(v => `<option value="${v.id}" ${v.id==current?'selected':''}>${v.name}</option>`).join('')}</select>`; }
        function updateProgress() { const saved = ACTIVE_SETS.filter(s => s.status === 'SAVED').length; const pct = ACTIVE_SETS.length ? Math.round((saved/ACTIVE_SETS.length)*100) : 0; document.getElementById('progress-fill').style.width = pct + '%'; document.getElementById('progress-text').innerText = `${saved} / ${ACTIVE_SETS.length} SAVED (${pct}%)`; }
        
        function updateSupersetDropdown() { 
            const standalones = ACTIVE_SETS.filter(s => !s.program_id || !s.program_id.startsWith('ss_'));
            const names = [...new Set(standalones.map(s => s.display_name))]; 
            document.getElementById('q-superset').innerHTML = '<option value="">N/A</option>' + names.map(n => `<option value="${n}">${n}</option>`).join(''); 
        }
        
        function toggleFinishArea() { const a = document.getElementById('session-input-area'); a.style.display = a.style.display==='none'?'block':'none'; }
        
        async function getDetailedStats(exId, setNo = null) {
            if (typeof _getDetailedStats === 'function') return await _getDetailedStats(exId, setNo);
            try {
                const { data: logs } = await _db.schema('workout').from('logs').select('*').eq('exercise_id', exId).order('weight', { ascending: false }).limit(1);
                let best = "0kg x 0회";
                let bestLog = { weight: 0, reps: 0, date: '-', note: '', weight_type: null, equipment_type: null };
                if (logs && logs.length > 0) {
                    best = `${logs[0].weight}kg x ${logs[0].reps}회`;
                    bestLog = { 
                        weight: logs[0].weight, reps: logs[0].reps, 
                        date: logs[0].workout_date ? logs[0].workout_date.split('T')[0] : '-', note: logs[0].note,
                        weight_type: logs[0].weight_type, equipment_type: logs[0].equipment_type
                    };
                }
                let lastStr = "이력 없음"; let lastNote = ""; let lastPauseCount = 0;
                const query = _db.schema('workout').from('logs').select('*').eq('exercise_id', exId);
                if (setNo) query.eq('set_no', setNo);
                const { data: lastLogs } = await query.order('workout_date', { ascending: false }).limit(1);
                if (lastLogs && lastLogs.length > 0) {
                    lastStr = `${lastLogs[0].weight}kg x ${lastLogs[0].reps}회`;
                    lastNote = lastLogs[0].note || "";
                    lastPauseCount = lastLogs[0].pause_count || 0;
                }
                return { best, bestLog, recentConfigs: [], lastStr, lastNote, lastPauseCount };
            } catch (e) {
                return { best: "0kg x 0회", bestLog: {}, recentConfigs: [], lastStr: "이력 없음", lastNote: "" , lastPauseCount: 0 };
            }
        }

        function getSmartDate() {
            const now = new Date(); let targetDate = new Date(now);
            if (now.getHours() < 6) {
                if (confirm("새벽 6시 이전입니다. 어제 날짜로 기록하시겠습니까?")) {
                    targetDate.setDate(now.getDate() - 1);
                }
            }
            const yyyy = targetDate.getFullYear();
            const mm = String(targetDate.getMonth() + 1).padStart(2, '0');
            const dd = String(targetDate.getDate()).padStart(2, '0');
            return { idStr: `${yyyy}${mm}${dd}`, justDate: `${yyyy}-${mm}-${dd}`, full: targetDate.toISOString() };
        }

        async function processFinalSave() {
            if(ACTIVE_SETS.some(s => s.status === 'TEMP')) return alert("저장 안 된 세트가 있음!");
            const smartDate = getSmartDate();
            const { data: ex } = await _db.schema('workout').from('session_logs').select('id').like('id', `${smartDate.idStr}_%`);
            const sId = `${smartDate.idStr}_S${(ex?.length||0)+1}`;
            await _db.schema('workout').from('session_logs').insert([{ id: sId, workout_date: smartDate.justDate, duration_min: Number(document.getElementById('s-duration').value), active_calories: Number(document.getElementById('s-active-cal').value), total_calories: Number(document.getElementById('s-total-cal').value), avg_heart_rate: Number(document.getElementById('s-avg-hr').value), min_heart_rate: Number(document.getElementById('s-min-hr').value), max_heart_rate: Number(document.getElementById('s-max-hr').value) }]);
            const logs = ACTIVE_SETS.map(s => { const {id, ...rest} = s; return { ...rest, session_id: sId, status: 'FINAL', workout_date: smartDate.full }; });
            await _db.schema('workout').from('logs').insert(logs);
            await _db.schema('workout').from('active_workout').delete().neq('id', -1);
            location.reload();
        }

        init();
    </script>
</body>
</html>

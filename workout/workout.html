<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>BLACKPINK WORKOUT v5.7.5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>
    <script src="../universe_core.js"></script>
    <script src="workout_core.js"></script>
</head>
<body>
    <div class="container-app">
        <div class="sticky-top-group">
            <div class="d-flex justify-content-between align-items-center">
                <select id="routine-select" class="form-select form-select-sm" style="width:115px;" onchange="window.handleRoutineChange(this.value)">
                    <option value="자유운동">자유운동</option>
                </select>
                <div class="d-flex gap-1">
                    <button type="button" class="btn-cancel" style="padding:6px 12px; font-size:0.75rem; border-radius:10px;" onclick="window.openReorderModal()">순서 변경</button>
                    <button type="button" class="btn-pink" style="padding:6px 14px; font-size:0.75rem;" onclick="window.toggleFinishArea()">운동 완료</button>
                </div>
            </div>
            <div id="progress-text" class="mt-3" style="font-size:0.7rem; font-weight:800; color:var(--bp-pink);">0 / 0 SAVED (0%)</div>
            <div class="progress-mini-bar"><div id="progress-fill" class="progress-fill"></div></div>
            
            <!-- 다이나믹 세션 인풋 에어리어 -->
            <div id="session-input-area" style="display:none; margin-top:15px; border-top:1px solid #333; padding-top:15px;"></div>
        </div>

        <div id="workout-list-area"></div>

        <div class="quick-add-area">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <span style="font-weight:900; font-size:0.9rem; color:var(--bp-pink);">+ QUICK ADD</span>
            </div>
            
            <div class="row g-2 mb-2">
                <div class="col-4">
                    <label class="label-small">종류 <span id="last-date-type" class="micro-date-badge"></span></label>
                    <select id="q-type" class="form-select form-select-sm" onchange="window.handleTypeChange(this.value)"></select>
                </div>
                <div class="col-4" id="q-buwi-wrapper">
                    <label class="label-small">부위 <span id="last-date-buwi" class="micro-date-badge"></span></label>
                    <select id="q-buwi" class="form-select form-select-sm" onchange="window.handleBuwiChange(this.value)"></select>
                </div>
                <div class="col-4" id="q-ex-wrapper">
                    <label class="label-small">종목 <span id="last-date-ex" class="micro-date-badge"></span></label>
                    <select id="q-ex" class="form-select form-select-sm" onchange="window.loadQuickExStats(this.value)"></select>
                </div>
            </div>
            <div id="q-stats-area" class="stats-box" style="display:none;">
                <div id="q-best-info" class="mb-1"></div>
                <div id="q-recent-configs"></div>
            </div>
            <div class="row g-2 mb-3" id="q-inputs"></div>
            <div class="mb-3">
                <label class="label-small">수퍼세트 설정</label>
                <select id="q-superset" class="form-select form-select-sm" onchange="window.handleSupersetSelectChange(this.value)">
                    <option value="">N/A</option>
                </select>
            </div>
            <button class="btn-pink w-100" onclick="window.addWorkoutFromQuick()">리스트 추가하기</button>
        </div>

        <div id="reorder-overlay" class="reorder-overlay">
            <div class="reorder-modal-card">
                <h5 class="fw-bold mb-1" style="color:var(--bp-pink);">🔄 운동 순서 변경</h5>
                <p class="text-secondary mb-3" style="font-size:0.7rem;">🔼/🔽 버튼을 눌러 종목 순서를 변경하세요.</p>
                <div id="reorder-list-container" class="reorder-list-scroll"></div>
                <div class="d-flex gap-2">
                    <button class="btn-pink w-100 py-2 fw-bold" onclick="window.saveNewOrder()">순서 저장</button>
                    <button class="btn btn-outline-light w-100 py-2" onclick="window.closeReorderModal()">취소</button>
                </div>
            </div>
        </div>

        <div id="global-nav" data-active="workout"></div>
    </div>

    <script>
        let touchStartX = 0;

        function updateProgress() { 
            const saved = window.ACTIVE_SETS.filter(s => s.status === 'SAVED').length; 
            const pct = window.ACTIVE_SETS.length ? Math.round((saved / window.ACTIVE_SETS.length) * 100) : 0; 
            const fillEl = document.getElementById('progress-fill');
            const txtEl = document.getElementById('progress-text');
            if (fillEl) fillEl.style.width = pct + '%'; 
            if (txtEl) txtEl.innerText = `${saved} / ${window.ACTIVE_SETS.length} SAVED (${pct}%)`; 
        }
        window.updateProgress = updateProgress;

        function updateSupersetDropdown() { 
            const standalones = window.ACTIVE_SETS.filter(s => !s.program_id || !s.program_id.startsWith('ss_')); 
            const names = [...new Set(standalones.map(s => s.display_name))]; 
            const ssEl = document.getElementById('q-superset');
            if (ssEl) {
                ssEl.innerHTML = '<option value="">N/A</option>' + names.map(n => `<option value="${n}">${n}</option>`).join(''); 
            }
        }
        window.updateSupersetDropdown = updateSupersetDropdown;

        function handleSupersetSelectChange(val) {
            const setsInput = document.getElementById('q-val-sets');
            if (!setsInput) return;
            if (val) {
                const targetSets = window.ACTIVE_SETS.filter(s => s.display_name === val);
                if (targetSets.length > 0) {
                    const maxSet = Math.max(...targetSets.map(s => s.set_no));
                    setsInput.value = maxSet;
                    setsInput.disabled = true;
                }
            } else {
                setsInput.disabled = false;
            }
        }
        window.handleSupersetSelectChange = handleSupersetSelectChange;

        async function refreshActiveList() {
            const { data } = await _db.schema('workout').from('active_workout').select('*').order('id');
            window.ACTIVE_SETS = data || [];

            const uniqueExIds = [...new Set(window.ACTIVE_SETS.map(s => s.exercise_id))];
            
            if (uniqueExIds.length > 0) {
                const [bestSeRes, logsRes] = await Promise.all([
                    _db.schema('workout').from('session_exercises').select('*').in('exercise_id', uniqueExIds).eq('is_best_volume', true),
                    _db.schema('workout').from('logs').select('*').in('exercise_id', uniqueExIds).order('workout_date', { ascending: false })
                ]);
                
                window.STATS_CACHE = {
                    bestSe: bestSeRes.data || [],
                    logs: logsRes.data || []
                };
            } else {
                window.STATS_CACHE = { bestSe: [], logs: [] };
            }

            const area = document.getElementById('workout-list-area');
            const blocks = [];
            const blockMap = {};
            
            window.ACTIVE_SETS.forEach(s => {
                const isSS = s.program_id && s.program_id.startsWith('ss_');
                const key = isSS ? s.program_id : `single_${s.display_name}`;
                if (!blockMap[key]) {
                    blockMap[key] = { id: key, isSuperset: isSS, ssId: isSS ? s.program_id : '', sets: [] };
                    blocks.push(blockMap[key]);
                }
                blockMap[key].sets.push(s);
            });
            
            const tempContainer = document.createElement('div');
            for (const block of blocks) {
                const card = document.createElement('div');
                card.id = `block-card-${block.id}`;
                card.className = `workout-card border-${window.getPartKey(window.SETTINGS_LOOKUP[block.sets[0].body_part])}`;
                tempContainer.appendChild(card);
                await window.renderBlockCard(card, block);
            }
            
            area.innerHTML = tempContainer.innerHTML;
            window.ACTIVE_SETS.forEach(s => { window.addSetEventListeners(s.id); });
            window.updateProgress(); 
            window.updateSupersetDropdown();
        }
        window.refreshActiveList = refreshActiveList;

        async function renderBlockCard(cardIdOrEl, block) {
            const card = typeof cardIdOrEl === 'string' ? document.getElementById(cardIdOrEl) : cardIdOrEl;
            if (!card) return;
            
            if (block.isSuperset) {
                block.sets.sort((a, b) => a.set_no - b.set_no || a.id - b.id);
            } else {
                block.sets.sort((a, b) => a.set_no - b.set_no);
            }
            
            const names = [...new Set(block.sets.map(s => s.display_name))];
            const titleText = block.isSuperset ? `🔗 수퍼세트 (${names.join(' + ')})` : names[0];
            const bodyParts = [...new Set(block.sets.map(s => window.SETTINGS_LOOKUP[s.body_part] || '전신'))].join(', ');
            
            let bestInfoHtml = '';
            if (!block.isSuperset) {
                const ex = window.EX_MASTER.find(e => e.id === block.sets[0].exercise_id);
                const { best, bestLog } = await window.getDetailedStats(block.sets[0].exercise_id);
                
                let bestFinalHtml = '';
                if (bestLog) {
                    const isCardio = (ex && window.SETTINGS_LOOKUP[ex.exercise_type] === '유산소');
                    if (isCardio) {
                        bestFinalHtml = ` <span style="color:var(--neon-pink); font-size:0.65rem;">(강도: Lv.${bestLog.machine_lv || '-'} / 속도: ${bestLog.machine_speed || '-'}km/h)</span>`;
                    } else if (bestLog.weight) {
                        let finalW = window.calculateFinalWeight(bestLog.weight, bestLog.weight_type || ex.weight_type, ex.equipment_type);
                        bestFinalHtml = ` <span style="color:var(--neon-pink); font-size:0.65rem;">(최종 세트: ${bestLog.weight}kg x ${bestLog.reps}회 / 총합: ${finalW}kg)</span>`;
                    }
                }
                bestInfoHtml = `<small class="text-pink" style="font-size:0.6rem;">🏆 BEST 볼륨: ${best}${bestFinalHtml}</small>`;
            } else {
                bestInfoHtml = `<button class="btn btn-xs py-0 px-2" style="font-size:0.6rem; color:var(--neon-pink); border:1px solid rgba(255,63,126,0.4); border-radius:6px; background:rgba(255,63,126,0.05);" onclick="window.detachSuperset('${block.ssId}')">🔓 그룹 분리하기</button>`;
            }
            
            let html = `
                <div class="swipe-wrapper ex-header-wrapper">
                    <div class="swipe-del-bg" id="del-group-bg-${block.id}">ALL DELETE 🗑️</div>
                    <div class="card-header swipe-content" id="group-content-${block.id}"
                         ontouchstart="window.handleTouchStart(event)" ontouchmove="window.handleTouchMoveGroup(event, '${block.id}')" ontouchend="window.handleTouchEndGroup(event, '${block.id}', '${block.id}', ${block.isSuperset})">
                        <div><b>${titleText}</b><br>${bestInfoHtml}</div>
                        <small class="text-dim">${bodyParts}</small>
                    </div>
                </div>
                <div class="sets-container">`;
                
            for (const s of block.sets) { html += await window.renderSetRowHtml(s, block.isSuperset); }
            html += `</div>`;
            card.innerHTML = html;
        }
        window.renderBlockCard = renderBlockCard;

        async function renderSetRowHtml(s, isSuperset) {
            const ex = window.EX_MASTER.find(e => e.id === s.exercise_id);
            const { lastStr, lastNote, lastPauseCount } = await window.getDetailedStats(s.exercise_id, s.set_no);
            const isSaved = s.status === 'SAVED';
            const exLabelText = isSuperset ? `<div class="mb-1 fw-bold" style="font-size:0.65rem; color:var(--bp-pink); opacity:0.9;">[ ${s.display_name} ]</div>` : '';
            
            let selects = '';
            if (ex.use_equipment) selects += window.makeRowSelect(s.id, 'equip', window.SETTINGS_CODE['EQUIPMENT'], s.equipment_type);
            if (ex.use_weight_type) selects += window.makeRowSelect(s.id, 'weight-type', window.SETTINGS_CODE['WEIGHT_SUB_TYPE'], s.weight_type || ex.weight_type);
            if (ex.use_grip) selects += window.makeRowSelect(s.id, 'grip', window.SETTINGS_CODE['GRIP'], s.grip_type);
            if (ex.use_lying) selects += window.makeRowSelect(s.id, 'lying', window.SETTINGS_CODE['LYING'], s.lying_type);

            let inputsHtml = '';
            if (ex.use_weight) inputsHtml += `<input type="number" id="w-${s.id}" class="form-control form-control-sm text-center row-input-${s.id}" value="${s.weight || ''}" placeholder="kg" inputmode="numeric" pattern="[0-9]*">`;
            if (ex.use_reps) inputsHtml += `<input type="number" id="r-${s.id}" class="form-control form-control-sm text-center row-input-${s.id}" value="${s.reps || ''}" placeholder="회" inputmode="numeric" pattern="[0-9]*">`;
            if (ex.use_set_time) inputsHtml += `<input type="number" id="st-${s.id}" class="form-control form-control-sm text-center row-input-${s.id}" value="${s.set_time || ''}" placeholder="sec" inputmode="numeric" pattern="[0-9]*">`;
            if (ex.use_exercise_time) inputsHtml += `<input type="number" id="t-${s.id}" class="form-control form-control-sm text-center row-input-${s.id}" value="${s.workout_time || ''}" placeholder="min" inputmode="numeric" pattern="[0-9]*">`;
            if (ex.use_machine_lv) inputsHtml += `<input type="number" id="ml-${s.id}" class="form-control form-control-sm text-center row-input-${s.id}" value="${s.level || ''}" placeholder="Lv" inputmode="numeric" pattern="[0-9]*">`;
            if (ex.use_machine_speed) inputsHtml += `<input type="number" id="ms-${s.id}" class="form-control form-control-sm text-center row-input-${s.id}" value="${s.machine_speed || ''}" placeholder="km/h" inputmode="numeric" pattern="[0-9]*">`;
            if (ex.use_heart_rate) inputsHtml += `<input type="number" id="hr-${s.id}" class="form-control form-control-sm text-center row-input-${s.id}" value="${s.heart_rate || ''}" placeholder="bpm" inputmode="numeric" pattern="[0-9]*">`;
            if (ex.use_pause_count) inputsHtml += `<input type="number" id="pc-${s.id}" class="form-control form-control-sm text-center row-input-${s.id}" value="${s.pause_count || '0'}" placeholder="포즈" inputmode="numeric" pattern="[0-9]*">`;

            let configTags = [];
            if (ex.use_weight_type) { let wId = s.weight_type || ex.weight_type; if (wId && window.SETTINGS_LOOKUP[wId]) configTags.push(window.SETTINGS_LOOKUP[wId]); }
            if (ex.use_grip) { let gId = s.grip_type || ex.grip_type; if (gId && window.SETTINGS_LOOKUP[gId]) configTags.push(window.SETTINGS_LOOKUP[gId]); }
            if (ex.use_lying) { let lId = s.lying_type || ex.lying_type; if (lId && window.SETTINGS_LOOKUP[lId]) configTags.push(window.SETTINGS_LOOKUP[lId]); }
            let metaDetails = configTags.length > 0 ? ` <span style="color:#888; font-weight:normal;">[${configTags.join('/')}]</span>` : '';
            let pauseDetails = ex.use_pause_count ? ` (포즈: ${lastPauseCount}회)` : '';
            let lastNoteHtml = lastNote ? `<div class="text-secondary mb-1" style="font-size:0.65rem; font-style:italic; color:#aaa; padding-left:2px;">⏮ 지난 노트: "${lastNote}"</div>` : '';

            return `
            <div class="swipe-wrapper">
                <div class="swipe-del-bg" id="del-set-bg-${s.id}">DELETE 🗑️</div>
                <div id="set-row-content-${s.id}" class="set-row swipe-content ${isSaved ? 'saved-row' : ''}" 
                     ontouchstart="window.handleTouchStart(event)" ontouchmove="window.handleTouchMoveSet(event, ${s.id})" ontouchend="window.handleTouchEndSet(event, ${s.id}, '${s.display_name}')">
                    <div class="row align-items-center g-2">
                        <div class="col-2 fw-bold text-pink text-center set-no-label">${s.set_no}S</div>
                        <div class="col-7">
                            ${exLabelText}
                            <div class="history-badge mb-2">⏮ Last: ${lastStr}${pauseDetails}${metaDetails}</div>
                            <div class="d-flex gap-1 mb-1 flex-wrap">${selects}</div>
                            <div class="d-flex gap-1 mb-1">${inputsHtml}</div>
                            <div class="mt-2 w-100">
                                ${lastNoteHtml}
                                <textarea id="n-${s.id}" class="form-control form-control-sm row-input-${s.id}" style="font-size:0.65rem; resize:none; overflow-y:hidden; background:#1c1c1c; border:1px solid #333; color:white; height:${isSaved ? '28px' : 'auto'};" placeholder="노트 입력..." rows="1">${s.note || ''}</textarea>
                            </div>
                        </div>
                        <div class="col-3"><button id="save-btn-${s.id}" class="btn-save ${isSaved ? 'st-saved' : ''}" onclick="window.saveSetRow(${s.id})">${isSaved ? 'SAVED' : 'SAVE'}</button></div>
                    </div>
                </div>
            </div>`;
        }
        window.renderSetRowHtml = renderSetRowHtml;

        async function detachSuperset(ssId) {
            if (!confirm("이 수퍼세트 구성을 해제하고 각각의 일반 운동 카드로 분리하시겠습니까?")) return;
            const { error } = await _db.schema('workout').from('active_workout').update({ program_id: null }).eq('program_id', ssId);
            if (error) alert("분리 실패: " + error.message); else await window.refreshActiveList();
        }
        window.detachSuperset = detachSuperset;

        async function saveSetRow(id) {
            const btn = document.getElementById(`save-btn-${id}`);
            const s = window.ACTIVE_SETS.find(x => x.id === id);
            const ex = window.EX_MASTER.find(e => e.id === s.exercise_id);
            const up = { 
                status: 'SAVED', note: document.getElementById(`n-${id}`).value, 
                equipment_type: document.getElementById('sel-equip-' + id)?.value ? Number(document.getElementById('sel-equip-' + id).value) : null, 
                weight_type: document.getElementById('sel-weight-type-' + id)?.value ? Number(document.getElementById('sel-weight-type-' + id).value) : null, 
                grip_type: document.getElementById('sel-grip-' + id)?.value ? Number(document.getElementById('sel-grip-' + id).value) : null, 
                lying_type: document.getElementById('sel-lying-' + id)?.value ? Number(document.getElementById('sel-lying-' + id).value) : null 
            };
            
            if (ex.use_weight) up.weight = Number(document.getElementById(`w-${id}`).value);
            if (ex.use_reps) up.reps = Number(document.getElementById(`r-${id}`).value);
            if (ex.use_set_time) up.set_time = Number(document.getElementById(`st-${id}`).value);
            if (ex.use_exercise_time) up.workout_time = Number(document.getElementById('t-' + id).value);
            if (ex.use_machine_lv) up.level = Number(document.getElementById(`ml-${id}`).value);
            if (ex.use_machine_speed) up.machine_speed = Number(document.getElementById(`ms-${id}`).value);
            if (ex.use_heart_rate) up.heart_rate = Number(document.getElementById(`hr-${id}`).value);
            if (ex.use_pause_count) up.pause_count = Number(document.getElementById(`pc-${id}`).value);
            
            const { error } = await _db.schema('workout').from('active_workout').update(up).eq('id', id);
            if (!error) {
                btn.innerText = 'SAVED'; btn.classList.remove('st-update'); btn.classList.add('st-saved');
                document.getElementById(`set-row-content-${id}`).classList.add('saved-row');
                const ta = document.getElementById(`n-${id}`); if (ta) ta.style.height = '28px';
                Object.assign(s, up); window.updateProgress(); 
            } else { alert("저장 실패: " + error.message); }
        }
        window.saveSetRow = saveSetRow;

        async function handleTypeChange(typeId) {
            const buwiWrapper = document.getElementById('q-buwi-wrapper');
            const exWrapper = document.getElementById('q-ex-wrapper');
            const exSelect = document.getElementById('q-ex');
            const typeName = window.SETTINGS_LOOKUP[typeId];
            
            const typeExIds = window.EX_MASTER.filter(e => Number(e.exercise_type) === Number(typeId)).map(e => e.id);
            if (typeExIds.length > 0) {
                const { data: tData } = await _db.schema('workout').from('logs').select('workout_date').in('exercise_id', typeExIds).order('workout_date', { ascending: false }).limit(1);
                if (tData && tData.length > 0) {
                    document.getElementById('last-date-type').innerText = `(${tData[0].workout_date.split('T')[0].slice(5).replace('-', '.')})`;
                } else { document.getElementById('last-date-type').innerText = '(-)'; }
            } else { document.getElementById('last-date-type').innerText = '(-)'; }

            if (typeName === '유산소') {
                if (buwiWrapper) buwiWrapper.style.display = 'none';
                if (exWrapper) { exWrapper.classList.remove('col-4'); exWrapper.classList.add('col-8'); }
                document.getElementById('last-date-buwi').innerText = '';
                const filtered = window.EX_MASTER.filter(e => Number(e.exercise_type) === Number(typeId));
                exSelect.innerHTML = filtered.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
                if (filtered.length > 0) window.loadQuickExStats(filtered[0].id);
            } else {
                if (buwiWrapper) buwiWrapper.style.display = 'block';
                if (exWrapper) { exWrapper.classList.remove('col-8'); exWrapper.classList.add('col-4'); }
                window.handleBuwiChange(document.getElementById('q-buwi').value);
            }
        }
        window.handleTypeChange = handleTypeChange;

        async function handleBuwiChange(buwiId) {
            const currentTypeId = document.getElementById('q-type').value;
            if (window.SETTINGS_LOOKUP[currentTypeId] === '유산소') {
                document.getElementById('last-date-buwi').innerText = '';
                return;
            }
            
            const { data } = await _db.schema('workout').from('logs').select('workout_date').eq('body_part', buwiId).order('workout_date', { ascending: false }).limit(1);
            if (data && data.length > 0) {
                document.getElementById('last-date-buwi').innerText = `(${data[0].workout_date.split('T')[0].slice(5).replace('-', '.')})`;
            } else { document.getElementById('last-date-buwi').innerText = '(-)'; }
            
            const filtered = window.EX_MASTER.filter(e => Number(e.body_part) === Number(buwiId) && Number(e.exercise_type) === Number(currentTypeId));
            document.getElementById('q-ex').innerHTML = filtered.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
            
            if (filtered.length > 0) { window.loadQuickExStats(filtered[0].id); } 
            else { document.getElementById('q-stats-area').style.display = 'none'; document.getElementById('q-inputs').innerHTML = ''; document.getElementById('last-date-ex').innerText = '(-)'; }
        }
        window.handleBuwiChange = handleBuwiChange;

        async function loadQuickExStats(exId) {
            if (!exId) {
                document.getElementById('last-date-ex').innerText = '(-)';
                return;
            }
            const ex = window.EX_MASTER.find(e => e.id === exId);
            const { best, bestLog, recentConfigs } = await window.getDetailedStats(exId);
            
            const { data: lastLogForDate } = await _db.schema('workout').from('logs').select('workout_date').eq('exercise_id', exId).order('workout_date', { ascending: false }).limit(1);
            if (lastLogForDate && lastLogForDate.length > 0) {
                document.getElementById('last-date-ex').innerText = `(${lastLogForDate[0].workout_date.split('T')[0].slice(5).replace('-', '.')})`;
            } else {
                document.getElementById('last-date-ex').innerText = '(-)';
            }
            
            let bestFinalHtml = '';
            if (bestLog) {
                const isCardio = (ex && window.SETTINGS_LOOKUP[ex.exercise_type] === '유산소');
                if (isCardio) {
                    bestFinalHtml = ` <span style="color:var(--neon-pink); font-size:0.65rem;">(강도: Lv.${bestLog.machine_lv || '-'} / 속도: ${bestLog.machine_speed || '-'}km/h)</span>`;
                } else if (bestLog.weight) {
                    let finalW = window.calculateFinalWeight(bestLog.weight, bestLog.weight_type || ex.weight_type, ex.equipment_type);
                    bestFinalHtml = ` <span style="color:var(--neon-pink); font-size:0.65rem;">(최종 세트: ${bestLog.weight}kg x ${bestLog.reps}회 / 총합: ${finalW}kg)</span>`;
                }
            }

            document.getElementById('q-stats-area').style.display = 'block';
            document.getElementById('q-best-info').innerHTML = `
                <b class="text-pink">🏆 BEST 볼륨: ${best}${bestFinalHtml}</b> 
                <small style="color:#666">(${bestLog.date || '-'})</small>
                ${bestLog.note ? `<div style="font-size:0.65rem; color:var(--bp-pink); margin-top:3px; font-style:italic;">📝 ${bestLog.note}</div>` : ''}
            `;
            document.getElementById('q-recent-configs').innerHTML = recentConfigs.map(c => `<span class="recent-config-item">${c}</span>`).join('');
            window.renderQuickInputFields(ex, bestLog);
        }
        window.loadQuickExStats = loadQuickExStats;

        function renderQuickInputFields(ex, best) {
            let html = '';
            if (ex.use_set_no) {
                html += `<div class="col-3"><label class="label-small">세트수</label><input type="number" id="q-val-sets" class="form-control" value="3"></div>`;
            }
            if (ex.use_equipment) {
                html += window.makeQField('col-4', '기구', window.makeQSelect('q-val-equip', window.SETTINGS_CODE['EQUIPMENT'], best.equip || ex.equipment_type));
            }
            if (ex.use_weight_type) {
                html += window.makeQField('col-4', '무게타입', window.makeQSelect('q-val-weight-type', window.SETTINGS_CODE['WEIGHT_SUB_TYPE'], best.weight_type || ex.weight_type));
            }
            if (ex.use_grip) {
                html += window.makeQField('col-4', '그립', window.makeQSelect('q-val-grip', window.SETTINGS_CODE['GRIP'], best.grip || ex.grip_type));
            }
            if (ex.use_lying) {
                html += window.makeQField('col-4', '라잉', window.makeQSelect('q-val-lying', window.SETTINGS_CODE['LYING'], best.lying || ex.lying_type));
            }
            if (ex.use_weight) {
                html += window.makeQField('col-4', '무게(kg)', `<input type="number" id="q-val-weight" class="form-control" value="${best.weight !== undefined ? best.weight : ''}">`);
            }
            if (ex.use_reps) {
                html += window.makeQField('col-4', '횟수', `<input type="number" id="q-val-reps" class="form-control" value="${best.reps !== undefined ? best.reps : ''}">`);
            }
            if (ex.use_set_time) {
                html += window.makeQField('col-4', '시간(s)', `<input type="number" id="q-val-set-time" class="form-control" value="${best.set_time !== undefined ? best.set_time : ''}">`);
            }
            if (ex.use_exercise_time) {
                html += window.makeQField('col-4', '전체시간(m)', `<input type="number" id="q-val-time" class="form-control" value="${best.time !== undefined ? best.time : ''}">`);
            }
            if (ex.use_machine_lv) {
                html += window.makeQField('col-4', '강도', `<input type="number" id="q-val-ml" class="form-control" value="${best.machine_lv !== undefined ? best.machine_lv : ''}">`);
            }
            if (ex.use_machine_speed) {
                html += window.makeQField('col-4', '속도', `<input type="number" id="val-ms" class="form-control" value="${best.machine_speed !== undefined ? best.machine_speed : ''}">`);
            }
            if (ex.use_heart_rate) {
                html += window.makeQField('col-4', '심박수', `<input type="number" id="q-val-hr" class="form-control" value="${best.heart_rate !== undefined ? best.heart_rate : ''}">`);
            }
            if (ex.use_pause_count) {
                html += window.makeQField('col-4', '포즈 수', `<input type="number" id="q-val-pause" class="form-control" value="0" inputmode="numeric" pattern="[0-9]*">`);
            }
            
            document.getElementById('q-inputs').innerHTML = html;
            window.handleSupersetSelectChange(document.getElementById('q-superset').value);
        }
        window.renderQuickInputFields = renderQuickInputFields;

        async function addWorkoutFromQuick() {
            const exId = document.getElementById('q-ex').value;
            if (!exId) return alert("종목을 선택하세요.");
            const ex = window.EX_MASTER.find(e => e.id === exId);
            const currentTypeId = document.getElementById('q-type').value;
            const currentTypeName = window.SETTINGS_LOOKUP[currentTypeId];
            const supersetTarget = document.getElementById('q-superset').value;
            let ssId = ''; let sets = 1;
            
            if (supersetTarget) {
                const targetSets = window.ACTIVE_SETS.filter(s => s.display_name === supersetTarget);
                sets = targetSets.length > 0 ? Math.max(...targetSets.map(s => s.set_no)) : 1; ssId = 'ss_' + Date.now();
                const targetIds = targetSets.map(s => { return s.id; });
                const { error: upError = null } = await _db.schema('workout').from('active_workout').update({ program_id: ssId }).in('id', targetIds);
                if (upError) return alert("수퍼세트 바인딩 실패: " + upError.message);
            } else {
                const setsInput = document.getElementById('q-val-sets'); sets = setsInput ? (parseInt(setsInput.value) || 1) : 1;
            }
            
            const payload = [];
            for (let i = 1; i <= sets; i++) {
                payload.push({ 
                    exercise_id: exId, display_name: ex.name, body_part: ex.body_part, set_no: i, status: 'TEMP', unit: ex.unit || 'kg',
                    weight: Number(document.getElementById('q-val-weight')?.value || 0), reps: Number(document.getElementById('q-val-reps')?.value || 0), 
                    set_time: Number(document.getElementById('q-val-set-time')?.value || 0), workout_time: Number(document.getElementById('q-val-time')?.value || 0),
                    level: Number(document.getElementById('q-val-ml')?.value || 0), machine_speed: Number(document.getElementById('val-ms')?.value || 0),
                    heart_rate: Number(document.getElementById('q-val-hr')?.value || 0),
                    pause_count: document.getElementById('q-val-pause') ? Number(document.getElementById('q-val-pause').value) : 0,
                    equipment_type: document.getElementById('q-val-equip')?.value ? Number(document.getElementById('q-val-equip').value) : (ex.equipment_type ? Number(ex.equipment_type) : null), 
                    weight_type: document.getElementById('q-val-weight-type')?.value ? Number(document.getElementById('q-val-weight-type').value) : (ex.weight_type ? Number(ex.weight_type) : null),
                    grip_type: document.getElementById('q-val-grip')?.value ? Number(document.getElementById('q-val-grip').value) : (ex.grip_type ? Number(ex.grip_type) : null), 
                    lying_type: document.getElementById('q-val-lying')?.value ? Number(document.getElementById('q-val-lying').value) : (ex.lying_type ? Number(ex.lying_type) : null), 
                    program_id: ssId
                });
            }
            const { error } = await _db.schema('workout').from('active_workout').insert(payload);
            if (error) alert("추가 실패: " + error.message); 
            else { document.getElementById('q-superset').value = ''; const setsInput = document.getElementById('q-val-sets'); if (setsInput) setsInput.disabled = false; await window.refreshActiveList(); }
        }
        window.addWorkoutFromQuick = addWorkoutFromQuick;

        function openReorderModal() {
            const blocks = []; const blockMap = {};
            window.ACTIVE_SETS.forEach(s => {
                const isSS = s.program_id && s.program_id.startsWith('ss_'); const key = isSS ? s.program_id : `single_${s.display_name}`;
                if (!blockMap[key]) { blockMap[key] = { id: key, isSuperset: isSS, names: [], sets: [] }; blocks.push(blockMap[key]); }
                blockMap[key].sets.push(s); if (!blockMap[key].names.includes(s.display_name)) blockMap[key].names.push(s.display_name);
            });
            window.CURRENT_REORDER_BLOCKS = blocks; window.renderReorderList();
            document.getElementById('reorder-overlay').style.display = 'flex';
        }
        window.openReorderModal = openReorderModal;

        function renderReorderList() {
            const container = document.getElementById('reorder-list-container');
            if (window.CURRENT_REORDER_BLOCKS.length === 0) { container.innerHTML = '<div class="text-center text-secondary py-4">현재 추가된 운동 종목이 없습니다.</div>'; return; }
            container.innerHTML = window.CURRENT_REORDER_BLOCKS.map((b, idx) => {
                const title = b.isSuperset ? `🔗 수퍼세트 (${b.names.join(' + ')})` : b.names[0];
                return `<div class="d-flex justify-content-between align-items-center mb-2 p-3" style="background:rgba(255,255,255,0.03); border-radius:14px; border:1px solid #222;"><span style="font-size:0.85rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:65%; color:#eee;">${title}</span><div class="d-flex gap-1"><button class="btn btn-sm btn-outline-light px-2 py-1" style="font-size:0.75rem;" onclick="window.moveReorderBlock(${idx}, -1)">🔼</button><button class="btn btn-sm btn-outline-light px-2 py-1" style="font-size:0.75rem;" onclick="window.moveReorderBlock(${idx}, 1)">🔽</button></div></div>`;
            }).join('');
        }
        window.renderReorderList = renderReorderList;

        function moveReorderBlock(idx, dir) {
            const targetIdx = idx + dir; if (targetIdx < 0 || targetIdx >= window.CURRENT_REORDER_BLOCKS.length) return;
            const temp = window.CURRENT_REORDER_BLOCKS[idx]; window.CURRENT_REORDER_BLOCKS[idx] = window.CURRENT_REORDER_BLOCKS[targetIdx]; window.CURRENT_REORDER_BLOCKS[targetIdx] = temp;
            window.renderReorderList();
        }
        window.moveReorderBlock = moveReorderBlock;

        function closeReorderModal() { document.getElementById('reorder-overlay').style.display = 'none'; }
        window.closeReorderModal = closeReorderModal;

        async function saveNewOrder() {
            if (!window.CURRENT_REORDER_BLOCKS || window.CURRENT_REORDER_BLOCKS.length === 0) return;
            const allSetsNewOrder = [];
            window.CURRENT_REORDER_BLOCKS.forEach(b => {
                if (b.isSuperset) b.sets.sort((a, b) => a.set_no - b.set_no || a.id - b.id); else b.sets.sort((a, b) => a.set_no - b.set_no);
                allSetsNewOrder.push(...b.sets);
            });
            if (allSetsNewOrder.length === 0) return window.closeReorderModal();
            const originalIds = window.ACTIVE_SETS.map(s => s.id);
            const payload = allSetsNewOrder.map(s => { const { id, created_at, ...rest } = s; return rest; });
            const { error: delError } = await _db.schema('workout').from('active_workout').delete().in('id', originalIds);
            if (delError) return alert("순서 배치 마이그레이션 오류(삭제 단계): " + delError.message);
            const { error: insError = null } = await _db.schema('workout').from('active_workout').insert(payload);
            if (insError) return alert("순서 배치 마이그레이션 오류(재적재 단계): " + insError.message);
            window.closeReorderModal(); await window.refreshActiveList(); 
        }
        window.saveNewOrder = saveNewOrder;

        function handleTouchStart(e) { touchStartX = e.touches[0].clientX; }
        window.handleTouchStart = handleTouchStart;
        
        function handleTouchMoveGroup(e, blockId) { const diffX = e.touches[0].clientX - touchStartX; if (diffX < 0) { document.getElementById(`group-content-${blockId}`).style.transform = `translateX(${Math.max(diffX, -100)}px)`; document.getElementById(`del-group-bg-${blockId}`).style.right = '0'; } }
        window.handleTouchMoveGroup = handleTouchMoveGroup;
        
        async function handleTouchEndGroup(e, blockId, label, isSuperset) { 
            const diffX = e.changedTouches[0].clientX - touchStartX;
            if (diffX < -150) { 
                if (confirm(isSuperset ? "이 수퍼세트 그룹 전체를 삭제할까요?" : "이 운동 전체를 삭제할까요?")) { 
                    const cardEl = document.getElementById(`block-card-${blockId}`);
                    if (cardEl) {
                        cardEl.style.transition = "all 0.35s cubic-bezier(0.4, 0, 0.2, 1)"; cardEl.style.transform = "translateX(-100%)"; cardEl.style.opacity = "0";
                        setTimeout(() => { cardEl.style.maxHeight = "0"; cardEl.style.margin = "0"; cardEl.style.padding = "0"; }, 150);
                        setTimeout(() => { cardEl.remove(); }, 400);
                    }
                    if (isSuperset) await _db.schema('workout').from('active_workout').delete().eq('program_id', blockId);
                    else { const originName = blockId.replace('single_', ''); await _db.schema('workout').from('active_workout').delete().eq('display_name', originName); }
                    const { data } = await _db.schema('workout').from('active_workout').select('*').order('id'); window.ACTIVE_SETS = data || [];
                    window.updateProgress(); window.updateSupersetDropdown();
                } else { window.resetSwipeGroup(blockId); }
            } else { window.resetSwipeGroup(blockId); }
        }
        window.handleTouchEndGroup = handleTouchEndGroup;
        
        function resetSwipeGroup(blockId) { document.getElementById('group-content-' + blockId).style.transform = 'translateX(0)'; document.getElementById('del-group-bg-' + blockId).style.right = '-100%'; }
        window.resetSwipeGroup = resetSwipeGroup;
        
        function handleTouchMoveSet(e, id) { const diffX = e.touches[0].clientX - touchStartX; if (diffX < 0) { document.getElementById(`set-row-content-${id}`).style.transform = `translateX(${Math.max(diffX, -80)}px)`; document.getElementById(`del-set-bg-${id}`).style.right = '0'; } }
        window.handleTouchMoveSet = handleTouchMoveSet;
        
        async function handleTouchEndSet(e, id, exName) { 
            const diffX = e.changedTouches[0].clientX - touchStartX;
            if (diffX < -120) { 
                if (confirm("이 세트를 삭제할까요?")) { 
                    const rowContent = document.getElementById(`set-row-content-${id}`); const swipeWrapper = rowContent?.closest('.swipe-wrapper');
                    if (swipeWrapper) { swipeWrapper.style.transition = "all 0.35s cubic-bezier(0.4, 0, 0.2, 1)"; swipeWrapper.style.transform = "translateX(-100%)"; swipeWrapper.style.opacity = "0"; setTimeout(() => { swipeWrapper.style.maxHeight = "0"; swipeWrapper.style.margin = "0"; swipeWrapper.style.padding = "0"; }, 150); setTimeout(() => { swipeWrapper.remove(); }, 400); }
                    await _db.schema('workout').from('active_workout').delete().eq('id', id); 
                    const { data } = await _db.schema('workout').from('active_workout').select('*').order('id'); window.ACTIVE_SETS = data || [];
                    window.updateProgress();
                } else { window.resetSwipeSet(id); }
            } else { window.resetSwipeSet(id); }
        }
        window.handleTouchEndSet = handleTouchEndSet;
        
        function resetSwipeSet(id) { document.getElementById(`set-row-content-${id}`).style.transform = 'translateX(0)'; document.getElementById('del-set-bg-' + id).style.right = '-100%'; }
        window.resetSwipeSet = resetSwipeSet;

        function addSetEventListeners(id) { 
            const row = document.getElementById(`set-row-content-${id}`); if (!row) return; 
            row.querySelectorAll(`.row-input-${id}, select`).forEach(el => { el.addEventListener('input', () => { const btn = document.getElementById(`save-btn-${id}`); if (btn && btn.innerText === 'SAVED') { btn.innerText = 'UPDATE'; btn.classList.add('st-update'); } }); }); 
            const ta = document.getElementById(`n-${id}`);
            if (ta) {
                ta.addEventListener('focus', function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; });
                ta.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; });
                ta.addEventListener('blur', function() { const btn = document.getElementById(`save-btn-${id}`); if (btn && btn.innerText === 'SAVED') this.style.height = '28px'; });
            }
        }
        window.addSetEventListeners = addSetEventListeners;
        
        function makeQField(col, label, input) { return `<div class="${col} mb-2"><label class="label-small">${label}</label>${input}</div>`; }
        function makeQSelect(id, list, def) { return `<select id="${id}" class="form-select">${list.map(v => `<option value="${v.id}" ${v.id == def ? 'selected' : ''}>${v.name}</option>`).join('')}</select>`; }
        function makeRowSelect(id, type, list, current) { return `<select id="sel-${type}-${id}" class="form-select form-select-sm" style="font-size:0.6rem; height:24px;">${list.map(v => `<option value="${v.id}" ${v.id == current ? 'selected' : ''}>${v.name}</option>`).join('')}</select>`; }
        function getPartKey(b) { if (b && b.includes('가슴')) return 'chest'; if (b && b.includes('등')) return 'back'; if (b && b.includes('어깨')) return 'shoulder'; if (b && b.includes('하체')) return 'leg'; return 'etc'; }
        function handleRoutineChange(val) { console.log("루틴 바인딩 감지:", val); }
        
        window.makeQField = makeQField;
        window.makeQSelect = makeQSelect;
        window.makeRowSelect = makeRowSelect;
        window.getPartKey = getPartKey;
        window.handleRoutineChange = handleRoutineChange;

        function toggleFinishArea() {
            const area = document.getElementById('session-input-area');
            if (area.style.display === 'block') { area.style.display = 'none'; return; }
            if (!window.ACTIVE_SETS || window.ACTIVE_SETS.length === 0) { alert("기록할 운동이 없습니다!"); return; }

            let hasWeight = false; let hasCardio = false;
            window.ACTIVE_SETS.forEach(s => {
                const ex = window.EX_MASTER.find(e => e.id === s.exercise_id);
                if (ex) { const typeName = window.SETTINGS_LOOKUP[ex.exercise_type]; if (typeName === '유산소') hasCardio = true; else hasWeight = true; }
            });

            let html = '';
            if (hasWeight) {
                html += `<div class="session-block"><h6 style="color:var(--bp-pink); font-size:0.8rem; font-weight:800; margin-bottom:10px;">💪 근력 운동 (웨이트) 지표</h6><div class="row g-2 mb-2"><div class="col-4"><label class="label-small">시간(분)</label><input type="number" id="s-duration-weight" class="form-control form-control-sm" inputmode="numeric" pattern="[0-9]*"></div><div class="col-4"><label class="label-small">활동kcal</label><input type="number" id="s-active-cal-weight" class="form-control form-control-sm" inputmode="numeric" pattern="[0-9]*"></div><div class="col-4"><label class="label-small">총kcal</label><input type="number" id="s-total-cal-weight" class="form-control form-control-sm" inputmode="numeric" pattern="[0-9]*"></div></div><div class="row g-2"><div class="col-4"><label class="label-small">평균심박</label><input type="number" id="s-avg-hr-weight" class="form-control form-control-sm" inputmode="numeric" pattern="[0-9]*"></div><div class="col-4"><label class="label-small">최소심박</label><input type="number" id="s-min-hr-weight" class="form-control form-control-sm" inputmode="numeric" pattern="[0-9]*"></div><div class="col-4"><label class="label-small">최대심박</label><input type="number" id="s-max-hr-weight" class="form-control form-control-sm" inputmode="numeric" pattern="[0-9]*"></div></div></div>`;
            }
            if (hasCardio) {
                html += `<div class="session-block"><h6 style="color:var(--bp-pink); font-size:0.8rem; font-weight:800; margin-bottom:10px;">🏃 유산소 운동 지표</h6><div class="row g-2 mb-2"><div class="col-4"><label class="label-small">시간(분)</label><input type="number" id="s-duration-cardio" class="form-control form-control-sm" inputmode="numeric" pattern="[0-9]*"></div><div class="col-4"><label class="label-small">활동kcal</label><input type="number" id="s-active-cal-cardio" class="form-control form-control-sm" inputmode="numeric" pattern="[0-9]*"></div><div class="col-4"><label class="label-small">총kcal</label><input type="number" id="s-total-cal-cardio" class="form-control form-control-sm" inputmode="numeric" pattern="[0-9]*"></div></div><div class="row g-2"><div class="col-4"><label class="label-small">평균심박</label><input type="number" id="s-avg-hr-cardio" class="form-control form-control-sm" inputmode="numeric" pattern="[0-9]*"></div><div class="col-4"><label class="label-small">최소심박</label><input type="number" id="s-min-hr-cardio" class="form-control form-control-sm" inputmode="numeric" pattern="[0-9]*"></div><div class="col-4"><label class="label-small">최대심박</label><input type="number" id="s-max-hr-cardio" class="form-control form-control-sm" inputmode="numeric" pattern="[0-9]*"></div></div></div>`;
            }
            html += `<button class="btn-pink w-100 mt-2" onclick="window.processFinalSave()">최종 로그 일괄 저장 & 리셋</button>`;
            area.innerHTML = html; area.style.display = 'block'; 
        }
        window.toggleFinishArea = toggleFinishArea;

        // 모든 UI 요소가 하이재킹 완료된 최종 스크립트 시점에 정밀 초기화 엔진 가동!
        window.init();
    </script>
</body>
</html>
